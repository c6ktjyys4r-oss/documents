<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alba Document Library</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --navy: #1a1a2e;
  --navy-light: #252545;
  --amber: #d4a000;
  --amber-light: #f5c842;
  --bg: #f8f9fb;
  --bg2: #ffffff;
  --border: #d0d4dc;
  --border-light: #e8eaf2;
  --text: #1a1a1a;
  --text-soft: #555;
  --text-muted: #888;
  --header-bg: #e8eaf2;
  --shadow: 0 1px 4px rgba(0,0,0,.08);
  --shadow-md: 0 4px 16px rgba(0,0,0,.12);
  --radius: 8px;
  --sidebar-w: 240px;
  --transition: .18s ease;
}
[data-theme="dark"] {
  --bg: #111118;
  --bg2: #1c1c28;
  --border: #2e2e42;
  --border-light: #252538;
  --text: #e8e8f0;
  --text-soft: #aaa;
  --text-muted: #666;
  --header-bg: #252538;
  --shadow: 0 1px 4px rgba(0,0,0,.4);
  --shadow-md: 0 4px 20px rgba(0,0,0,.5);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background var(--transition),color var(--transition)}

/* ── Header ── */
.site-header{position:sticky;top:0;z-index:100;background:var(--navy);color:#fff;display:flex;align-items:center;gap:16px;padding:0 20px;height:56px;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.logo{font-size:1.05rem;font-weight:700;letter-spacing:.04em;color:#fff;text-decoration:none;white-space:nowrap}
.logo span{color:var(--amber)}
.search-wrap{flex:1;max-width:480px;position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#aaa;pointer-events:none}
#search{width:100%;padding:8px 12px 8px 34px;border:1px solid rgba(255,255,255,.15);border-radius:6px;background:rgba(255,255,255,.1);color:#fff;font-size:.875rem;outline:none;transition:background var(--transition)}
#search::placeholder{color:rgba(255,255,255,.5)}
#search:focus{background:rgba(255,255,255,.18);border-color:var(--amber)}
.header-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
.btn-icon{background:none;border:none;cursor:pointer;color:#ccc;padding:6px;border-radius:6px;display:flex;align-items:center;transition:color var(--transition),background var(--transition)}
.btn-icon:hover{color:#fff;background:rgba(255,255,255,.1)}

/* ── Layout ── */
.app-body{display:flex;min-height:calc(100vh - 56px)}
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);padding:16px 0;overflow-y:auto;position:sticky;top:56px;height:calc(100vh - 56px)}
.main{flex:1;padding:28px 32px;max-width:900px}
@media(max-width:768px){
  .sidebar{position:fixed;left:-100%;top:56px;height:calc(100vh - 56px);z-index:90;transition:left .25s ease;box-shadow:var(--shadow-md)}
  .sidebar.open{left:0}
  .main{padding:20px 16px}
  .site-header{padding:0 12px}
}

/* ── Sidebar ── */
.sidebar-section{padding:4px 0}
.sidebar-heading{padding:6px 16px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted)}
.sidebar-link{display:flex;align-items:center;gap:10px;padding:9px 16px;font-size:.875rem;color:var(--text-soft);text-decoration:none;cursor:pointer;border-left:3px solid transparent;transition:all var(--transition)}
.sidebar-link:hover{background:var(--border-light);color:var(--text);border-left-color:var(--border)}
.sidebar-link.active{background:var(--header-bg);color:var(--navy);font-weight:600;border-left-color:var(--amber)}
[data-theme="dark"] .sidebar-link.active{color:var(--amber-light)}
.sidebar-link .cat-icon{width:20px;text-align:center;font-size:.95rem}
.sidebar-link .cat-count{margin-left:auto;font-size:.75rem;color:var(--text-muted);background:var(--border-light);padding:1px 7px;border-radius:10px}
.sidebar-divider{height:1px;background:var(--border);margin:8px 16px}

/* ── Home / Cards ── */
.page-title{font-size:1.6rem;font-weight:700;color:var(--navy);margin-bottom:6px}
[data-theme="dark"] .page-title{color:var(--amber-light)}
.page-sub{color:var(--text-soft);font-size:.9rem;margin-bottom:24px}
.category-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:32px}
.cat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;text-decoration:none;display:block;transition:all var(--transition)}
.cat-card:hover{border-color:var(--amber);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.cat-card-icon{font-size:1.8rem;margin-bottom:10px}
.cat-card-name{font-size:.95rem;font-weight:600;color:var(--text);margin-bottom:4px}
.cat-card-count{font-size:.8rem;color:var(--text-muted)}

/* ── Template list ── */
.section-title{font-size:1.2rem;font-weight:700;color:var(--navy);margin-bottom:4px;display:flex;align-items:center;gap:8px}
[data-theme="dark"] .section-title{color:var(--amber-light)}
.section-sub{color:var(--text-muted);font-size:.82rem;margin-bottom:18px}
.template-list{display:flex;flex-direction:column;gap:8px}
.template-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all var(--transition)}
.template-item:hover{border-color:var(--amber);box-shadow:var(--shadow)}
.template-item-icon{font-size:1.2rem;flex-shrink:0}
.template-item-info{flex:1;min-width:0}
.template-item-name{font-size:.9rem;font-weight:600;color:var(--text);margin-bottom:2px}
.template-item-meta{font-size:.78rem;color:var(--text-muted)}
.template-item-arrow{color:var(--text-muted);flex-shrink:0}
.cat-badge{display:inline-block;font-size:.7rem;font-weight:600;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em}

/* ── Template viewer ── */
.viewer-header{margin-bottom:20px}
.breadcrumb{font-size:.8rem;color:var(--text-muted);margin-bottom:10px;display:flex;align-items:center;gap:4px}
.breadcrumb a{color:var(--text-muted);text-decoration:none}
.breadcrumb a:hover{color:var(--amber)}
.viewer-title{font-size:1.4rem;font-weight:700;color:var(--navy);margin-bottom:8px}
[data-theme="dark"] .viewer-title{color:var(--amber-light)}
.viewer-meta{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.viewer-actions{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:6px;font-size:.85rem;font-weight:600;cursor:pointer;border:none;transition:all var(--transition)}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover{background:var(--navy-light)}
.btn-outline{background:var(--bg2);color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--amber);color:var(--amber)}
.btn-amber{background:var(--amber);color:#fff}
.btn-amber:hover{background:var(--amber-light);color:#1a1a1a}

/* ── Document preview ── */
.doc-preview{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:32px 36px;box-shadow:var(--shadow);font-family:Arial,Helvetica,sans-serif;font-size:11pt;line-height:1.55;color:var(--text)}
.doc-preview h1{font-size:14pt;font-weight:700;text-align:center;border-bottom:2.5px solid var(--navy);padding-bottom:8px;margin:16px 0 14px;color:var(--navy)}
[data-theme="dark"] .doc-preview h1{border-color:var(--amber);color:var(--amber-light)}
.doc-preview h2{font-size:9pt;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.1em;border-bottom:1px solid var(--border);padding-bottom:3px;margin:18px 0 8px}
[data-theme="dark"] .doc-preview h2{color:var(--amber-light)}
.doc-preview h3{font-size:10pt;font-weight:700;color:#2a2a3e;margin:12px 0 5px}
[data-theme="dark"] .doc-preview h3{color:#aab}
.doc-preview table{width:100%;border-collapse:collapse;margin:6px 0 14px;font-size:10pt}
.doc-preview th{background:var(--header-bg);color:var(--navy);font-weight:700;padding:7px 10px;text-align:left;font-size:9pt;border:1px solid var(--border)}
[data-theme="dark"] .doc-preview th{color:var(--amber-light)}
.doc-preview td{border:1px solid var(--border);padding:6px 10px;vertical-align:top}
.doc-preview hr{border:none;border-top:1px solid var(--border);margin:14px 0}
.doc-preview blockquote{border-left:3px solid var(--amber);padding:8px 14px;background:#fffcf0;margin:10px 0;font-size:10pt}
[data-theme="dark"] .doc-preview blockquote{background:#2a2200}
.doc-preview p{margin:4px 0}
.doc-preview code{background:var(--border-light);padding:1px 5px;border-radius:3px;font-size:.85em;font-family:monospace}
.doc-preview pre{background:var(--border-light);padding:12px;border-radius:6px;overflow-x:auto;margin:10px 0}

/* ── Search results ── */
.search-results-header{margin-bottom:16px}
.no-results{text-align:center;padding:48px 20px;color:var(--text-muted)}
.no-results svg{margin-bottom:12px;opacity:.4}

/* ── Badge colors ── */
.badge-hr{background:#dbeafe;color:#1e40af}
.badge-finance{background:#dcfce7;color:#166534}
.badge-operations{background:#fef9c3;color:#854d0e}
.badge-administration{background:#f3e8ff;color:#6b21a8}
.badge-general{background:#e0f2fe;color:#0369a1}
.badge-framework{background:#f1f5f9;color:#475569}
[data-theme="dark"] .badge-hr{background:#1e3a6e;color:#93c5fd}
[data-theme="dark"] .badge-finance{background:#14532d;color:#86efac}
[data-theme="dark"] .badge-operations{background:#431407;color:#fde68a}
[data-theme="dark"] .badge-administration{background:#2e1065;color:#d8b4fe}
[data-theme="dark"] .badge-general{background:#082f49;color:#7dd3fc}
[data-theme="dark"] .badge-framework{background:#1e293b;color:#94a3b8}

/* ── Mobile menu toggle ── */
.menu-toggle{display:none;background:none;border:none;cursor:pointer;color:#fff;padding:6px}
@media(max-width:768px){.menu-toggle{display:flex;align-items:center}}
.overlay{display:none;position:fixed;inset:0;top:56px;background:rgba(0,0,0,.4);z-index:80}
.overlay.open{display:block}

/* ── Print ── */
@media print{
  .site-header,.sidebar,.viewer-actions,.overlay{display:none!important}
  .main{padding:0;max-width:none}
  .doc-preview{border:none;box-shadow:none;padding:0}
  body{background:#fff;color:#000}
}

/* ── Letterhead page ── */
.lh-empty{display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center;padding:60px 24px;border:2px dashed var(--border);border-radius:var(--radius);background:var(--bg2);margin-top:4px}
.lh-empty svg{color:var(--text-muted)}
.lh-empty-title{font-weight:600;color:var(--text);margin-bottom:2px}
.lh-empty-sub{color:var(--text-soft);font-size:.875rem}
.lh-preview{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-md);margin-top:4px;background:#fff}
.lh-preview img{display:block;width:100%;max-height:800px;object-fit:contain}
.lh-meta{color:var(--text-muted);font-size:.82rem;margin-top:8px}
.lh-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;align-items:center}
.lh-upload{cursor:pointer}
.lh-upload input[type="file"]{display:none}

/* ── Fill mode ── */
.fill-layout{display:grid;grid-template-columns:320px 1fr;gap:24px;align-items:start}
@media(max-width:900px){.fill-layout{grid-template-columns:1fr}}
.fill-form{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:sticky;top:76px;max-height:calc(100vh - 96px);overflow-y:auto;box-shadow:var(--shadow)}
.fill-form-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:16px}
.fill-field{margin-bottom:12px}
.fill-label{display:block;font-size:.8rem;font-weight:600;color:var(--text-soft);margin-bottom:4px}
.fill-input{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text);font-size:.85rem;outline:none;transition:border-color var(--transition);font-family:inherit}
.fill-input:focus{border-color:var(--amber);box-shadow:0 0 0 2px rgba(212,160,0,.12)}
.fill-textarea{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text);font-size:.85rem;outline:none;resize:vertical;min-height:68px;font-family:inherit;transition:border-color var(--transition)}
.fill-textarea:focus{border-color:var(--amber);box-shadow:0 0 0 2px rgba(212,160,0,.12)}
.fill-section-heading{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin:18px 0 8px;padding-top:14px;border-top:1px solid var(--border)}
.fill-logo-note{font-size:.8rem;color:var(--text-muted);line-height:1.4}
.fill-logo-note a{color:var(--amber);text-decoration:none}
.fill-count-badge{display:inline-block;font-size:.72rem;background:var(--amber);color:#fff;border-radius:10px;padding:1px 8px;font-weight:700;margin-left:6px}
.doc-preview .ph{background:rgba(212,160,0,.15);border-bottom:1.5px dashed var(--amber);color:var(--amber);font-style:normal;border-radius:2px;padding:0 2px}
.fill-select{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text);font-size:.85rem;outline:none;transition:border-color var(--transition);cursor:pointer;appearance:none}
.fill-select:focus{border-color:var(--amber);box-shadow:0 0 0 2px rgba(212,160,0,.12)}
.fill-required-star{color:var(--amber);font-weight:700;margin-left:1px;font-size:.9em}
.fill-helper{font-size:.75rem;color:var(--text-muted);margin-top:3px;line-height:1.4}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>

</div>

function route() {
  const hash = location.hash || '#/';
  const parts = hash.slice(2).split('/').filter(Boolean);
  
  // Update active sidebar link
  document.querySelectorAll('.sidebar-link').forEach(el => {
    el.classList.toggle('active', el.getAttribute('href') === hash);
  });

  if (!parts.length || parts[0] === '') return renderHome();
  if (parts[0] === 'all') return renderList(TEMPLATES, 'All Templates', '');
  if (parts[0] === 'category' && parts[1]) return renderCategory(parts[1]);
  if (parts[0] === 'template') return renderTemplate(parts.slice(1).join('/'));
  if (parts[0] === 'search') return renderSearch(decodeURIComponent(parts[1] || ''));
  if (parts[0] === 'settings' && parts[1] === 'letterhead') return renderLetterhead();
  if (parts[0] === 'fill') return renderFillMode(parts.slice(1).join('/'));
  renderHome();
}

// ── Template loader ───────────────────────────────────────────────────────
const _templateCache = new Map();
async function loadTemplate(id) {
  if (_templateCache.has(id)) return _templateCache.get(id);
  const t = TEMPLATES.find(x => x.id === id);
  if (!t) return '';
  const resp = await fetch(t.path);
  if (!resp.ok) throw new Error('Failed to load template: ' + t.path + ' (' + resp.status + ')');
  const text = await resp.text();
  _templateCache.set(id, text);
  return text;
}

function getBody(rawText) {
  // Strip YAML front matter if present (metadata templates include it)
  let body = rawText.replace(/^---[\s\S]*?\n---\r?\n?/, '');
  // Strip inline <style> blocks — we apply our own
  return body.replace(/<style[\s\S]*?<\/style>/gi, '').trim();
}

// ── Generic Template Engine ───────────────────────────────────────────────

function extractPlaceholders(body) {
  const seen = new Set();
  const out = [];
  for (const m of body.matchAll(/\{\{([^}]+)\}\}/g)) {
    const key = m[1].trim();
    if (!seen.has(key)) { seen.add(key); out.push(key); }
  }
  return out;
}

function toLabel(key) {
  return key
    .replace(/([a-z])([A-Z])/g, '$1 $2')
    .replace(/([A-Z]+)([A-Z][a-z])/g, '$1 $2')
    .trim();
}

const MULTILINE_RE = /^(Body|Opening|Closing|Additional|Terms|Description|Reason|Notes|Paragraph|Process|Clearance|Scope|Requirements|Impact|Detail|Complaint|Observation|Summary|Remark|Agenda|Action|Appreciation|Authorization)/i;

function isMultiline(key) {
  const base = key.endsWith('Ar') ? key.slice(0, -2) : key;
  return MULTILINE_RE.test(base);
}

// ── Metadata Engine ────────────────────────────────────────────────────────

function parseScalar(v) {
  if (v === 'true') return true;
  if (v === 'false') return false;
  if (v !== '' && !isNaN(v)) return Number(v);
  if ((v.startsWith('"') && v.endsWith('"')) ||
      (v.startsWith("'") && v.endsWith("'"))) return v.slice(1, -1);
  return v;
}

// Minimal YAML parser for 4-level indented structure:
//   Level 0 (0 spaces)  : section keys  (document, form, fields, computed)
//   Level 1 (2 spaces)  : section props or field names
//   Level 2 (4 spaces)  : field properties
//   Level 3 (6 spaces)  : list items    (options)
function parseYamlSubset(text) {
  const lines = text.split('\n');
  const root = {};
  let section = null; // current level-0 key
  let field   = null; // current field name inside fields/computed
  let listKey = null; // current level-2 key collecting a list

  for (const raw of lines) {
    const trimmed = raw.trim();
    if (!trimmed || trimmed.startsWith('#')) { listKey = null; continue; }
    const indent = raw.search(/\S/);

    // List item (any indent) while a listKey is active
    if (trimmed.startsWith('- ') && listKey && section && field) {
      root[section][field][listKey].push(trimmed.slice(2).trim());
      continue;
    }
    listKey = null;

    const col = trimmed.indexOf(':');
    if (col < 0) continue;
    const key = trimmed.slice(0, col).trim();
    const val = trimmed.slice(col + 1).trim();

    if (indent === 0) {
      section = key; field = null;
      if (!root[section]) root[section] = {};
    } else if (indent === 2) {
      if (section === 'fields' || section === 'computed') {
        field = key;
        if (!root[section][field]) root[section][field] = {};
      } else if (section) {
        root[section][key] = val ? parseScalar(val) : {};
      }
    } else if (indent >= 4 && section && field) {
      if (!val) {
        root[section][field][key] = [];
        listKey = key;
      } else {
        root[section][field][key] = parseScalar(val);
      }
    }
  }
  return root;
}

function parseFrontMatter(rawBody) {
  const m = rawBody.match(/^---\r?\n([\s\S]*?)\r?\n---(?:\r?\n|$)/);
  if (!m) return { meta: {}, body: rawBody };
  return { meta: parseYamlSubset(m[1]), body: rawBody.slice(m[0].length) };
}

function getFieldDefs(rawText) {
  const { meta } = parseFrontMatter(rawText);
  const fieldsMap = (meta && meta.fields) ? meta.fields : null;

  if (fieldsMap) {
    const defs = Object.entries(fieldsMap).map(([key, f], idx) => ({
      key,
      label:       (f && f.label)       || toLabel(key),
      type:        (f && f.type)        || 'text',
      required:    (f && f.required)    || false,
      default:     (f && f.default != null) ? String(f.default) : '',
      placeholder: (f && f.placeholder) || '',
      group:       (f && f.group)       || '',
      options:     (f && Array.isArray(f.options)) ? f.options : [],
      order:       (f && typeof f.order === 'number') ? f.order : 9000 + idx,
    })).filter(d => d.key !== 'Logo');

    defs.sort((a, b) => a.order - b.order);

    // Safety net: any {{Token}} in the body not listed in metadata
    const metaKeys = new Set(defs.map(d => d.key));
    extractPlaceholders(rawText).forEach(key => {
      if (key !== 'Logo' && !metaKeys.has(key)) {
        defs.push({ key, label: toLabel(key),
          type: isMultiline(key) ? 'textarea' : 'text',
          required: false, default: '', placeholder: '',
          group: '(Unlisted)', options: [], order: 9999 });
      }
    });
    return defs;
  }

  // Fallback: auto-detect from placeholders (today's behaviour, unchanged)
  return extractPlaceholders(rawText)
    .filter(k => k !== 'Logo')
    .map((key, idx) => ({
      key, label: toLabel(key),
      type: isMultiline(key) ? 'textarea' : 'text',
      required: false, default: '', placeholder: '', group: '', options: [], order: idx
    }));
}

function renderField(def, templateId) {
  const star = def.required
    ? '<span class="fill-required-star" title="Required">*</span>' : '';
  const ph = def.placeholder || def.label;
  let input;

  if (def.type === 'select') {
    const opts = def.options.map(o =>
      `<option value="${o}">${o}</option>`
    ).join('');
    input = `<select class="fill-select" id="ff-${def.key}"` +
      ` onchange="livePreview('${templateId}')">` +
      `<option value="" disabled selected>— select —</option>${opts}</select>`;
  } else if (def.type === 'textarea') {
    input = `<textarea class="fill-textarea" id="ff-${def.key}"` +
      ` placeholder="${ph}\u2026" oninput="livePreview('${templateId}')"` +
      `>${def.default}</textarea>`;
  } else {
    const htmlType = {date:'date',number:'number',currency:'text',
      email:'email',phone:'tel'}[def.type] || 'text';
    input = `<input class="fill-input" id="ff-${def.key}" type="${htmlType}"` +
      ` placeholder="${ph}" value="${def.default}"` +
      ` oninput="livePreview('${templateId}')">`;
  }

  const helper = def.placeholder
    ? `<div class="fill-helper">${def.placeholder}</div>` : '';
  return `<div class="fill-field">` +
    `<label class="fill-label" for="ff-${def.key}">${def.label}${star}</label>` +
    `${input}${helper}</div>`;
}

async function renderFillMode(id) {
  scrollTop();
  const t = TEMPLATES.find(x => x.id === id);
  if (!t) { document.getElementById('main').innerHTML = '<p>Template not found.</p>'; return; }
  const cat = CATEGORIES[t.category] || { label: t.category, icon: '📄' };
  const rawText = await loadTemplate(id);

  const hasLogo = extractPlaceholders(rawText).includes('Logo');
  const fieldDefs = getFieldDefs(rawText);
  const { meta } = parseFrontMatter(rawText);
  const formMeta = (meta && meta.form) || {};
  const dir = formMeta.direction || 'ltr';

  const logoHtml = hasLogo
    ? `<div class="fill-field">
        <div class="fill-label">Logo</div>
        <p class="fill-logo-note">Uses your uploaded letterhead image.
          <a href="#/settings/letterhead">Manage in Settings →</a></p>
       </div>`
    : '';

  // Group fields — preserve insertion order, collect by group name
  const groupOrder = [];
  const groups = {};
  fieldDefs.forEach(def => {
    const g = def.group || '';
    if (!groups[g]) { groups[g] = []; groupOrder.push(g); }
    groups[g].push(def);
  });

  const formHtml = groupOrder.map(g => {
    const heading = g ? `<div class="fill-section-heading">${g}</div>` : '';
    return heading + groups[g].map(def => renderField(def, id)).join('');
  }).join('');

  document.getElementById('main').innerHTML = `
    <div class="viewer-header">
      <div class="breadcrumb">
        <a href="#/">Home</a> ›
        <a href="#/category/${t.category}">${cat.label}</a> ›
        <a href="#/template/${id}">${t.name}</a> ›
        <span>Fill</span>
      </div>
      <h1 class="viewer-title">${t.name}</h1>
      <div class="viewer-actions">
        <button class="btn btn-primary" onclick="printTemplate()">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Print Filled
        </button>
        <button class="btn btn-outline" onclick="downloadFilled('${id}')">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download Filled .md
        </button>
        <a class="btn btn-outline" href="#/template/${id}">← Back</a>
      </div>
    </div>
    <div class="fill-layout">
      <div class="fill-form" dir="${dir}">
        <div class="fill-form-title">
          Fill fields <span class="fill-count-badge">${fieldDefs.length}</span>
        </div>
        ${logoHtml}
        ${formHtml}
      </div>
      <div>
        <div class="doc-preview" id="doc-preview"></div>
      </div>
    </div>
  `;

  livePreview(id);
}

async function livePreview(id) {
  const t = TEMPLATES.find(x => x.id === id);
  if (!t) return;
  const preview = document.getElementById('doc-preview');
  if (!preview) return;
  const rawText = await loadTemplate(id);

  let body = getBody(rawText);
  const keys = extractPlaceholders(rawText);

  if (keys.includes('Logo')) {
    const lh = localStorage.getItem('letterhead');
    const logoImg = lh
      ? `<img src="${lh}" style="max-height:72px;max-width:180px;opacity:.85;display:block">`
      : '';
    body = body.replace(/\{\{Logo\}\}/g, logoImg);
  }

  keys.forEach(key => {
    if (key === 'Logo') return;
    const el = document.getElementById('ff-' + key);
    const val = el ? el.value : '';
    const escaped = key.replace(/[.*+?^${}()|[\]\\]/g, '\\// Restore letterhead print style on page load');
    const regex = new RegExp('\\{\\{' + escaped + '\\}\\}', 'g');
    body = body.replace(regex, val.trim()
      ? val
      : `<span class="ph">{{${key}}}</span>`);
  });

  preview.innerHTML = marked.parse(body);
}

async function downloadFilled(id) {
  const t = TEMPLATES.find(x => x.id === id);
  if (!t) return;
  const rawText = await loadTemplate(id);
  let body = getBody(rawText);
  const keys = extractPlaceholders(rawText);
  keys.forEach(key => {
    const el = document.getElementById('ff-' + key);
    const val = el ? el.value.trim() : '';
    const escaped = key.replace(/[.*+?^${}()|[\]\\]/g, '\\// Restore letterhead print style on page load');
    const regex = new RegExp('\\{\\{' + escaped + '\\}\\}', 'g');
    body = body.replace(regex, val);
  });
  body = body.replace(/\{\{Logo\}\}/g, '');
  const a = document.createElement('a');
  a.href = 'data:text/markdown;charset=utf-8,' + encodeURIComponent(body);
  a.download = (t.slug || id) + '-filled.md';
  a.click();
}

// Restore letterhead print style on page load
applyLetterheadPrintStyle(localStorage.getItem('letterhead'));
</script>
