const CATEGORIES = {
  hr:             { label: 'Human Resources',  icon: '👤' },
  finance:        { label: 'Finance',           icon: '💼' },
  operations:     { label: 'Operations',        icon: '⚙️' },
  administration: { label: 'Administration',    icon: '🏛️' },
  general:        { label: 'General',           icon: '📄' },
  framework:      { label: 'Framework',         icon: '🔧' },
};

// Fill sidebar counts
Object.keys(CATEGORIES).forEach(cat => {
  const el = document.getElementById('cnt-' + cat);
  if (el) el.textContent = TEMPLATES.filter(t => t.category === cat).length;
});

// ── Theme ─────────────────────────────────────────────────────────────────
function toggleTheme() {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', dark ? '' : 'dark');
  localStorage.setItem('theme', dark ? 'light' : 'dark');
}
if (localStorage.getItem('theme') === 'dark' || 
    (!localStorage.getItem('theme') && matchMedia('(prefers-color-scheme:dark)').matches)) {
  document.documentElement.setAttribute('data-theme', 'dark');
}

// ── Sidebar ───────────────────────────────────────────────────────────────
function toggleSidebar() {
  const s = document.getElementById('sidebar');
  const o = document.getElementById('overlay');
  s.classList.toggle('open');
  o.classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ── Router ────────────────────────────────────────────────────────────────
window.addEventListener('hashchange', route);
window.addEventListener('load', route);

function route() {
  const hash = location.hash || '#/';
  const parts = hash.slice(2).split('/').filter(Boolean);
  
  // Update active sidebar link
  document.querySelectorAll('.sidebar-link').forEach(el => {
    el.classList.toggle('active', el.getAttribute('href') === hash);
  });

  if (!parts.length || parts[0] === '') return renderHome();
  if (parts[0] === 'all') return renderList(TEMPLATES, 'All Templates', '');
  if (parts[0] === 'category' && parts[1]) return renderCategory(parts[1]);
  if (parts[0] === 'template') return renderTemplate(parts.slice(1).join('/'));
  if (parts[0] === 'search') return renderSearch(decodeURIComponent(parts[1] || ''));
  if (parts[0] === 'settings' && parts[1] === 'letterhead') return renderLetterhead();
  if (parts[0] === 'fill') return renderFillMode(parts.slice(1).join('/'));
  renderHome();
}

// ── Search ────────────────────────────────────────────────────────────────
function handleSearch(q) {
  q = q.trim();
  if (!q) { location.hash = '#/'; return; }
  location.hash = '#/search/' + encodeURIComponent(q);
}

// ── Helpers ───────────────────────────────────────────────────────────────
function badge(cat) {
  const c = CATEGORIES[cat] || {};
  return `<span class="cat-badge badge-${cat}">${c.icon || ''} ${c.label || cat}</span>`;
}

function scrollTop() { window.scrollTo(0, 0); }

function getBody(id) {
  const t = TEMPLATES.find(x => x.id === id);
  if (!t) return '';
  // Strip YAML front matter if present (metadata templates include it)
  let body = t.body.replace(/^---[\s\S]*?\n---\r?\n?/, '');
  // Strip inline <style> blocks — we apply our own
  return body.replace(/<style[\s\S]*?<\/style>/gi, '').trim();
}

// ── Render: Home ──────────────────────────────────────────────────────────
function renderHome() {
  scrollTop();
  const main = document.getElementById('main');
  const catCards = Object.entries(CATEGORIES).map(([key, cat]) => {
    const count = TEMPLATES.filter(t => t.category === key).length;
    return `<a class="cat-card" href="#/category/${key}">
      <div class="cat-card-icon">${cat.icon}</div>
      <div class="cat-card-name">${cat.label}</div>
      <div class="cat-card-count">${count} templates</div>
    </a>`;
  }).join('');

  const recent = TEMPLATES.slice(0, 6).map(t => templateItem(t)).join('');

  main.innerHTML = `
    <h1 class="page-title">Document Library</h1>
    <p class="page-sub">Professional business document templates — browse, preview, copy and download.</p>
    <div class="category-grid">${catCards}</div>
    <div class="section-title">📋 Recently Added</div>
    <div class="template-list">${recent}</div>
  `;
}

// ── Render: Category ──────────────────────────────────────────────────────
function renderCategory(cat) {
  const list = TEMPLATES.filter(t => t.category === cat);
  const info = CATEGORIES[cat] || { label: cat, icon: '📄' };
  renderList(list, info.label, info.icon);
}

function renderList(list, title, icon) {
  scrollTop();
  const items = list.length
    ? list.map(t => templateItem(t)).join('')
    : `<div class="no-results">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        <p>No templates found.</p>
      </div>`;
  document.getElementById('main').innerHTML = `
    <div class="section-title">${icon ? icon + ' ' : ''}${title}</div>
    <div class="section-sub">${list.length} template${list.length !== 1 ? 's' : ''}</div>
    <div class="template-list">${items}</div>
  `;
}

function templateItem(t) {
  const cat = CATEGORIES[t.category] || {};
  return `<div class="template-item" onclick="location.hash='#/template/${t.id}'">
    <div class="template-item-icon">${cat.icon || '📄'}</div>
    <div class="template-item-info">
      <div class="template-item-name">${t.name}</div>
      <div class="template-item-meta">${badge(t.category)} &nbsp; v${t.version}</div>
    </div>
    <svg class="template-item-arrow" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
  </div>`;
}

// ── Render: Template viewer ───────────────────────────────────────────────
function renderTemplate(id) {
  scrollTop();
  const t = TEMPLATES.find(x => x.id === id);
  if (!t) { document.getElementById('main').innerHTML = '<p>Template not found.</p>'; return; }
  const cat = CATEGORIES[t.category] || { label: t.category, icon: '📄' };
  const bodyMd = getBody(id);
  const rendered = marked.parse(bodyMd);

  document.getElementById('main').innerHTML = `
    <div class="viewer-header">
      <div class="breadcrumb">
        <a href="#/">Home</a> ›
        <a href="#/category/${t.category}">${cat.label}</a> ›
        <span>${t.name}</span>
      </div>
      <h1 class="viewer-title">${t.name}</h1>
      <div class="viewer-meta">
        ${badge(t.category)}
        <span style="color:var(--text-muted);font-size:.82rem">Version ${t.version}</span>
      </div>
      <div class="viewer-actions">
        <button class="btn btn-primary" onclick="copyTemplate('${id}')">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy
        </button>
        <button class="btn btn-outline" onclick="downloadTemplate('${id}')">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download .md
        </button>
        <button class="btn btn-outline" onclick="printTemplate()">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Print
        </button>
        <a class="btn btn-amber" href="#/fill/${id}">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Fill Template
        </a>
      </div>
    </div>
    <div class="doc-preview" id="doc-preview">${rendered}</div>
  `;
}

// ── Render: Search ────────────────────────────────────────────────────────
function renderSearch(q) {
  const ql = q.toLowerCase();
  const results = TEMPLATES.filter(t =>
    t.name.toLowerCase().includes(ql) ||
    t.category.toLowerCase().includes(ql) ||
    (CATEGORIES[t.category]?.label || '').toLowerCase().includes(ql)
  );
  scrollTop();
  const items = results.length
    ? results.map(t => templateItem(t)).join('')
    : `<div class="no-results">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        <p>No templates match "<strong>${q}</strong>".</p>
      </div>`;
  document.getElementById('main').innerHTML = `
    <div class="search-results-header">
      <div class="section-title">🔍 Search: ${q}</div>
      <div class="section-sub">${results.length} result${results.length !== 1 ? 's' : ''}</div>
    </div>
    <div class="template-list">${items}</div>
  `;
  // Sync search box
  const box = document.getElementById('search');
  if (box && box.value !== q) box.value = q;
}

// ── Actions ───────────────────────────────────────────────────────────────
async function copyTemplate(id) {
  const t = TEMPLATES.find(x => x.id === id);
  if (!t) return;
  await navigator.clipboard.writeText(t.body);
  const btn = document.querySelector('.btn-primary');
  if (btn) { btn.textContent = '✓ Copied!'; setTimeout(() => { btn.innerHTML = `<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`; }, 1800); }
}

function downloadTemplate(id) {
  const t = TEMPLATES.find(x => x.id === id);
  if (!t) return;
  const a = document.createElement('a');
  a.href = 'data:text/markdown;charset=utf-8,' + encodeURIComponent(t.body);
  a.download = t.slug + '.md';
  a.click();
}

function printTemplate() { window.print(); }

// ── Official Letterhead ───────────────────────────────────────────────────
function renderLetterhead() {
  scrollTop();
  const dataUrl = localStorage.getItem('letterhead');
  const name    = localStorage.getItem('letterhead_name') || '';
  const main    = document.getElementById('main');

  if (dataUrl) {
    main.innerHTML = `
      <h1 class="page-title">Official Letterhead</h1>
      <p class="page-sub">Used as the background for all printed documents.</p>
      <div class="lh-preview">
        <img src="${dataUrl}" alt="Company letterhead">
      </div>
      ${name ? `<p class="lh-meta">${name}</p>` : ''}
      <div class="lh-actions">
        <label class="btn btn-primary lh-upload">
          Replace
          <input type="file" accept="image/png,image/jpeg" onchange="uploadLetterhead(this)">
        </label>
        <button class="btn btn-outline" onclick="deleteLetterhead()">Delete</button>
      </div>
    `;
  } else {
    main.innerHTML = `
      <h1 class="page-title">Official Letterhead</h1>
      <p class="page-sub">Upload a letterhead to use as the background for all printed documents.</p>
      <div class="lh-empty">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M3 9h18M9 21V9"/>
        </svg>
        <div>
          <p class="lh-empty-title">No letterhead uploaded</p>
          <p class="lh-empty-sub">Upload a PNG or JPEG to use as the background for generated documents.</p>
        </div>
        <label class="btn btn-primary lh-upload">
          Upload Letterhead
          <input type="file" accept="image/png,image/jpeg" onchange="uploadLetterhead(this)">
        </label>
      </div>
    `;
  }
}

function uploadLetterhead(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    localStorage.setItem('letterhead', e.target.result);
    localStorage.setItem('letterhead_name', file.name);
    applyLetterheadPrintStyle(e.target.result);
    renderLetterhead();
  };
  reader.readAsDataURL(file);
}

function deleteLetterhead() {
  localStorage.removeItem('letterhead');
  localStorage.removeItem('letterhead_name');
  applyLetterheadPrintStyle(null);
  renderLetterhead();
}

function applyLetterheadPrintStyle(dataUrl) {
  var el = document.getElementById('letterhead-print-style');
  if (!el) {
    el = document.createElement('style');
    el.id = 'letterhead-print-style';
    document.head.appendChild(el);
  }
  el.textContent = dataUrl
    ? '@media print { #doc-preview { position: relative; } #doc-preview::before { content: ""; position: fixed; inset: 0; background-image: url("' + dataUrl + '"); background-size: 100% 100%; background-repeat: no-repeat; opacity: 0.15; z-index: -1; pointer-events: none; } }'
    : '';
}


// ── Generic Template Engine ───────────────────────────────────────────────

function extractPlaceholders(body) {
  const seen = new Set();
  const out = [];
  for (const m of body.matchAll(/\{\{([^}]+)\}\}/g)) {
    const key = m[1].trim();
    if (!seen.has(key)) { seen.add(key); out.push(key); }
  }
  return out;
}

function toLabel(key) {
  return key
    .replace(/([a-z])([A-Z])/g, '$1 $2')
    .replace(/([A-Z]+)([A-Z][a-z])/g, '$1 $2')
    .trim();
}

const MULTILINE_RE = /^(Body|Opening|Closing|Additional|Terms|Description|Reason|Notes|Paragraph|Process|Clearance|Scope|Requirements|Impact|Detail|Complaint|Observation|Summary|Remark|Agenda|Action|Appreciation|Authorization)/i;

function isMultiline(key) {
  const base = key.endsWith('Ar') ? key.slice(0, -2) : key;
  return MULTILINE_RE.test(base);
}

// ── Metadata Engine ────────────────────────────────────────────────────────

function parseScalar(v) {
  if (v === 'true') return true;
  if (v === 'false') return false;
  if (v !== '' && !isNaN(v)) return Number(v);
  if ((v.startsWith('"') && v.endsWith('"')) ||
      (v.startsWith("'") && v.endsWith("'"))) return v.slice(1, -1);
  return v;
}

// Minimal YAML parser for 4-level indented structure:
//   Level 0 (0 spaces)  : section keys  (document, form, fields, computed)
//   Level 1 (2 spaces)  : section props or field names
//   Level 2 (4 spaces)  : field properties
//   Level 3 (6 spaces)  : list items    (options)
function parseYamlSubset(text) {
  const lines = text.split('\n');
  const root = {};
  let section = null; // current level-0 key
  let field   = null; // current field name inside fields/computed
  let listKey = null; // current level-2 key collecting a list

  for (const raw of lines) {
    const trimmed = raw.trim();
    if (!trimmed || trimmed.startsWith('#')) { listKey = null; continue; }
    const indent = raw.search(/\S/);

    // List item (any indent) while a listKey is active
    if (trimmed.startsWith('- ') && listKey && section && field) {
      root[section][field][listKey].push(trimmed.slice(2).trim());
      continue;
    }
    listKey = null;

    const col = trimmed.indexOf(':');
    if (col < 0) continue;
    const key = trimmed.slice(0, col).trim();
    const val = trimmed.slice(col + 1).trim();

    if (indent === 0) {
      section = key; field = null;
      if (!root[section]) root[section] = {};
    } else if (indent === 2) {
      if (section === 'fields' || section === 'computed') {
        field = key;
        if (!root[section][field]) root[section][field] = {};
      } else if (section) {
        root[section][key] = val ? parseScalar(val) : {};
      }
    } else if (indent >= 4 && section && field) {
      if (!val) {
        root[section][field][key] = [];
        listKey = key;
      } else {
        root[section][field][key] = parseScalar(val);
      }
    }
  }
  return root;
}

function parseFrontMatter(rawBody) {
  const m = rawBody.match(/^---\r?\n([\s\S]*?)\r?\n---(?:\r?\n|$)/);
  if (!m) return { meta: {}, body: rawBody };
  return { meta: parseYamlSubset(m[1]), body: rawBody.slice(m[0].length) };
}

function getFieldDefs(t) {
  const { meta } = parseFrontMatter(t.body);
  const fieldsMap = (meta && meta.fields) ? meta.fields : null;

  if (fieldsMap) {
    const defs = Object.entries(fieldsMap).map(([key, f], idx) => ({
      key,
      label:       (f && f.label)       || toLabel(key),
      type:        (f && f.type)        || 'text',
      required:    (f && f.required)    || false,
      default:     (f && f.default != null) ? String(f.default) : '',
      placeholder: (f && f.placeholder) || '',
      group:       (f && f.group)       || '',
      options:     (f && Array.isArray(f.options)) ? f.options : [],
      order:       (f && typeof f.order === 'number') ? f.order : 9000 + idx,
    })).filter(d => d.key !== 'Logo');

    defs.sort((a, b) => a.order - b.order);

    // Safety net: any {{Token}} in the body not listed in metadata
    const metaKeys = new Set(defs.map(d => d.key));
    extractPlaceholders(t.body).forEach(key => {
      if (key !== 'Logo' && !metaKeys.has(key)) {
        defs.push({ key, label: toLabel(key),
          type: isMultiline(key) ? 'textarea' : 'text',
          required: false, default: '', placeholder: '',
          group: '(Unlisted)', options: [], order: 9999 });
      }
    });
    return defs;
  }

  // Fallback: auto-detect from placeholders (today's behaviour, unchanged)
  return extractPlaceholders(t.body)
    .filter(k => k !== 'Logo')
    .map((key, idx) => ({
      key, label: toLabel(key),
      type: isMultiline(key) ? 'textarea' : 'text',
      required: false, default: '', placeholder: '', group: '', options: [], order: idx
    }));
}

function renderField(def, templateId) {
  const star = def.required
    ? '<span class="fill-required-star" title="Required">*</span>' : '';
  const ph = def.placeholder || def.label;
  let input;

  if (def.type === 'select') {
    const opts = def.options.map(o =>
      `<option value="${o}">${o}</option>`
    ).join('');
    input = `<select class="fill-select" id="ff-${def.key}"` +
      ` onchange="livePreview('${templateId}')">` +
      `<option value="" disabled selected>— select —</option>${opts}</select>`;
  } else if (def.type === 'textarea') {
    input = `<textarea class="fill-textarea" id="ff-${def.key}"` +
      ` placeholder="${ph}\u2026" oninput="livePreview('${templateId}')"` +
      `>${def.default}</textarea>`;
  } else {
    const htmlType = {date:'date',number:'number',currency:'text',
      email:'email',phone:'tel'}[def.type] || 'text';
    input = `<input class="fill-input" id="ff-${def.key}" type="${htmlType}"` +
      ` placeholder="${ph}" value="${def.default}"` +
      ` oninput="livePreview('${templateId}')">`;
  }

  const helper = def.placeholder
    ? `<div class="fill-helper">${def.placeholder}</div>` : '';
  return `<div class="fill-field">` +
    `<label class="fill-label" for="ff-${def.key}">${def.label}${star}</label>` +
    `${input}${helper}</div>`;
}

function renderFillMode(id) {
  scrollTop();
  const t = TEMPLATES.find(x => x.id === id);
  if (!t) { document.getElementById('main').innerHTML = '<p>Template not found.</p>'; return; }
  const cat = CATEGORIES[t.category] || { label: t.category, icon: '📄' };

  const hasLogo = extractPlaceholders(t.body).includes('Logo');
  const fieldDefs = getFieldDefs(t);
  const { meta } = parseFrontMatter(t.body);
  const formMeta = (meta && meta.form) || {};
  const dir = formMeta.direction || 'ltr';

  const logoHtml = hasLogo
    ? `<div class="fill-field">
        <div class="fill-label">Logo</div>
        <p class="fill-logo-note">Uses your uploaded letterhead image.
          <a href="#/settings/letterhead">Manage in Settings →</a></p>
       </div>`
    : '';

  // Group fields — preserve insertion order, collect by group name
  const groupOrder = [];
  const groups = {};
  fieldDefs.forEach(def => {
    const g = def.group || '';
    if (!groups[g]) { groups[g] = []; groupOrder.push(g); }
    groups[g].push(def);
  });

  const formHtml = groupOrder.map(g => {
    const heading = g ? `<div class="fill-section-heading">${g}</div>` : '';
    return heading + groups[g].map(def => renderField(def, id)).join('');
  }).join('');

  document.getElementById('main').innerHTML = `
    <div class="viewer-header">
      <div class="breadcrumb">
        <a href="#/">Home</a> ›
        <a href="#/category/${t.category}">${cat.label}</a> ›
        <a href="#/template/${id}">${t.name}</a> ›
        <span>Fill</span>
      </div>
      <h1 class="viewer-title">${t.name}</h1>
      <div class="viewer-actions">
        <button class="btn btn-primary" onclick="printTemplate()">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Print Filled
        </button>
        <button class="btn btn-outline" onclick="downloadFilled('${id}')">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download Filled .md
        </button>
        <a class="btn btn-outline" href="#/template/${id}">← Back</a>
      </div>
    </div>
    <div class="fill-layout">
      <div class="fill-form" dir="${dir}">
        <div class="fill-form-title">
          Fill fields <span class="fill-count-badge">${fieldDefs.length}</span>
        </div>
        ${logoHtml}
        ${formHtml}
      </div>
      <div>
        <div class="doc-preview" id="doc-preview"></div>
      </div>
    </div>
  `;

  livePreview(id);
}

function livePreview(id) {
  const t = TEMPLATES.find(x => x.id === id);
  if (!t) return;
  const preview = document.getElementById('doc-preview');
  if (!preview) return;

  let body = getBody(id);
  const keys = extractPlaceholders(t.body);

  if (keys.includes('Logo')) {
    const lh = localStorage.getItem('letterhead');
    const logoImg = lh
      ? `<img src="${lh}" style="max-height:72px;max-width:180px;opacity:.85;display:block">`
      : '';
    body = body.replace(/\{\{Logo\}\}/g, logoImg);
  }

  keys.forEach(key => {
    if (key === 'Logo') return;
    const el = document.getElementById('ff-' + key);
    const val = el ? el.value : '';
    const escaped = key.replace(/[.*+?^${}()|[\]\\]/g, '\\// Restore letterhead print style on page load');
    const regex = new RegExp('\\{\\{' + escaped + '\\}\\}', 'g');
    body = body.replace(regex, val.trim()
      ? val
      : `<span class="ph">{{${key}}}</span>`);
  });

  preview.innerHTML = marked.parse(body);
}

function downloadFilled(id) {
  const t = TEMPLATES.find(x => x.id === id);
  if (!t) return;
  let body = getBody(id);
  const keys = extractPlaceholders(t.body);
  keys.forEach(key => {
    const el = document.getElementById('ff-' + key);
    const val = el ? el.value.trim() : '';
    const escaped = key.replace(/[.*+?^${}()|[\]\\]/g, '\\// Restore letterhead print style on page load');
    const regex = new RegExp('\\{\\{' + escaped + '\\}\\}', 'g');
    body = body.replace(regex, val);
  });
  body = body.replace(/\{\{Logo\}\}/g, '');
  const a = document.createElement('a');
  a.href = 'data:text/markdown;charset=utf-8,' + encodeURIComponent(body);
  a.download = (t.slug || id) + '-filled.md';
  a.click();
}

// Restore letterhead print style on page load
applyLetterheadPrintStyle(localStorage.getItem('letterhead'));
</script>
