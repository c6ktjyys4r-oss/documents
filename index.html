}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Render: My Documents
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function renderMyDocuments() {
  scrollTop();
  document.title = 'My Documents — Alba Docs';
  // Sort newest-modified first (matches Alba behaviour)
  const docs = DB.getAll().sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
  const main = document.getElementById('main');

  const newDocBtn = `<a href="#/home" class="btn btn-primary" onclick="closeSidebar()">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    New Document
  </a>`;

  if (!docs.length) {
    main.innerHTML = `
      <div class="page-header">
        <div class="my-docs-header-row">
          <div><h1 class="page-title">My Documents</h1><p class="page-sub">Documents you save will appear here.</p></div>
          ${newDocBtn}
        </div>
      </div>
      <div class="my-docs-empty">
        <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/>
          <path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8M16 13H8M16 17H8"/>
        </svg>
        <div class="my-docs-empty-title">No documents yet</div>
        <div class="my-docs-empty-sub">Open any template, fill in the form, then click "Save Draft" or "Publish" to keep a copy here.</div>
        <a href="#/home" class="btn btn-primary">Browse Templates</a>
      </div>`;
    return;
  }

  const counts = {
    all:       docs.length,
    published: docs.filter(d => d.status === 'published').length,
    draft:     docs.filter(d => d.status !== 'published' && d.status !== 'archived').length,
    archived:  docs.filter(d => d.status === 'archived').length,
  };

  const items = docs.map(doc => {
    const statusClass = doc.status === 'published' ? 'status-published'
                      : doc.status === 'archived'  ? 'status-archived'
                      : 'status-draft';
    const statusLabel = doc.status === 'published' ? 'Published'
                      : doc.status === 'archived'  ? 'Archived'
                      : 'Draft';
    const normStatus  = doc.status === 'published' ? 'published'
                      : doc.status === 'archived'  ? 'archived'
                      : 'draft';
    return `<div class="my-doc-item" data-status="${normStatus}">
      <div style="color:var(--text-muted);flex-shrink:0">${catIconSvg(doc.category, 20)}</div>
      <div class="my-doc-item-info">
        <div class="my-doc-item-name">${escapeHtml(doc.templateName)}</div>
        <div class="my-doc-item-meta">
          <span class="status-badge ${statusClass}">${statusLabel}</span>
          ${badge(doc.category)}
          <span>${formatDate(doc.updatedAt)}</span>
        </div>
      </div>
      <div class="my-doc-item-actions">
        <button class="btn btn-outline btn-sm" onclick="openSavedDoc('${escapeHtml(doc.id)}')">Open</button>
        <button class="btn btn-outline btn-sm" onclick="openDocHistory('${escapeHtml(doc.id)}')" title="View version history" aria-label="History for ${escapeHtml(doc.templateName)}">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
        </button>
        <button class="btn btn-outline btn-sm" onclick="duplicateSavedDoc('${escapeHtml(doc.id)}')" title="Duplicate document" aria-label="Duplicate ${escapeHtml(doc.templateName)}">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
        ${doc.status === 'archived'
          ? `<button class="btn btn-outline btn-sm" onclick="unarchiveSavedDoc('${escapeHtml(doc.id)}')" title="Restore to Drafts" aria-label="Restore ${escapeHtml(doc.templateName)}">
              <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
              </svg>
             </button>`
          : `<button class="btn btn-outline btn-sm" onclick="archiveSavedDoc('${escapeHtml(doc.id)}')" title="Archive document" aria-label="Archive ${escapeHtml(doc.templateName)}">
              <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                <polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/>
              </svg>
             </button>`}
        <button class="btn btn-danger btn-sm" onclick="deleteSavedDoc('${escapeHtml(doc.id)}')" title="Delete document" aria-label="Delete ${escapeHtml(doc.templateName)}">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6M14 11v6M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>
        </button>
      </div>
    </div>`;
  }).join('');

  main.innerHTML = `
    <div class="page-header">
      <div class="my-docs-header-row">
        <div>
          <h1 class="page-title">My Documents</h1>
          <p class="page-sub">${docs.length} saved document${docs.length !== 1 ? 's' : ''}</p>
        </div>
        ${newDocBtn}
      </div>
    </div>
    <div class="doc-filter-tabs" id="doc-filter-tabs">
      <button class="doc-filter-tab active" onclick="filterMyDocs('all')" data-filter="all">All <span class="doc-filter-tab-count">${counts.all}</span></button>
      <button class="doc-filter-tab" onclick="filterMyDocs('published')" data-filter="published">Published <span class="doc-filter-tab-count">${counts.published}</span></button>
      <button class="doc-filter-tab" onclick="filterMyDocs('draft')" data-filter="draft">Draft <span class="doc-filter-tab-count">${counts.draft}</span></button>
      <button class="doc-filter-tab" onclick="filterMyDocs('archived')" data-filter="archived">Archived <span class="doc-filter-tab-count">${counts.archived}</span></button>
    </div>
    <div class="my-docs-list" id="my-docs-list">${items}</div>
    <div class="my-docs-toolbar" style="margin-top:18px;padding-top:14px;border-top:1px solid var(--border);">
      <button class="btn btn-outline btn-sm" onclick="if(DB.exportJson())showToast('Documents exported','success')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Export JSON
      </button>
      <label class="btn btn-outline btn-sm" title="Restore documents from a previously exported JSON file">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 14 12 9 17 14"/><line x1="12" y1="9" x2="12" y2="21"/>
        </svg>
        Import JSON
        <input type="file" accept=".json,application/json" style="display:none" onchange="importJsonFile(this)">
      </label>
    </div>`;
}

/**
 * Handle the Import JSON file-input change event.
 * Reads the selected file, parses it, merges into the store, re-renders.
 */
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Version history modal
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
let _historyDocId = null;

function openDocHistory(docId) {
  const doc = DB.getById(docId);
  if (!doc) return;
  _historyDocId = docId;

  const titleEl = document.getElementById('history-dialog-title');
  if (titleEl) titleEl.textContent = doc.templateName + ' — Version History';

  const versions = History.get(docId);
  const listEl   = document.getElementById('history-list');

  if (!versions.length) {
    listEl.innerHTML = `<div class="history-empty">No previous versions yet.<br>Each time you save changes to this document, the previous version is stored here.</div>`;
  } else {
    listEl.innerHTML = versions.map((v, idx) => {
      const fieldCount  = Object.values(v.fields || {}).filter(Boolean).length;
      const fieldSample = Object.entries(v.fields || {}).filter(([, val]) => val).slice(0, 3).map(([k, val]) => `${k}: ${String(val).slice(0, 30)}`).join(' · ');
      return `<div class="history-item">
        <div class="history-item-meta">
          <div class="history-item-date">${new Date(v.savedAt).toLocaleString([], { dateStyle: 'medium', timeStyle: 'short' })} — ${v.status === 'published' ? 'Published' : 'Draft'}</div>
          <div class="history-item-fields">${fieldSample || 'No fields filled'}${fieldCount > 3 ? ' …' : ''}</div>
        </div>
        <button class="btn btn-outline btn-sm" onclick="restoreDocVersion('${escapeHtml(docId)}', ${idx})" title="Restore this version">Restore</button>
      </div>`;
    }).join('');
  }

  const backdrop = document.getElementById('history-backdrop');
  backdrop.classList.add('open');
  document.body.style.overflow = 'hidden';
  // Auto-focus close button and trap keyboard focus inside dialog
  const dialog = document.querySelector('.history-dialog');
  requestAnimationFrame(() => trapFocus(dialog, dialog.querySelector('.history-close')));
}

function closeDocHistory() {
  document.getElementById('history-backdrop').classList.remove('open');
  document.body.style.overflow = '';
  releaseFocusTrap();
  _historyDocId = null;
}

function handleHistoryBackdropClick(e) {
  if (e.target === document.getElementById('history-backdrop')) closeDocHistory();
}

function restoreDocVersion(docId, versionIdx) {
  const doc = DB.getById(docId);
  if (!doc) return;
  const versions = History.get(docId);
  const version  = versions[versionIdx];
  if (!version) return;

  const restored = {
    ...doc,
    fields:    version.fields,
    status:    version.status,
    updatedAt: new Date().toISOString(),
  };
  DB.save(restored);
  closeDocHistory();
  showToast('Version restored', 'success');
  renderMyDocuments();
}

function importJsonFile(input) {
  const file = input.files[0];
  if (!file) return;
  // Reset so the same file can be re-selected if needed
  input.value = '';
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(e.target.result);
      const { imported, skipped } = DB.importDocs(parsed);
      const skipNote = skipped > 0 ? ` (${skipped} skipped — invalid)` : '';
      showToast(`Imported ${imported} document${imported !== 1 ? 's' : ''}${skipNote}`, 'success');
      renderMyDocuments();
    } catch (err) {
      showToast('Import failed — file does not appear to be a valid Alba Docs JSON export', 'error');
    }
  };
  reader.readAsText(file);
}

function openSavedDoc(docId) {
  const doc = DB.getById(docId);
  if (!doc) return;
  Drafts.save(doc.templateId, doc.fields);
  sessionStorage.setItem('editing_doc_id', docId);
  location.hash = '#/fill/' + doc.templateId;
}

function deleteSavedDoc(docId) {
  const doc = DB.getById(docId);
  const name = doc ? doc.templateName : 'document';
  DB.delete(docId);
  showToast(`"${name}" deleted`, 'info');
  renderMyDocuments();
}

function archiveSavedDoc(docId) {
  const doc = DB.getById(docId);
  if (!doc) return;
  DB.save({ ...doc, status: 'archived', updatedAt: new Date().toISOString() });
  showToast(`"${doc.templateName}" archived`, 'info');
  renderMyDocuments();
}

function unarchiveSavedDoc(docId) {
  const doc = DB.getById(docId);
  if (!doc) return;
  DB.save({ ...doc, status: 'draft', updatedAt: new Date().toISOString() });
  showToast(`"${doc.templateName}" restored to Drafts`, 'info');
  renderMyDocuments();
}

function duplicateSavedDoc(docId) {
  const doc = DB.getById(docId);
  if (!doc) return;
  const now = new Date().toISOString();
  DB.save({
    id:           genDocId(),
    templateId:   doc.templateId,
    templateName: doc.templateName,
    category:     doc.category,
    fields:       { ...doc.fields },
    status:       'draft',
    createdAt:    now,
    updatedAt:    now,
  });
  showToast(`"${doc.templateName}" duplicated`, 'success');
  renderMyDocuments();
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Render: Appearance settings
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function renderAppearanceSettings() {
  scrollTop();
  document.title = 'Appearance — Alba Docs';
  const saved = localStorage.getItem('theme') || 'system';
  const main  = document.getElementById('main');

  const opt = (val, label, iconPath) => {
    const sel = (val === 'system' ? (saved !== 'light' && saved !== 'dark') : saved === val);
    return `<button class="theme-option${sel ? ' selected' : ''}" onclick="setThemePref('${val}')" aria-pressed="${sel}">
      <span class="theme-option-icon">
        <svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24" aria-hidden="true">${iconPath}</svg>
      </span>
      ${label}
    </button>`;
  };

  main.innerHTML = `
    <div class="breadcrumb"><a href="#/">Home</a> <span class="breadcrumb-sep">›</span> Settings <span class="breadcrumb-sep">›</span> Appearance</div>
    <div class="page-header">
      <h1 class="page-title">Appearance</h1>
      <p class="page-sub">Choose how Alba Docs looks on this device.</p>
    </div>
    <div class="settings-section">
      <div class="settings-section-title">Theme</div>
      <div class="settings-section-sub">Select a colour scheme or let the system decide automatically.</div>
      <div class="theme-options">
        ${opt('light', 'Light', '<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>')}
        ${opt('dark',  'Dark',  '<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>')}
        ${opt('system','System','<rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>')}
      </div>
    </div>`;
}

function setThemePref(pref) {
  const prefersDark = matchMedia('(prefers-color-scheme:dark)').matches;
  const isDark = pref === 'dark' || (pref === 'system' && prefersDark);
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : '');
  if (pref === 'system') {
    localStorage.removeItem('theme');
  } else {
    localStorage.setItem('theme', pref);
  }
  renderAppearanceSettings();
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Render: Data & Storage settings
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function renderDataSettings() {
  scrollTop();
  document.title = 'Data & Storage — Alba Docs';
  const main = document.getElementById('main');

  // Estimate localStorage usage
  let usedBytes = 0;
  try {
    for (const key of Object.keys(localStorage)) {
      usedBytes += ((localStorage.getItem(key) || '').length + key.length) * 2;
    }
  } catch (e) { /* ignore */ }
  const usedKb   = (usedBytes / 1024).toFixed(1);
  const quotaKb  = 5120; // 5 MB typical quota
  const pct      = Math.min(100, Math.round(usedBytes / 1024 / quotaKb * 100));
  const docCount = DB.getAll().length;
  const draftKeys = Object.keys(localStorage).filter(k => k.startsWith('draft_'));

  main.innerHTML = `
    <div class="breadcrumb"><a href="#/">Home</a> <span class="breadcrumb-sep">›</span> Settings <span class="breadcrumb-sep">›</span> Data &amp; Storage</div>
    <div class="page-header">
      <h1 class="page-title">Data &amp; Storage</h1>
      <p class="page-sub">All data is stored locally in this browser. Nothing is sent to a server.</p>
    </div>
    <div class="settings-section">
      <div class="settings-section-title">Storage Usage</div>
      <div class="settings-section-sub">Approximate browser storage used by Alba Docs on this device.</div>
      <div class="storage-bar-wrap">
        <div class="storage-bar-label">
          <span>${usedKb} KB used</span>
          <span>${docCount} document${docCount !== 1 ? 's' : ''} · ${draftKeys.length} draft${draftKeys.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="storage-bar"><div class="storage-bar-fill" style="width:${pct}%"></div></div>
      </div>
    </div>
    <div class="settings-section">
      <div class="settings-section-title">Manage Data</div>
      <div class="settings-section-sub">These actions cannot be undone. Export your documents first if you need a backup.</div>
      <div class="settings-action-row">
        <div>
          <div class="settings-action-label">Clear autosaved drafts</div>
          <div class="settings-action-sub">${draftKeys.length} draft${draftKeys.length !== 1 ? 's' : ''} stored. Removes autosaved form data; saved documents are not affected.</div>
        </div>
        <button class="btn btn-outline btn-sm" onclick="settingsClearDrafts()" ${draftKeys.length === 0 ? 'disabled' : ''}>Clear</button>
      </div>
      <div class="settings-action-row">
        <div>
          <div class="settings-action-label">Delete all saved documents</div>
          <div class="settings-action-sub">Permanently removes all ${docCount} document${docCount !== 1 ? 's' : ''} from My Documents.</div>
        </div>
        <button class="btn btn-danger btn-sm" onclick="settingsClearDocuments()" ${docCount === 0 ? 'disabled' : ''}>Delete All</button>
      </div>
      <div class="settings-action-row">
        <div>
          <div class="settings-action-label">Reset everything</div>
          <div class="settings-action-sub">Clears all documents, drafts, letterhead, and preferences. Resets to factory defaults.</div>
        </div>
        <button class="btn btn-danger btn-sm" onclick="settingsResetAll()">Reset</button>
      </div>
    </div>`;
}

function settingsClearDrafts() {
  const keys = Object.keys(localStorage).filter(k => k.startsWith('draft_'));
  keys.forEach(k => localStorage.removeItem(k));
  showToast(`${keys.length} draft${keys.length !== 1 ? 's' : ''} cleared`, 'info');
  renderDataSettings();
}

function settingsClearDocuments() {
  const count = DB.getAll().length;
  if (!count) return;
  if (!confirm(`Delete all ${count} saved document${count !== 1 ? 's' : ''}? This cannot be undone.`)) return;
  DB.getAll().forEach(d => DB.delete(d.id));
  Object.keys(localStorage).filter(k => k.startsWith('history_')).forEach(k => localStorage.removeItem(k));
  showToast('All documents deleted', 'info');
  renderDataSettings();
}

function settingsResetAll() {
  if (!confirm('Reset everything? This deletes all documents, drafts, letterhead, and preferences. This cannot be undone.')) return;
  localStorage.clear();
  document.documentElement.setAttribute('data-theme',
    matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : '');
  showToast('All data cleared', 'info');
  renderDataSettings();
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Render: Category list / All templates
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function renderCategory(cat) {
  const list = TEMPLATES.filter(t => t.category === cat);
  const info = CATEGORIES[cat] || { label: cat };
  renderList(list, info.label, cat, true);
}

function renderList(list, title, catKey, showBreadcrumb) {
  scrollTop();
  document.title = title + ' — Alba Docs';

  const breadcrumb = showBreadcrumb
    ? `<div class="breadcrumb"><a href="#/">Home</a> <span class="breadcrumb-sep">›</span> <span>${escapeHtml(title)}</span></div>`
    : '';

  const iconHtml = catKey ? `<span style="color:var(--text-muted);display:flex;align-items:center">${catIconSvg(catKey, 20)}</span>` : '';

  const items = list.length
    ? list.map(t => documentItem(t)).join('')
    : `<div class="no-results">
        <svg width="44" height="44" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
        <p>No documents found.</p>
      </div>`;

  document.getElementById('main').innerHTML = `
    ${breadcrumb}
    <div class="list-header">
      <div class="section-title">${iconHtml}${escapeHtml(title)}</div>
      <div class="section-sub">${list.length} template${list.length !== 1 ? 's' : ''}</div>
    </div>
    <div class="template-list">${items}</div>`;
}

function documentItem(t) {
  return `<div class="template-item" onclick="location.hash='#/fill/${escapeHtml(t.id)}'" role="button" tabindex="0"
    onkeydown="if(event.key==='Enter'||event.key===' ')location.hash='#/fill/${escapeHtml(t.id)}'">
    <div class="template-item-icon">${catIconSvg(t.category, 20)}</div>
    <div class="template-item-info">
      <div class="template-item-name">${escapeHtml(t.name)}</div>
      <div class="template-item-meta">${badge(t.category)}</div>
    </div>
    <div class="template-item-cta">Use</div>
  </div>`;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Render: Search
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function renderSearch(q) {
  const ql = q.toLowerCase();
  const results = TEMPLATES.filter(t =>
    t.name.toLowerCase().includes(ql) ||
    t.category.toLowerCase().includes(ql) ||
    (CATEGORIES[t.category]?.label || '').toLowerCase().includes(ql)
  );
  scrollTop();
  document.title = 'Search: ' + q + ' — Alba Docs';

  const items = results.length
    ? results.map(t => documentItem(t)).join('')
    : `<div class="no-results">
        <svg width="44" height="44" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
        <p>No results for "<strong>${escapeHtml(q)}</strong>".</p>
      </div>`;

  document.getElementById('main').innerHTML = `
    <div class="breadcrumb"><a href="#/">Home</a> <span class="breadcrumb-sep">›</span> Search</div>
    <div class="list-header search-results-header">
      <div class="section-title">Results for: ${escapeHtml(q)}</div>
      <div class="section-sub">${results.length} result${results.length !== 1 ? 's' : ''}</div>
    </div>
    <div class="template-list">${items}</div>`;

  const box = document.getElementById('search');
  if (box && box.value !== q) box.value = q;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Render: Letterhead settings
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function renderLetterhead() {
  scrollTop();
  document.title = 'Stationery — Alba Docs';
  const dataUrl = localStorage.getItem('letterhead');
  const name    = localStorage.getItem('letterhead_name') || '';
  const main    = document.getElementById('main');

  const breadcrumb = `<div class="breadcrumb"><a href="#/">Home</a> <span class="breadcrumb-sep">›</span> Settings <span class="breadcrumb-sep">›</span> Stationery</div>`;

  if (dataUrl) {
    main.innerHTML = `
      ${breadcrumb}
      <div class="page-header">
        <h1 class="page-title">Stationery</h1>
        <p class="page-sub">This image appears at the top of every document you generate.</p>
      </div>
      <div class="lh-preview">
        <img src="${dataUrl}" alt="Company letterhead">
      </div>
      ${name ? `<p class="lh-meta">${escapeHtml(name)}</p>` : ''}
      <div class="lh-actions">
        <label class="btn btn-primary lh-upload">
          Replace Letterhead
          <input type="file" accept="image/png,image/jpeg,image/webp" onchange="uploadLetterhead(this)">
        </label>
        <button class="btn btn-outline" onclick="deleteLetterhead()">Remove</button>
      </div>`;
  } else {
    main.innerHTML = `
      ${breadcrumb}
      <div class="page-header">
        <h1 class="page-title">Stationery</h1>
        <p class="page-sub">Upload your company letterhead — it will appear at the top of every generated document, exactly as in print.</p>
      </div>
      <div class="lh-empty">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <path d="M3 9h18M9 21V9"/>
        </svg>
        <div>
          <p class="lh-empty-title">No letterhead uploaded</p>
          <p class="lh-empty-sub">Upload a PNG, JPEG, or WebP image. It will appear as a proper image at the top of every document — not as a background watermark.</p>
        </div>
        <label class="btn btn-primary lh-upload">
          Upload Letterhead
          <input type="file" accept="image/png,image/jpeg,image/webp" onchange="uploadLetterhead(this)">
        </label>
      </div>`;
  }
}

function uploadLetterhead(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) {
    showToast('Image too large. Please use an image under 5 MB.', 'error');
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    try {
      localStorage.setItem('letterhead', e.target.result);
      localStorage.setItem('letterhead_name', file.name);
      showToast('Letterhead saved', 'success');
      renderLetterhead();
    } catch (err) {
      showToast('Storage full — try a smaller image.', 'error');
    }
  };
  reader.readAsDataURL(file);
}

function deleteLetterhead() {
  localStorage.removeItem('letterhead');
  localStorage.removeItem('letterhead_name');
  showToast('Letterhead removed', 'info');
  renderLetterhead();
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Front-matter / field definition parser
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function parseScalar(v) {
  if (v === 'true')  return true;
  if (v === 'false') return false;
  if (v !== '' && !isNaN(v)) return Number(v);
  if ((v.startsWith('"') && v.endsWith('"')) || (v.startsWith("'") && v.endsWith("'"))) return v.slice(1, -1);
  return v;
}

function parseYamlSubset(text) {
  const lines = text.split('\n');
  const root  = {};
  let section = null, field = null, listKey = null;

  for (const raw of lines) {
    const trimmed = raw.trim();
    if (!trimmed || trimmed.startsWith('#')) { listKey = null; continue; }
    const indent = raw.search(/\S/);

    if (trimmed.startsWith('- ') && listKey && section && field) {
      root[section][field][listKey].push(trimmed.slice(2).trim());
      continue;
    }
    listKey = null;

    const col = trimmed.indexOf(':');
    if (col < 0) continue;
    const key = trimmed.slice(0, col).trim();
    const val = trimmed.slice(col + 1).trim();

    if (indent === 0) {
      section = key; field = null;
      if (!root[section]) root[section] = {};
    } else if (indent === 2) {
      if (section === 'fields' || section === 'computed') {
        field = key;
        if (!root[section][field]) root[section][field] = {};
      } else if (section) {
        root[section][key] = val ? parseScalar(val) : {};
      }
    } else if (indent >= 4 && section && field) {
      if (!val) { root[section][field][key] = []; listKey = key; }
      else root[section][field][key] = parseScalar(val);
    }
  }
  return root;
}

function parseFrontMatter(rawBody) {
  const m = rawBody.match(/^---\r?\n([\s\S]*?)\r?\n---(?:\r?\n|$)/);
  if (!m) return { meta: {}, body: rawBody };
  return { meta: parseYamlSubset(m[1]), body: rawBody.slice(m[0].length) };
}

/** Convert a camelCase / PascalCase / snake_case key to a human label. */
function toLabel(key) {
  return key
    .replace(/_/g, ' ')
    .replace(/([a-z])([A-Z])/g, '$1 $2')
    .replace(/([A-Z]+)([A-Z][a-z])/g, '$1 $2')
    .trim();
}

/** Heuristic: should this key produce a textarea? */
const MULTILINE_RE = /^(Body|Opening|Closing|Additional|Terms|Description|Reason|Notes|Paragraph|Process|Clearance|Scope|Requirements|Impact|Detail|Complaint|Observation|Summary|Remark|Agenda|Action|Appreciation|Authorization|Content|Text|Message|Comment)/i;
function isMultiline(key) {
  return MULTILINE_RE.test(key.replace(/Ar$/, ''));
}

/** Heuristic: should this key be a date input? */
const DATE_RE = /Date|DOB|Dob|dob|Since|From|To|Expiry|Expir/;
function isDateKey(key) { return DATE_RE.test(key); }

/** Heuristic: should this key be a number input? */
const NUMBER_RE = /Amount|Salary|Total|Gross|Net|Tax|Loan|Balance|Rate|Days|Hours|Quantity|Qty/i;
function isNumberKey(key) { return NUMBER_RE.test(key); }

/**
 * Return an ordered array of field definition objects for a template.
 * Uses YAML front-matter `fields:` block when present; falls back to
 * placeholder heuristics otherwise.
 */
function getFieldDefs(rawText) {
  const { meta } = parseFrontMatter(rawText);
  const fieldsMap = meta?.fields || null;

  if (fieldsMap) {
    const defs = Object.entries(fieldsMap).map(([key, f], idx) => ({
      key,
      label:       f?.label       || toLabel(key),
      type:        f?.type        || (isDateKey(key) ? 'date' : isNumberKey(key) ? 'number' : isMultiline(key) ? 'textarea' : 'text'),
      required:    f?.required    || false,
      default:     f?.default != null ? String(f.default) : '',
      placeholder: f?.placeholder || '',
      group:       f?.group       || '',
      options:     Array.isArray(f?.options) ? f.options : [],
      order:       typeof f?.order === 'number' ? f.order : 9000 + idx,
    })).filter(d => d.key !== 'Logo');

    defs.sort((a, b) => a.order - b.order);

    // Add any placeholder keys that aren't in the YAML definition
    const metaKeys = new Set(defs.map(d => d.key));
    extractPlaceholders(rawText).forEach(key => {
      if (key !== 'Logo' && !metaKeys.has(key)) {
        defs.push({
          key, label: toLabel(key),
          type: isDateKey(key) ? 'date' : isNumberKey(key) ? 'number' : isMultiline(key) ? 'textarea' : 'text',
          required: false, default: '', placeholder: '', group: '', options: [], order: 9999,
        });
      }
    });
    return defs;
  }

  // No YAML fields block — derive from placeholders
  return extractPlaceholders(rawText)
    .filter(k => k !== 'Logo')
    .map((key, idx) => ({
      key, label: toLabel(key),
      type: isDateKey(key) ? 'date' : isNumberKey(key) ? 'number' : isMultiline(key) ? 'textarea' : 'text',
      required: false, default: '', placeholder: '', group: '', options: [], order: idx,
    }));
}

/** Render a single form field. */
function renderField(def, templateId) {
  const star = def.required ? `<span class="fill-required-star" title="Required field">*</span>` : '';
  const ph   = def.placeholder || def.label;
  const id   = 'ff-' + def.key;
  const change = `onchange="clearFieldError('${escapeHtml(def.key)}');onFieldChange('${escapeHtml(templateId)}')"`;
  const input_  = `oninput="clearFieldError('${escapeHtml(def.key)}');onFieldChange('${escapeHtml(templateId)}')"`;
  const blur_   = def.required ? `onblur="validateFieldOnBlur('${escapeHtml(def.key)}')"` : '';
  let input;

  if (def.type === 'select') {
    const opts = def.options.map(o => `<option value="${escapeHtml(o)}">${escapeHtml(o)}</option>`).join('');
    input = `<select class="fill-select" id="${id}" ${change} ${blur_}>
      <option value="" disabled selected>— select —</option>${opts}
    </select>`;
  } else if (def.type === 'textarea') {
    input = `<textarea class="fill-textarea" id="${id}" placeholder="${escapeHtml(ph)}…" rows="3" ${input_} ${blur_}>${escapeHtml(def.default)}</textarea>`;
  } else {
    const htmlType  = { date:'date', number:'number', currency:'text', email:'email', phone:'tel' }[def.type] || 'text';
    const extraAttr = def.type === 'currency' ? ' inputmode="decimal"'
                    : def.type === 'phone'    ? ' inputmode="tel"'
                    : '';
    input = `<input class="fill-input" id="${id}" type="${htmlType}" placeholder="${escapeHtml(ph)}" value="${escapeHtml(def.default)}"${extraAttr} ${input_} ${blur_}>`;
  }

  const helper = def.placeholder
    ? `<div class="fill-helper">${escapeHtml(def.placeholder)}</div>` : '';

  return `<div class="fill-field" id="ff-wrap-${def.key}">
    <label class="fill-label" for="${id}">${escapeHtml(def.label)}${star}</label>
    ${input}${helper}
    <div class="fill-error-msg" id="ff-err-${def.key}" role="alert" aria-live="polite"></div>
  </div>`;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Fill mode state (module-level, reset on each renderFillMode call)
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
let _currentFieldDefs  = null;
let _currentTemplateId = null;
let _saveTimer         = null;

/** Collect current field values from the DOM into a plain object. */
function collectFields() {
  if (!_currentFieldDefs) return {};
  const out = {};
  _currentFieldDefs.forEach(def => {
    const el = document.getElementById('ff-' + def.key);
    if (el) out[def.key] = el.value;
  });
  return out;
}

/** Called on every keystroke — debounce autosave, trigger live preview. */
function onFieldChange(templateId) {
  livePreview(templateId);
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => persistDraft(templateId), 700);
}

function persistDraft(templateId) {
  Drafts.save(templateId, collectFields());
  const indicator = document.getElementById('saved-indicator');
  const span      = document.getElementById('saved-indicator-text');
  if (indicator && span) {
    span.textContent = 'Saved';
    indicator.classList.add('visible');
  }
}

/**
 * Clear the validation error state for a single field.
 * Called by inline oninput/onchange handlers when the user edits a field.
 */
function clearFieldError(key) {
  const wrap  = document.getElementById('ff-wrap-' + key);
  const errEl = document.getElementById('ff-err-' + key);
  if (wrap)  wrap.classList.remove('has-error');
  if (errEl) errEl.textContent = '';
}

/**
 * Validate a single required field on blur.
 * Shows an inline error if the field is empty; clears it once the user fills it.
 */
function validateFieldOnBlur(key) {
  if (!_currentFieldDefs) return;
  const def = _currentFieldDefs.find(f => f.key === key);
  if (!def || !def.required) return;
  const el = document.getElementById('ff-' + key);
  if (!el) return;
  if (el.value.trim()) { clearFieldError(key); return; }
  const wrap  = document.getElementById('ff-wrap-' + key);
  const errEl = document.getElementById('ff-err-' + key);
  if (wrap)  wrap.classList.add('has-error');
  if (errEl) errEl.textContent = 'This field is required before publishing';
}

/**
 * Validate all required fields in the current form.
 * Marks empty required fields with red border + inline error message,
 * scrolls to the first violation, and shows a toast.
 * Returns true if all required fields are filled, false otherwise.
 */
function validateRequiredFields() {
  if (!_currentFieldDefs) return true;
  const required = _currentFieldDefs.filter(f => f.required);
  if (required.length === 0) return true;

  let firstViolation = null;
  let errorCount = 0;

  required.forEach(def => {
    const el  = document.getElementById('ff-' + def.key);
    const val = el ? el.value.trim() : '';
    if (!val) {
      errorCount++;
      const wrap  = document.getElementById('ff-wrap-' + def.key);
      const errEl = document.getElementById('ff-err-' + def.key);
      if (wrap)  wrap.classList.add('has-error');
      if (errEl) errEl.textContent = 'This field is required before publishing';
      if (!firstViolation && wrap) firstViolation = wrap;
    }
  });

  if (firstViolation) {
    firstViolation.scrollIntoView({ behavior: 'smooth', block: 'center' });
    const plural = errorCount === 1 ? 'field' : 'fields';
    showToast(`${errorCount} required ${plural} must be filled before publishing`, 'error');
    return false;
  }
  return true;
}

/** Save the current form state to the document store with the given status. */
function saveDocAs(templateId, status) {
  if (status === 'published' && !validateRequiredFields()) return;
  const t = TEMPLATES.find(x => x.id === templateId);
  if (!t) return;
  const fields    = collectFields();
  const editingId = sessionStorage.getItem('editing_doc_id');
  const existing  = editingId ? DB.getById(editingId) : null;
  const now       = new Date().toISOString();
  const doc = {
    id:           existing ? existing.id : genDocId(),
    templateId,
    templateName: t.name,
    category:     t.category,
    fields,
    status,
    createdAt:    existing ? existing.createdAt : now,
    updatedAt:    now,
  };
  DB.save(doc);
  sessionStorage.setItem('editing_doc_id', doc.id);
  const label = status === 'published' ? 'Document published' : 'Document saved';
  showToast(label, 'success');
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Fill-mode helpers (extracted for readability)
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

/**
 * Build the grouped form HTML from field definitions.
 * Inserts a section heading before each named group.
 */
function buildFormHtml(fieldDefs, templateId) {
  const groupOrder = [];
  const groups     = {};
  fieldDefs.forEach(def => {
    const g = def.group || '';
    if (!groups[g]) { groups[g] = []; groupOrder.push(g); }
    groups[g].push(def);
  });
  return groupOrder.map(g => {
    const heading = g ? `<div class="fill-section-heading">${escapeHtml(g)}</div>` : '';
    return heading + groups[g].map(def => renderField(def, templateId)).join('');
  }).join('');
}

/**
 * Build the letterhead note displayed inside the form panel.
 * Shows the current state and a link to the letterhead settings.
 */
function buildLogoNote(lhSet) {
  const note = lhSet ? 'Using your uploaded company letterhead.' : 'No letterhead uploaded.';
  const link = lhSet ? 'Change →' : 'Set up →';
  return `<div class="fill-field">
    <div class="fill-label">Letterhead</div>
    <p class="fill-logo-note">${note} <a href="#/settings/letterhead">${link}</a></p>
  </div>`;
}

/**
 * Build the amber warning banner shown when a template uses {{Logo}}
 * but no letterhead has been uploaded yet.
 */
function buildLhWarning() {
  return `<div style="background:#fff8dc;border:1px solid #e5c84a;border-radius:5px;padding:9px 11px;font-size:.78rem;color:#7a5800;margin-bottom:12px">
    No letterhead configured. <a href="#/settings/letterhead" style="color:var(--amber-ui);font-weight:600">Upload one →</a>
  </div>`;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Render: Fill mode
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
async function renderFillMode(id) {
  scrollTop();
  const t = TEMPLATES.find(x => x.id === id);
  if (!t) { document.getElementById('main').innerHTML = '<p style="color:var(--text-muted);padding:40px 0">Template not found.</p>'; return; }

  document.title = t.name + ' — Alba Docs';
  const cat  = CATEGORIES[t.category] || { label: t.category };
  const main = document.getElementById('main');

  // Show loading state while fetching the template markdown
  main.innerHTML = `<div class="loading-state">
    <div class="spinner"></div>
    <span style="font-size:.875rem;color:var(--text-muted)">Loading ${escapeHtml(t.name)}…</span>
  </div>`;

  let rawText;
  try {
    rawText = await loadTemplate(id);
  } catch (err) {
    main.innerHTML = `
      <div class="breadcrumb"><a href="#/">Home</a> <span class="breadcrumb-sep">›</span> <a href="#/category/${escapeHtml(t.category)}">${escapeHtml(cat.label)}</a> <span class="breadcrumb-sep">›</span> ${escapeHtml(t.name)}</div>
      <div class="error-state">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <div class="error-state-text">
          <strong>Could not load template</strong>
          <p>${escapeHtml(err.message)}</p>
        </div>
      </div>`;
    return;
  }

  const fieldDefs = getFieldDefs(rawText);
  _currentFieldDefs  = fieldDefs;
  _currentTemplateId = id;

  const hasLogo = extractPlaceholders(rawText).includes('Logo');
  const lhSet   = !!localStorage.getItem('letterhead');
  const { meta } = parseFrontMatter(rawText);
  const dir     = meta?.form?.direction || 'ltr';

  // Use extracted helpers to build each section of the form panel
  const formHtml  = buildFormHtml(fieldDefs, id);
  const logoHtml  = hasLogo ? buildLogoNote(lhSet) : '';
  const lhWarning = hasLogo && !lhSet ? buildLhWarning() : '';

  // Guard against a stale editing session from a different template
  const editingId = sessionStorage.getItem('editing_doc_id');
  const existingDoc = editingId ? DB.getById(editingId) : null;
  if (existingDoc && existingDoc.templateId !== id) sessionStorage.removeItem('editing_doc_id');

  main.innerHTML = `
    <div class="doc-screen-header">
      <div class="breadcrumb">
        <a href="#/">Home</a>
        <span class="breadcrumb-sep">›</span>
        <a href="#/category/${escapeHtml(t.category)}">${escapeHtml(cat.label)}</a>
        <span class="breadcrumb-sep">›</span>
        <span>${escapeHtml(t.name)}</span>
      </div>
      <h1 class="doc-title">${escapeHtml(t.name)}</h1>
      <div class="doc-actions">
        <button class="btn btn-print" onclick="printDocument('${escapeHtml(id)}')">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <polyline points="6 9 6 2 18 2 18 9"/>
            <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
            <rect x="6" y="14" width="12" height="8"/>
          </svg>
          Print
        </button>
        <button class="btn btn-outline" onclick="openPagePreview('${escapeHtml(id)}')" title="Preview exact page layout before printing">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
          </svg>
          Preview
        </button>
        <button class="btn btn-outline" onclick="saveDocAs('${escapeHtml(id)}','draft')">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
            <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
          </svg>
          Save Draft
        </button>
        <button class="btn btn-primary" onclick="saveDocAs('${escapeHtml(id)}','published')">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          Publish
        </button>
        <a class="btn btn-outline" href="#/category/${escapeHtml(t.category)}">← Back to Library</a>
      </div>
      <p class="doc-print-note">Printed documents are not saved automatically.</p>
    </div>

    <div class="fill-layout">
      <!-- Form panel -->
      <div class="fill-form" dir="${dir}">
        <div class="fill-form-header">
          <div class="fill-form-header-row">
            <div>
              <div class="fill-form-header-title">Document Fields</div>
              <div class="fill-form-header-sub">${
                fieldDefs.length > 0
                  ? `${fieldDefs.length} field${fieldDefs.length !== 1 ? 's' : ''} — preview updates live`
                  : 'Read-only template — use Print'
              }</div>
            </div>
            ${fieldDefs.length > 0 ? `<button class="btn-clear-draft" onclick="clearDraftAndReset('${escapeHtml(id)}')" title="Clear saved draft">Clear</button>` : ''}
          </div>
          <div class="fill-saved-indicator" id="saved-indicator">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
            <span id="saved-indicator-text"></span>
          </div>
        </div>
        <div class="fill-form-body">
          ${lhWarning}${logoHtml}${formHtml || `<p style="color:var(--text-muted);font-size:.85rem;padding:8px 0 4px">
            This is a structured reference template with no fillable fields.<br>
            Review the document in the preview, then use <strong>Print</strong> to export it.
          </p>`}
        </div>
      </div>

      <!-- Preview column -->
      <div>
        <div class="preview-col-label">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
          Document Preview
        </div>
        <div class="preview-page-wrap">
          <div class="doc-preview" id="doc-preview" aria-label="Document Preview" dir="${dir}"></div>
        </div>
      </div>
    </div>`;

  // Restore autosaved draft
  const draft = Drafts.load(id);
  if (draft?.fields) {
    Object.entries(draft.fields).forEach(([key, val]) => {
      const el = document.getElementById('ff-' + key);
      if (el) el.value = val;
    });
    const indicator = document.getElementById('saved-indicator');
    const span      = document.getElementById('saved-indicator-text');
    if (indicator && span && draft.savedAt) {
      span.textContent = 'Saved';
      indicator.classList.add('visible');
    }
  }

  livePreview(id);
}

function clearDraftAndReset(templateId) {
  Drafts.clear(templateId);
  sessionStorage.removeItem('editing_doc_id');
  showToast('Draft cleared', 'info');
  renderFillMode(templateId);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Live preview
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
async function livePreview(id) {
  const preview = document.getElementById('doc-preview');
  if (!preview) return;
  try {
    const rawText = await loadTemplate(id);
    const body    = getBody(rawText);
    const keys    = extractPlaceholders(rawText);
    const substituted = substituteFields(body, keys, k => {
      const el = document.getElementById('ff-' + k);
      return el ? el.value : '';
    }, false);
    preview.innerHTML = marked.parse(substituted);
  } catch (e) {
    // Silent — error already shown by renderFillMode
  }
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Print / Save as PDF
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
async function printDocument(id) {
  const t = TEMPLATES.find(x => x.id === id);
  if (!t) return;

  let rawText;
  try {
    rawText = await loadTemplate(id);
  } catch (e) {
    showToast('Could not load template for printing.', 'error');
    return;
  }

  const body = getBody(rawText);
  const keys = extractPlaceholders(rawText);
  const substituted = substituteFields(body, keys, k => {
    const el = document.getElementById('ff-' + k);
    return el ? el.value.trim() : '';
  }, true);

  const htmlContent = marked.parse(substituted);
  const { meta: printMeta } = parseFrontMatter(rawText);
  const printDir = printMeta?.form?.direction || 'ltr';

  const win = window.open('', '_blank');
  if (!win) {
    showToast('Allow pop-ups for this site to open the print window.', 'error');
    return;
  }
  win.onload = () => { win.focus(); win.print(); };
  win.document.write(docShell(htmlContent, t.name, printDir));
  win.document.close();
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Page Preview Modal — shows exact print layout in-browser (no print dialog)
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
let _pagePreviewBlobUrl = null;

async function openPagePreview(id) {
  const t = TEMPLATES.find(x => x.id === id);
  if (!t) return;
  let rawText;
  try {
    rawText = await loadTemplate(id);
  } catch (e) {
    showToast('Could not load template for preview.', 'error');
    return;
  }

  const body  = getBody(rawText);
  const keys  = extractPlaceholders(rawText);
  const substituted = substituteFields(body, keys, k => {
    const el = document.getElementById('ff-' + k);
    return el ? el.value.trim() : '';
  }, true);
  const htmlContent = marked.parse(substituted);
  const { meta } = parseFrontMatter(rawText);
  const dir = meta?.form?.direction || 'ltr';

  // Build a self-contained preview page — same as print but without window.print()
  // Override @page margins to screen-friendly values so pages visually stack
  const shellHtml = docShell(htmlContent, t.name, dir).replace(
    '@page {\n  size: A4 portrait;\n  margin: 25mm 20mm 20mm 20mm;\n}',
    '@page {\n  size: A4 portrait;\n  margin: 18mm 16mm 18mm 16mm;\n}'
  );

  // Revoke previous blob to avoid memory leaks
  if (_pagePreviewBlobUrl) URL.revokeObjectURL(_pagePreviewBlobUrl);
  const blob = new Blob([shellHtml], { type: 'text/html' });
  _pagePreviewBlobUrl = URL.createObjectURL(blob);

  const iframe = document.getElementById('page-preview-iframe');
  iframe.src = _pagePreviewBlobUrl;

  const backdrop = document.getElementById('page-preview-backdrop');
  backdrop.classList.add('open');
  document.body.style.overflow = 'hidden';
  // Auto-focus close button and trap keyboard focus inside dialog
  const dialog = document.querySelector('.page-preview-dialog');
  requestAnimationFrame(() => trapFocus(dialog, dialog.querySelector('.page-preview-close')));
}

function closePagePreview() {
  document.getElementById('page-preview-backdrop').classList.remove('open');
  document.body.style.overflow = '';
  releaseFocusTrap();
  const iframe = document.getElementById('page-preview-iframe');
  iframe.src = 'about:blank';
  if (_pagePreviewBlobUrl) { URL.revokeObjectURL(_pagePreviewBlobUrl); _pagePreviewBlobUrl = null; }
}

function handlePagePreviewBackdropClick(e) {
  if (e.target === document.getElementById('page-preview-backdrop')) closePagePreview();
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Focus trap — keeps keyboard focus inside open modals
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
let _focusTrapCleanup = null;
const FOCUSABLE = 'a[href],button:not([disabled]),input:not([disabled]),select:not([disabled]),textarea:not([disabled]),[tabindex]:not([tabindex="-1"])';

function trapFocus(containerEl, initialFocusEl) {
  if (_focusTrapCleanup) _focusTrapCleanup();
  const focusable = Array.from(containerEl.querySelectorAll(FOCUSABLE));
  if (!focusable.length) return;
  const first = focusable[0];
  const last  = focusable[focusable.length - 1];
  function handler(e) {
    if (e.key !== 'Tab') return;
    if (e.shiftKey) {
      if (document.activeElement === first) { e.preventDefault(); last.focus(); }
    } else {
      if (document.activeElement === last)  { e.preventDefault(); first.focus(); }
    }
  }
  containerEl.addEventListener('keydown', handler);
  (initialFocusEl || first).focus();
  _focusTrapCleanup = () => containerEl.removeEventListener('keydown', handler);
}

function releaseFocusTrap() {
  if (_focusTrapCleanup) { _focusTrapCleanup(); _focusTrapCleanup = null; }
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   My Documents — client-side status filter
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function filterMyDocs(status) {
  document.querySelectorAll('#doc-filter-tabs .doc-filter-tab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.filter === status);
  });
  document.querySelectorAll('#my-docs-list .my-doc-item').forEach(item => {
    item.style.display = (status === 'all' || item.dataset.status === status) ? '' : 'none';
  });
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Keyboard shortcut: Ctrl/Cmd+P → document print (not browser page print)
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'p' && _currentTemplateId) {
    e.preventDefault();
    printDocument(_currentTemplateId);
  }
  if (e.key === 'Escape') {
    const ppBackdrop = document.getElementById('page-preview-backdrop');
    if (ppBackdrop && ppBackdrop.classList.contains('open')) { closePagePreview(); return; }
    const histBackdrop = document.getElementById('history-backdrop');
    if (histBackdrop && histBackdrop.classList.contains('open')) { closeDocHistory(); return; }
    // Mobile sidebar
    if (window.innerWidth <= 768 && document.getElementById('sidebar').classList.contains('open')) closeSidebar();
  }
});

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   Print shell — generates the print-ready HTML page
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
function docShell(bodyHtml, title, dir) {
  dir = dir || 'ltr';
  const lang = dir === 'rtl' ? 'ar' : 'en';
  return `<!DOCTYPE html>
<html lang="${lang}" dir="${dir}">
<head>
<meta charset="UTF-8">
<title>${escapeHtml(title)}</title>
<style>
@page {
  size: A4 portrait;
  margin: 25mm 20mm 20mm 20mm;
}
@page {
  @bottom-center {
    content: counter(page) " / " counter(pages);
    font-family: Arial, Helvetica, sans-serif;
    font-size: 8pt;
    color: #999;
  }
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Arial, Helvetica, sans-serif;
  font-size: 11pt;
  color: #1a1a1a;
  line-height: 1.6;
  background: #fff;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
p  { margin: 5px 0; orphans: 3; widows: 3; }
strong { font-weight: 700; }
em { color: #555; font-size: 9pt; }
a  { color: #1a1a2e; text-decoration: none; }
a[href]::after { content: none !important; }
h1 {
  font-size: 14pt; font-weight: 700; text-align: center; color: #1a1a2e;
  border-bottom: 2pt solid #1a1a2e; padding-bottom: 9pt;
  margin: 18pt 0 14pt; letter-spacing: .01em;
  page-break-after: avoid;
}
h2 {
  font-size: 9pt; font-weight: 700; color: #1a1a2e;
  text-transform: uppercase; letter-spacing: .11em;
  border-bottom: 1px solid #c0c6d6; padding-bottom: 4pt;
  margin: 20pt 0 9pt; page-break-after: avoid;
}
h3 { font-size: 10pt; font-weight: 700; color: #2a2a3e; margin: 14pt 0 6pt; page-break-after: avoid; }
h4 { font-size: 10pt; font-weight: 600; color: #333; margin: 10pt 0 4pt; page-break-after: avoid; }
hr { border: none; border-top: 1px solid #d0d4dc; margin: 14pt 0; }
table {
  width: 100%; border-collapse: collapse;
  margin: 6pt 0 14pt; font-size: 10pt;
  page-break-inside: avoid;
}
thead { display: table-header-group; }
tr    { page-break-inside: avoid; }
th {
  background-color: #e8eaf2; color: #1a1a2e;
  font-weight: 700; font-size: 9pt;
  padding: 7pt 10pt; text-align: left;
  border: 1px solid #c0c6d6;
}
td { border: 1px solid #d0d4dc; padding: 6pt 10pt; vertical-align: top; line-height: 1.5; }
blockquote {
  border-left: 3pt solid #c89600; padding: 8pt 14pt;
  background: #fffcf0; margin: 10pt 0; font-size: 10pt;
  page-break-inside: avoid;
}
blockquote p { margin: 3pt 0; }
ul, ol  { margin: 6pt 0; padding-left: 22pt; }
li      { margin: 3pt 0; line-height: 1.5; }
code    { font-family: "Courier New", monospace; font-size: 9.5pt; background: #f4f5f7; padding: 1pt 4pt; }
pre     { background: #f4f5f7; padding: 10pt 14pt; font-size: 9pt; overflow-x: auto; page-break-inside: avoid; }
/* Letterhead */
.doc-letterhead {
  display: block; width: 100%; max-height: 38mm;
  object-fit: contain; object-position: left top;
  margin-bottom: 8mm;
}
</style>
</head>
<body>
${bodyHtml}
</body>
</html>`;
}
</script>
</body>
</html>
