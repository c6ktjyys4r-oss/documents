<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Document Generator</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --navy: #1a1a2e;
  --navy-light: #252545;
  --amber: #d4a000;
  --amber-light: #f5c842;
  --bg: #f0f2f5;
  --bg2: #ffffff;
  --border: #d0d4dc;
  --border-light: #e8eaf2;
  --text: #1a1a1a;
  --text-soft: #555;
  --text-muted: #888;
  --header-bg: #e8eaf2;
  --shadow: 0 1px 4px rgba(0,0,0,.08);
  --shadow-md: 0 4px 16px rgba(0,0,0,.12);
  --shadow-page: 0 2px 20px rgba(0,0,0,.15);
  --radius: 8px;
  --sidebar-w: 240px;
  --transition: .18s ease;
}
[data-theme="dark"] {
  --bg: #111118;
  --bg2: #1c1c28;
  --border: #2e2e42;
  --border-light: #252538;
  --text: #e8e8f0;
  --text-soft: #aaa;
  --text-muted: #666;
  --header-bg: #252538;
  --shadow: 0 1px 4px rgba(0,0,0,.4);
  --shadow-md: 0 4px 20px rgba(0,0,0,.5);
  --shadow-page: 0 2px 24px rgba(0,0,0,.5);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background var(--transition),color var(--transition)}

/* ── Header ── */
.site-header{position:sticky;top:0;z-index:100;background:var(--navy);color:#fff;display:flex;align-items:center;gap:16px;padding:0 20px;height:56px;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.logo{font-size:1.05rem;font-weight:700;letter-spacing:.04em;color:#fff;text-decoration:none;white-space:nowrap}
.logo span{color:var(--amber)}
.search-wrap{flex:1;max-width:480px;position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#aaa;pointer-events:none}
#search{width:100%;padding:8px 12px 8px 34px;border:1px solid rgba(255,255,255,.15);border-radius:6px;background:rgba(255,255,255,.1);color:#fff;font-size:.875rem;outline:none;transition:background var(--transition)}
#search::placeholder{color:rgba(255,255,255,.5)}
#search:focus{background:rgba(255,255,255,.18);border-color:var(--amber)}
.header-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
.btn-icon{background:none;border:none;cursor:pointer;color:#ccc;padding:6px;border-radius:6px;display:flex;align-items:center;transition:color var(--transition),background var(--transition)}
.btn-icon:hover{color:#fff;background:rgba(255,255,255,.1)}

/* ── Layout ── */
.app-body{display:flex;min-height:calc(100vh - 56px)}
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);padding:16px 0;overflow-y:auto;position:sticky;top:56px;height:calc(100vh - 56px)}
.main{flex:1;padding:28px 32px;max-width:960px}
@media(max-width:768px){
  .sidebar{position:fixed;left:-100%;top:56px;height:calc(100vh - 56px);z-index:90;transition:left .25s ease;box-shadow:var(--shadow-md)}
  .sidebar.open{left:0}
  .main{padding:20px 16px}
  .site-header{padding:0 12px}
}

/* ── Sidebar ── */
.sidebar-section{padding:4px 0}
.sidebar-heading{padding:6px 16px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted)}
.sidebar-link{display:flex;align-items:center;gap:10px;padding:9px 16px;font-size:.875rem;color:var(--text-soft);text-decoration:none;cursor:pointer;border-left:3px solid transparent;transition:all var(--transition)}
.sidebar-link:hover{background:var(--border-light);color:var(--text);border-left-color:var(--border)}
.sidebar-link.active{background:var(--header-bg);color:var(--navy);font-weight:600;border-left-color:var(--amber)}
[data-theme="dark"] .sidebar-link.active{color:var(--amber-light)}
.sidebar-link .cat-icon{width:20px;text-align:center;font-size:.95rem}
.sidebar-link .cat-count{margin-left:auto;font-size:.75rem;color:var(--text-muted);background:var(--border-light);padding:1px 7px;border-radius:10px}
.sidebar-divider{height:1px;background:var(--border);margin:8px 16px}

/* ── Home / Cards ── */
.page-title{font-size:1.6rem;font-weight:700;color:var(--navy);margin-bottom:6px}
[data-theme="dark"] .page-title{color:var(--amber-light)}
.page-sub{color:var(--text-soft);font-size:.9rem;margin-bottom:28px}
.category-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.cat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:22px 20px;cursor:pointer;text-decoration:none;display:block;transition:all var(--transition)}
.cat-card:hover{border-color:var(--amber);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.cat-card-icon{font-size:2rem;margin-bottom:12px}
.cat-card-name{font-size:.95rem;font-weight:600;color:var(--text);margin-bottom:4px}
.cat-card-count{font-size:.8rem;color:var(--text-muted)}

/* ── Document list ── */
.section-title{font-size:1.2rem;font-weight:700;color:var(--navy);margin-bottom:4px;display:flex;align-items:center;gap:8px}
[data-theme="dark"] .section-title{color:var(--amber-light)}
.section-sub{color:var(--text-muted);font-size:.82rem;margin-bottom:18px}
.template-list{display:flex;flex-direction:column;gap:8px}
.template-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:all var(--transition)}
.template-item:hover{border-color:var(--amber);box-shadow:var(--shadow);transform:translateX(2px)}
.template-item-icon{font-size:1.3rem;flex-shrink:0}
.template-item-info{flex:1;min-width:0}
.template-item-name{font-size:.92rem;font-weight:600;color:var(--text);margin-bottom:3px}
.template-item-meta{font-size:.78rem;color:var(--text-muted)}
.template-item-cta{font-size:.78rem;font-weight:600;color:var(--amber);flex-shrink:0;white-space:nowrap}
.cat-badge{display:inline-block;font-size:.7rem;font-weight:600;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em}

/* ── Search results ── */
.search-results-header{margin-bottom:16px}
.no-results{text-align:center;padding:48px 20px;color:var(--text-muted)}
.no-results svg{margin-bottom:12px;opacity:.4}

/* ── Badge colors ── */
.badge-hr{background:#dbeafe;color:#1e40af}
.badge-finance{background:#dcfce7;color:#166534}
.badge-operations{background:#fef9c3;color:#854d0e}
.badge-administration{background:#f3e8ff;color:#6b21a8}
.badge-general{background:#e0f2fe;color:#0369a1}
.badge-framework{background:#f1f5f9;color:#475569}
[data-theme="dark"] .badge-hr{background:#1e3a6e;color:#93c5fd}
[data-theme="dark"] .badge-finance{background:#14532d;color:#86efac}
[data-theme="dark"] .badge-operations{background:#431407;color:#fde68a}
[data-theme="dark"] .badge-administration{background:#2e1065;color:#d8b4fe}
[data-theme="dark"] .badge-general{background:#082f49;color:#7dd3fc}
[data-theme="dark"] .badge-framework{background:#1e293b;color:#94a3b8}

/* ── Mobile menu toggle ── */
.menu-toggle{display:none;background:none;border:none;cursor:pointer;color:#fff;padding:6px}
@media(max-width:768px){.menu-toggle{display:flex;align-items:center}}
.overlay{display:none;position:fixed;inset:0;top:56px;background:rgba(0,0,0,.4);z-index:80}
.overlay.open{display:block}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:6px;font-size:.875rem;font-weight:600;cursor:pointer;border:none;transition:all var(--transition);text-decoration:none}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover{background:var(--navy-light)}
.btn-outline{background:var(--bg2);color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--amber);color:var(--amber)}
.btn-print{background:var(--navy);color:#fff;padding:10px 22px;font-size:.9rem}
.btn-print:hover{background:var(--navy-light);box-shadow:0 2px 8px rgba(26,26,46,.3)}
.btn-print svg{flex-shrink:0}

/* ── Document fill screen ── */
.doc-screen-header{margin-bottom:20px}
.breadcrumb{font-size:.8rem;color:var(--text-muted);margin-bottom:10px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.breadcrumb a{color:var(--text-muted);text-decoration:none}
.breadcrumb a:hover{color:var(--amber)}
.doc-title{font-size:1.35rem;font-weight:700;color:var(--navy);margin-bottom:14px}
[data-theme="dark"] .doc-title{color:var(--amber-light)}
.doc-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

/* ── Fill layout ── */
.fill-layout{display:grid;grid-template-columns:300px 1fr;gap:24px;align-items:start}
@media(max-width:960px){.fill-layout{grid-template-columns:1fr}}

/* ── Fill form panel ── */
.fill-form{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:0;position:sticky;top:76px;max-height:calc(100vh - 96px);overflow-y:auto;box-shadow:var(--shadow)}
.fill-form-header{padding:16px 20px 12px;border-bottom:1px solid var(--border);background:var(--header-bg);border-radius:var(--radius) var(--radius) 0 0}
.fill-form-header-title{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--navy)}
[data-theme="dark"] .fill-form-header-title{color:var(--amber-light)}
.fill-form-header-sub{font-size:.75rem;color:var(--text-muted);margin-top:2px}
.fill-form-body{padding:16px 20px 20px}
.fill-field{margin-bottom:14px}
.fill-label{display:block;font-size:.8rem;font-weight:600;color:var(--text-soft);margin-bottom:4px}
.fill-input{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text);font-size:.85rem;outline:none;transition:border-color var(--transition);font-family:inherit}
.fill-input:focus{border-color:var(--amber);box-shadow:0 0 0 2px rgba(212,160,0,.12)}
.fill-textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text);font-size:.85rem;outline:none;resize:vertical;min-height:72px;font-family:inherit;transition:border-color var(--transition)}
.fill-textarea:focus{border-color:var(--amber);box-shadow:0 0 0 2px rgba(212,160,0,.12)}
.fill-section-heading{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin:18px 0 10px;padding-top:14px;border-top:1px solid var(--border)}
.fill-logo-note{font-size:.8rem;color:var(--text-muted);line-height:1.4;padding:8px 10px;background:var(--border-light);border-radius:5px;border:1px solid var(--border)}
.fill-logo-note a{color:var(--amber);text-decoration:none}
.fill-select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text);font-size:.85rem;outline:none;transition:border-color var(--transition);cursor:pointer;appearance:none}
.fill-select:focus{border-color:var(--amber);box-shadow:0 0 0 2px rgba(212,160,0,.12)}
.fill-required-star{color:var(--amber);font-weight:700;margin-left:1px;font-size:.9em}
.fill-helper{font-size:.74rem;color:var(--text-muted);margin-top:3px;line-height:1.4}

/* ── Preview column ── */
.preview-col-label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text-muted);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.preview-page-wrap{background:var(--bg);border-radius:var(--radius);padding:12px}
[data-theme="dark"] .preview-page-wrap{background:#0d0d15}

/* ── Document preview (the A4-like page) ── */
.doc-preview{
  background:#fff;
  border-radius:4px;
  padding:28px 32px;
  box-shadow:var(--shadow-page);
  font-family:Arial,Helvetica,sans-serif;
  font-size:11pt;
  line-height:1.55;
  color:#1a1a1a;
  min-height:300px;
}
.doc-preview h1{font-size:14pt;font-weight:700;text-align:center;border-bottom:2.5px solid #1a1a2e;padding-bottom:8px;margin:20px 0 16px;color:#1a1a2e}
.doc-preview h2{font-size:9pt;font-weight:700;color:#1a1a2e;text-transform:uppercase;letter-spacing:.1em;border-bottom:1px solid #c0c6d6;padding-bottom:3px;margin:20px 0 9px}
.doc-preview h3{font-size:10pt;font-weight:700;color:#2a2a3e;margin:14px 0 6px}
.doc-preview table{width:100%;border-collapse:collapse;margin:6px 0 14px;font-size:10pt}
.doc-preview th{background:#e8eaf2;color:#1a1a2e;font-weight:700;padding:7px 10px;text-align:left;font-size:9pt;border:1px solid #c0c6d6}
.doc-preview td{border:1px solid #d0d4dc;padding:6px 10px;vertical-align:top}
.doc-preview hr{border:none;border-top:1px solid #d0d4dc;margin:14px 0}
.doc-preview blockquote{border-left:3px solid #d4a000;padding:8px 14px;background:#fffcf0;margin:10px 0;font-size:10pt}
.doc-preview p{margin:5px 0}
.doc-preview code{background:#f4f5f7;padding:1px 5px;border-radius:3px;font-size:.85em;font-family:monospace}
.doc-preview pre{background:#f4f5f7;padding:12px;border-radius:6px;overflow-x:auto;margin:10px 0}
.doc-preview em{color:#555;font-size:9pt}

/* ── Letterhead inside preview ── */
.doc-letterhead{display:block;max-width:100%;max-height:90px;object-fit:contain;object-position:left;margin-bottom:12px}
.doc-letterhead-ph{height:52px;border:2px dashed var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:8.5pt;margin-bottom:12px;font-family:Arial,sans-serif;gap:6px}
.doc-letterhead-ph a{color:var(--amber);text-decoration:none}

/* ── Placeholder highlight ── */
.doc-preview .ph{background:rgba(212,160,0,.12);border-bottom:1.5px dashed var(--amber);color:var(--amber);font-style:normal;border-radius:2px;padding:0 2px}

/* ── Letterhead settings page ── */
.lh-empty{display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center;padding:60px 24px;border:2px dashed var(--border);border-radius:var(--radius);background:var(--bg2);margin-top:4px}
.lh-empty svg{color:var(--text-muted)}
.lh-empty-title{font-weight:600;color:var(--text);margin-bottom:2px}
.lh-empty-sub{color:var(--text-soft);font-size:.875rem}
.lh-preview{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-md);margin-top:4px;background:#fff}
.lh-preview img{display:block;width:100%;max-height:800px;object-fit:contain}
.lh-meta{color:var(--text-muted);font-size:.82rem;margin-top:8px}
.lh-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;align-items:center}
.lh-upload{cursor:pointer}
.lh-upload input[type="file"]{display:none}
.lh-setup-banner{background:linear-gradient(135deg,#fffcf0,#fff8dc);border:1px solid #e5c84a;border-radius:var(--radius);padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;gap:14px}
.lh-setup-banner-icon{font-size:1.5rem;flex-shrink:0}
.lh-setup-banner-text{flex:1}
.lh-setup-banner-title{font-weight:700;font-size:.9rem;color:#7a5800;margin-bottom:2px}
.lh-setup-banner-sub{font-size:.8rem;color:#9a7000}
.lh-setup-banner-cta{flex-shrink:0}

/* ── Print media ── */
@media print{
  .site-header,.sidebar,.doc-actions,.overlay,.fill-form,.preview-col-label,.preview-page-wrap > *:not(.doc-preview),.doc-screen-header{display:none!important}
  .main{padding:0;max-width:none}
  .doc-preview{border:none;box-shadow:none;padding:0;background:#fff}
  body{background:#fff;color:#000}
  .fill-layout{display:block}
}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<header class="site-header">
  <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Menu">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>

<div class="app-body">

    <div class="sidebar-divider"></div>
    <div class="sidebar-section">

        <span class="cat-icon">👤</span> Human Resources
        <span class="cat-count" id="cnt-hr"></span>

      <a class="sidebar-link" href="#/category/finance" onclick="closeSidebar()">
        <span class="cat-icon">💼</span> Finance
        <span class="cat-count" id="cnt-finance"></span>
      </a>
      <a class="sidebar-link" href="#/category/operations" onclick="closeSidebar()">
        <span class="cat-icon">⚙️</span> Operations

  <main class="main" id="main"></main>

<script>

// ── Router ────────────────────────────────────────────────────────────────
window.addEventListener('hashchange', route);
window.addEventListener('load', route);

function route() {
  const hash = location.hash || '#/';
  const parts = hash.slice(2).split('/').filter(Boolean);

  // Update active sidebar link
  document.querySelectorAll('.sidebar-link').forEach(el => {
    el.classList.toggle('active', el.getAttribute('href') === hash);
  });

  if (!parts.length || parts[0] === '') return renderHome();
  if (parts[0] === 'all') return renderList(TEMPLATES, 'All Documents', '');
  if (parts[0] === 'category' && parts[1]) return renderCategory(parts[1]);
  // #/template/:id redirects straight to fill — no intermediate preview
  if (parts[0] === 'template') { location.replace('#/fill/' + parts.slice(1).join('/')); return; }
  if (parts[0] === 'search') return renderSearch(decodeURIComponent(parts[1] || ''));
  if (parts[0] === 'settings' && parts[1] === 'letterhead') return renderLetterhead();
  if (parts[0] === 'fill') return renderFillMode(parts.slice(1).join('/'));
  renderHome();
}

// ── Template loader ───────────────────────────────────────────────────────
const _templateCache = new Map();
async function loadTemplate(id) {
  if (_templateCache.has(id)) return _templateCache.get(id);
  const t = TEMPLATES.find(x => x.id === id);
  if (!t) return '';
  const resp = await fetch(t.path);
  if (!resp.ok) throw new Error('Failed to load template: ' + t.path + ' (' + resp.status + ')');
  const text = await resp.text();
  _templateCache.set(id, text);
  return text;
}

function getBody(rawText) {
  // Strip YAML front matter if present
  let body = rawText.replace(/^---[\s\S]*?\n---\r?\n?/, '');
  // Strip inline <style> blocks — we apply our own
  return body.replace(/<style[\s\S]*?<\/style>/gi, '').trim();
}

// ── Generic Template Engine ───────────────────────────────────────────────

function extractPlaceholders(body) {
  const seen = new Set();
  const out = [];
  for (const m of body.matchAll(/\{\{([^}]+)\}\}/g)) {
    const key = m[1].trim();
    if (!seen.has(key)) { seen.add(key); out.push(key); }
  }
  return out;
}

function toLabel(key) {
  return key
    .replace(/([a-z])([A-Z])/g, '$1 $2')
    .replace(/([A-Z]+)([A-Z][a-z])/g, '$1 $2')
    .trim();
}

const MULTILINE_RE = /^(Body|Opening|Closing|Additional|Terms|Description|Reason|Notes|Paragraph|Process|Clearance|Scope|Requirements|Impact|Detail|Complaint|Observation|Summary|Remark|Agenda|Action|Appreciation|Authorization)/i;

function isMultiline(key) {
  const base = key.endsWith('Ar') ? key.slice(0, -2) : key;
  return MULTILINE_RE.test(base);
}

// ── Metadata Engine ────────────────────────────────────────────────────────

function parseScalar(v) {
  if (v === 'true') return true;
  if (v === 'false') return false;
  if (v !== '' && !isNaN(v)) return Number(v);
  if ((v.startsWith('"') && v.endsWith('"')) ||
      (v.startsWith("'") && v.endsWith("'"))) return v.slice(1, -1);
  return v;
}

function parseYamlSubset(text) {
  const lines = text.split('\n');
  const root = {};
  let section = null;
  let field   = null;
  let listKey = null;

  for (const raw of lines) {
    const trimmed = raw.trim();
    if (!trimmed || trimmed.startsWith('#')) { listKey = null; continue; }
    const indent = raw.search(/\S/);

    if (trimmed.startsWith('- ') && listKey && section && field) {
      root[section][field][listKey].push(trimmed.slice(2).trim());
      continue;
    }
    listKey = null;

    const col = trimmed.indexOf(':');
    if (col < 0) continue;
    const key = trimmed.slice(0, col).trim();
    const val = trimmed.slice(col + 1).trim();

    if (indent === 0) {
      section = key; field = null;
      if (!root[section]) root[section] = {};
    } else if (indent === 2) {
      if (section === 'fields' || section === 'computed') {
        field = key;
        if (!root[section][field]) root[section][field] = {};
      } else if (section) {
        root[section][key] = val ? parseScalar(val) : {};
      }
    } else if (indent >= 4 && section && field) {
      if (!val) {
        root[section][field][key] = [];
        listKey = key;
      } else {
        root[section][field][key] = parseScalar(val);
      }
    }
  }
  return root;
}

function parseFrontMatter(rawBody) {
  const m = rawBody.match(/^---\r?\n([\s\S]*?)\r?\n---(?:\r?\n|$)/);
  if (!m) return { meta: {}, body: rawBody };
  return { meta: parseYamlSubset(m[1]), body: rawBody.slice(m[0].length) };
}

function getFieldDefs(rawText) {
  const { meta } = parseFrontMatter(rawText);
  const fieldsMap = (meta && meta.fields) ? meta.fields : null;

  if (fieldsMap) {
    const defs = Object.entries(fieldsMap).map(([key, f], idx) => ({
      key,
      label:       (f && f.label)       || toLabel(key),
      type:        (f && f.type)        || 'text',
      required:    (f && f.required)    || false,
      default:     (f && f.default != null) ? String(f.default) : '',
      placeholder: (f && f.placeholder) || '',
      group:       (f && f.group)       || '',
      options:     (f && Array.isArray(f.options)) ? f.options : [],
      order:       (f && typeof f.order === 'number') ? f.order : 9000 + idx,
    })).filter(d => d.key !== 'Logo');

    defs.sort((a, b) => a.order - b.order);

    const metaKeys = new Set(defs.map(d => d.key));
    extractPlaceholders(rawText).forEach(key => {
      if (key !== 'Logo' && !metaKeys.has(key)) {
        defs.push({ key, label: toLabel(key),
          type: isMultiline(key) ? 'textarea' : 'text',
          required: false, default: '', placeholder: '',
          group: '', options: [], order: 9999 });
      }
    });
    return defs;
  }

  return extractPlaceholders(rawText)
    .filter(k => k !== 'Logo')
    .map((key, idx) => ({
      key, label: toLabel(key),
      type: isMultiline(key) ? 'textarea' : 'text',
      required: false, default: '', placeholder: '', group: '', options: [], order: idx
    }));
}

function renderField(def, templateId) {
  const star = def.required
    ? '<span class="fill-required-star" title="Required">*</span>' : '';
  const ph = def.placeholder || def.label;
  let input;

  if (def.type === 'select') {
    const opts = def.options.map(o =>
      `<option value="${o}">${o}</option>`
    ).join('');
    input = `<select class="fill-select" id="ff-${def.key}"` +
      ` onchange="livePreview('${templateId}')">` +
      `<option value="" disabled selected>— select —</option>${opts}</select>`;
  } else if (def.type === 'textarea') {
    input = `<textarea class="fill-textarea" id="ff-${def.key}"` +
      ` placeholder="${ph}\u2026" oninput="livePreview('${templateId}')"` +
      `>${def.default}</textarea>`;
  } else {
    const htmlType = {date:'date',number:'number',currency:'text',
      email:'email',phone:'tel'}[def.type] || 'text';
    input = `<input class="fill-input" id="ff-${def.key}" type="${htmlType}"` +
      ` placeholder="${ph}" value="${def.default}"` +
      ` oninput="livePreview('${templateId}')">`;
  }

  const helper = def.placeholder
    ? `<div class="fill-helper">${def.placeholder}</div>` : '';
  return `<div class="fill-field">` +
    `<label class="fill-label" for="ff-${def.key}">${def.label}${star}</label>` +
    `${input}${helper}</div>`;
}

// ── Render: Fill Mode ─────────────────────────────────────────────────────
async function renderFillMode(id) {
  scrollTop();
  const t = TEMPLATES.find(x => x.id === id);
  if (!t) { document.getElementById('main').innerHTML = '<p>Document not found.</p>'; return; }
  const cat = CATEGORIES[t.category] || { label: t.category, icon: '📄' };
  const rawText = await loadTemplate(id);

  const hasLogo = extractPlaceholders(rawText).includes('Logo');
  const fieldDefs = getFieldDefs(rawText);
  const { meta } = parseFrontMatter(rawText);
  const formMeta = (meta && meta.form) || {};
  const dir = formMeta.direction || 'ltr';

  const logoHtml = hasLogo
    ? `<div class="fill-field">
        <div class="fill-label">Letterhead</div>
        <p class="fill-logo-note">Using your uploaded company letterhead.
          <a href="#/settings/letterhead">Manage →</a></p>
       </div>`
    : '';

  // Group fields
  const groupOrder = [];
  const groups = {};
  fieldDefs.forEach(def => {
    const g = def.group || '';
    if (!groups[g]) { groups[g] = []; groupOrder.push(g); }
    groups[g].push(def);
  });

  const formHtml = groupOrder.map(g => {
    const heading = g ? `<div class="fill-section-heading">${g}</div>` : '';
    return heading + groups[g].map(def => renderField(def, id)).join('');
  }).join('');

  const lhSet = !!localStorage.getItem('letterhead');
  const lhWarning = hasLogo && !lhSet
    ? `<div style="background:#fff8dc;border:1px solid #e5c84a;border-radius:5px;padding:8px 12px;font-size:.8rem;color:#7a5800;margin-bottom:14px">
        ⚠️ No letterhead set. <a href="#/settings/letterhead" style="color:#d4a000;font-weight:600">Upload one →</a>
       </div>` : '';

  document.getElementById('main').innerHTML = `
    <div class="doc-screen-header">
      <div class="breadcrumb">
        <a href="#/">Home</a> ›
        <a href="#/category/${t.category}">${cat.label}</a> ›
        <span>${t.name}</span>
      </div>
      <h1 class="doc-title">${t.name}</h1>
      <div class="doc-actions">
        <button class="btn btn-print" onclick="printDocument('${id}')">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Print / Save as PDF
        </button>
        <a class="btn btn-outline" href="#/category/${t.category}">← Back</a>
      </div>
    </div>
    <div class="fill-layout">
      <div class="fill-form" dir="${dir}">
        <div class="fill-form-header">
          <div class="fill-form-header-title">Document Information</div>
          <div class="fill-form-header-sub">${fieldDefs.length} field${fieldDefs.length !== 1 ? 's' : ''} — preview updates live</div>
        </div>
        <div class="fill-form-body">
          ${lhWarning}
          ${logoHtml}
          ${formHtml}
        </div>
      </div>
      <div>
        <div class="preview-col-label">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          Live Preview
        </div>
        <div class="preview-page-wrap">
          <div class="doc-preview" id="doc-preview"></div>
        </div>
      </div>
    </div>
  `;

  livePreview(id);
}

// ── Live Preview ──────────────────────────────────────────────────────────
async function livePreview(id) {
  const t = TEMPLATES.find(x => x.id === id);
  if (!t) return;
  const preview = document.getElementById('doc-preview');
  if (!preview) return;
  const rawText = await loadTemplate(id);

  let body = getBody(rawText);
  const keys = extractPlaceholders(rawText);
  const lh = localStorage.getItem('letterhead');

  // Replace {{Logo}} with actual letterhead image (or a placeholder)
  if (keys.includes('Logo')) {
    const logoHtml = lh
      ? `<img src="${lh}" class="doc-letterhead" alt="Company Letterhead">`
      : `<div class="doc-letterhead-ph">
           <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/></svg>
           Company Letterhead — <a href="#/settings/letterhead">upload to see it here</a>
         </div>`;
    body = body.replace(/\{\{Logo\}\}/g, logoHtml);
  }

  keys.forEach(key => {
    if (key === 'Logo') return;
    const el = document.getElementById('ff-' + key);
    const val = el ? el.value : '';
    body = body.replace(
      new RegExp('\\{\\{' + escapeRegex(key) + '\\}\\}', 'g'),
      val.trim()
        ? val
        : `<span class="ph">{{${key}}}</span>`
    );
  });

  preview.innerHTML = marked.parse(body);
}

// ── Print / Save as PDF ───────────────────────────────────────────────────
async function printDocument(id) {
  const t = TEMPLATES.find(x => x.id === id);
  if (!t) return;
  const rawText = await loadTemplate(id);
  const keys = extractPlaceholders(rawText);
  const lh = localStorage.getItem('letterhead');
  let body = getBody(rawText);

  // Replace {{Logo}} with letterhead img for print (full-width, natural)
  if (keys.includes('Logo')) {
    const logoHtml = lh
      ? `<img src="${lh}" class="doc-letterhead" alt="Company Letterhead">`
      : '';
    body = body.replace(/\{\{Logo\}\}/g, logoHtml);
  }

  // Replace all other placeholders with their current values
  keys.forEach(key => {
    if (key === 'Logo') return;
    const el = document.getElementById('ff-' + key);
    const val = el ? el.value.trim() : '';
    body = body.replace(
      new RegExp('\\{\\{' + escapeRegex(key) + '\\}\\}', 'g'),
      val
    );
  });

  const htmlContent = marked.parse(body);
  const shell = docShell(htmlContent, t.name);

  const win = window.open('', '_blank');
  if (!win) {
    alert('Please allow pop-ups for this site to open the print window.');
    return;
  }
  win.document.write(shell);
  win.document.close();
  // Small delay to ensure images (letterhead) are loaded before print dialog
  setTimeout(() => { win.focus(); win.print(); }, 600);
}

// ── Document Shell (print-ready HTML) ────────────────────────────────────

<html lang="en">
<head>
<meta charset="UTF-8">

<style>

}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {

  font-size: 11pt;
  color: #1a1a1a;
  line-height: 1.55;
  background: #fff;
  -webkit-print-color-adjust: exact;
  print-color-adjust: exact;
}
p { margin: 5px 0; }
strong { font-weight: 700; }
em { color: #555; font-size: 9pt; }
a { color: #1a1a2e; text-decoration: none; }
h1 {
  font-size: 14pt;
  font-weight: 700;
  text-align: center;
  color: #1a1a2e;
  border-bottom: 2.5px solid #1a1a2e;
  padding-bottom: 9px;
  margin: 20px 0 16px;
  page-break-after: avoid;
}
h2 {
  font-size: 9pt;
  font-weight: 700;
  color: #1a1a2e;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  border-bottom: 1px solid #c0c6d6;
  padding-bottom: 4px;
  margin: 22px 0 10px;
  page-break-after: avoid;
}
h3 {
  font-size: 10pt;

}
h4 {

  font-weight: 600;
  color: #333;
  margin: 10px 0 4px;
  page-break-after: avoid;
}
hr {
  border: none;
  border-top: 1px solid #d0d4dc;
  margin: 16px 0;
}
table {
  width: 100%;
  border-collapse: collapse;
  margin: 8px 0 16px;
  font-size: 10pt;
  page-break-inside: avoid;
}
th {
  background-color: #e8eaf2;
  color: #1a1a2e;
  font-weight: 700;
  font-size: 9pt;
  padding: 7px 10px;
  text-align: left;

}

}
thead { display: table-header-group; }
blockquote {
  border-left: 3px solid #d4a000;
  padding: 8px 14px;
  background: #fffcf0;
  margin: 10px 0;
  font-size: 10pt;
  page-break-inside: avoid;
}
blockquote p { margin: 3px 0; }
ul, ol { margin: 6px 0; padding-left: 22px; }
li { margin: 3px 0; line-height: 1.5; }
code { font-family: "Courier New", monospace; font-size: 9.5pt; background: #f4f5f7; padding: 1px 4px; }
pre { background: #f4f5f7; padding: 10px 14px; font-size: 9pt; overflow-x: auto; page-break-inside: avoid; }
p { orphans: 3; widows: 3; }
a[href]::after { content: none; }
/* Letterhead — sits naturally at the top of the document */
.doc-letterhead {
  display: block;
  width: 100%;
  max-height: 45mm;
  object-fit: contain;
  object-position: left;
  margin-bottom: 6mm;
}
/* Signature tables: keep together */
table:last-of-type,
h2:last-of-type + table {
  page-break-inside: avoid;
  page-break-before: avoid;
}
</style>
</head>
<body>
${bodyHtml}
</body>
</html>`;
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
