<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alba Document Library</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --navy: #1a1a2e;
  --navy-light: #252545;
  --amber: #d4a000;
  --amber-light: #f5c842;
  --bg: #f8f9fb;
  --bg2: #ffffff;
  --border: #d0d4dc;
  --border-light: #e8eaf2;
  --text: #1a1a1a;
  --text-soft: #555;
  --text-muted: #888;
  --header-bg: #e8eaf2;
  --shadow: 0 1px 4px rgba(0,0,0,.08);
  --shadow-md: 0 4px 16px rgba(0,0,0,.12);
  --radius: 8px;
  --sidebar-w: 240px;
  --transition: .18s ease;
}
[data-theme="dark"] {
  --bg: #111118;
  --bg2: #1c1c28;
  --border: #2e2e42;
  --border-light: #252538;
  --text: #e8e8f0;
  --text-soft: #aaa;
  --text-muted: #666;
  --header-bg: #252538;
  --shadow: 0 1px 4px rgba(0,0,0,.4);
  --shadow-md: 0 4px 20px rgba(0,0,0,.5);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background var(--transition),color var(--transition)}

/* ── Header ── */
.site-header{position:sticky;top:0;z-index:100;background:var(--navy);color:#fff;display:flex;align-items:center;gap:16px;padding:0 20px;height:56px;box-shadow:0 2px 8px rgba(0,0,0,.25)}
.logo{font-size:1.05rem;font-weight:700;letter-spacing:.04em;color:#fff;text-decoration:none;white-space:nowrap}
.logo span{color:var(--amber)}
.search-wrap{flex:1;max-width:480px;position:relative}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#aaa;pointer-events:none}
#search{width:100%;padding:8px 12px 8px 34px;border:1px solid rgba(255,255,255,.15);border-radius:6px;background:rgba(255,255,255,.1);color:#fff;font-size:.875rem;outline:none;transition:background var(--transition)}
#search::placeholder{color:rgba(255,255,255,.5)}
#search:focus{background:rgba(255,255,255,.18);border-color:var(--amber)}
.header-actions{display:flex;align-items:center;gap:8px;margin-left:auto}
.btn-icon{background:none;border:none;cursor:pointer;color:#ccc;padding:6px;border-radius:6px;display:flex;align-items:center;transition:color var(--transition),background var(--transition)}
.btn-icon:hover{color:#fff;background:rgba(255,255,255,.1)}

/* ── Layout ── */
.app-body{display:flex;min-height:calc(100vh - 56px)}
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);padding:16px 0;overflow-y:auto;position:sticky;top:56px;height:calc(100vh - 56px)}
.main{flex:1;padding:28px 32px;max-width:900px}
@media(max-width:768px){
  .sidebar{position:fixed;left:-100%;top:56px;height:calc(100vh - 56px);z-index:90;transition:left .25s ease;box-shadow:var(--shadow-md)}
  .sidebar.open{left:0}
  .main{padding:20px 16px}
  .site-header{padding:0 12px}
}

/* ── Sidebar ── */
.sidebar-section{padding:4px 0}
.sidebar-heading{padding:6px 16px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted)}
.sidebar-link{display:flex;align-items:center;gap:10px;padding:9px 16px;font-size:.875rem;color:var(--text-soft);text-decoration:none;cursor:pointer;border-left:3px solid transparent;transition:all var(--transition)}
.sidebar-link:hover{background:var(--border-light);color:var(--text);border-left-color:var(--border)}
.sidebar-link.active{background:var(--header-bg);color:var(--navy);font-weight:600;border-left-color:var(--amber)}
[data-theme="dark"] .sidebar-link.active{color:var(--amber-light)}
.sidebar-link .cat-icon{width:20px;text-align:center;font-size:.95rem}
.sidebar-link .cat-count{margin-left:auto;font-size:.75rem;color:var(--text-muted);background:var(--border-light);padding:1px 7px;border-radius:10px}
.sidebar-divider{height:1px;background:var(--border);margin:8px 16px}

/* ── Home / Cards ── */
.page-title{font-size:1.6rem;font-weight:700;color:var(--navy);margin-bottom:6px}
[data-theme="dark"] .page-title{color:var(--amber-light)}
.page-sub{color:var(--text-soft);font-size:.9rem;margin-bottom:24px}
.category-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:32px}
.cat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;text-decoration:none;display:block;transition:all var(--transition)}
.cat-card:hover{border-color:var(--amber);box-shadow:var(--shadow-md);transform:translateY(-2px)}
.cat-card-icon{font-size:1.8rem;margin-bottom:10px}
.cat-card-name{font-size:.95rem;font-weight:600;color:var(--text);margin-bottom:4px}
.cat-card-count{font-size:.8rem;color:var(--text-muted)}

/* ── Template list ── */
.section-title{font-size:1.2rem;font-weight:700;color:var(--navy);margin-bottom:4px;display:flex;align-items:center;gap:8px}
[data-theme="dark"] .section-title{color:var(--amber-light)}
.section-sub{color:var(--text-muted);font-size:.82rem;margin-bottom:18px}
.template-list{display:flex;flex-direction:column;gap:8px}
.template-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all var(--transition)}
.template-item:hover{border-color:var(--amber);box-shadow:var(--shadow)}
.template-item-icon{font-size:1.2rem;flex-shrink:0}
.template-item-info{flex:1;min-width:0}
.template-item-name{font-size:.9rem;font-weight:600;color:var(--text);margin-bottom:2px}
.template-item-meta{font-size:.78rem;color:var(--text-muted)}
.template-item-arrow{color:var(--text-muted);flex-shrink:0}
.cat-badge{display:inline-block;font-size:.7rem;font-weight:600;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em}

/* ── Template viewer ── */
.viewer-header{margin-bottom:20px}
.breadcrumb{font-size:.8rem;color:var(--text-muted);margin-bottom:10px;display:flex;align-items:center;gap:4px}
.breadcrumb a{color:var(--text-muted);text-decoration:none}
.breadcrumb a:hover{color:var(--amber)}
.viewer-title{font-size:1.4rem;font-weight:700;color:var(--navy);margin-bottom:8px}
[data-theme="dark"] .viewer-title{color:var(--amber-light)}
.viewer-meta{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.viewer-actions{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:6px;font-size:.85rem;font-weight:600;cursor:pointer;border:none;transition:all var(--transition)}
.btn-primary{background:var(--navy);color:#fff}
.btn-primary:hover{background:var(--navy-light)}
.btn-outline{background:var(--bg2);color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--amber);color:var(--amber)}
.btn-amber{background:var(--amber);color:#fff}
.btn-amber:hover{background:var(--amber-light);color:#1a1a1a}

/* ── Document preview ── */
.doc-preview{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:32px 36px;box-shadow:var(--shadow);font-family:Arial,Helvetica,sans-serif;font-size:11pt;line-height:1.55;color:var(--text)}
.doc-preview h1{font-size:14pt;font-weight:700;text-align:center;border-bottom:2.5px solid var(--navy);padding-bottom:8px;margin:16px 0 14px;color:var(--navy)}
[data-theme="dark"] .doc-preview h1{border-color:var(--amber);color:var(--amber-light)}
.doc-preview h2{font-size:9pt;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.1em;border-bottom:1px solid var(--border);padding-bottom:3px;margin:18px 0 8px}
[data-theme="dark"] .doc-preview h2{color:var(--amber-light)}
.doc-preview h3{font-size:10pt;font-weight:700;color:#2a2a3e;margin:12px 0 5px}
[data-theme="dark"] .doc-preview h3{color:#aab}
.doc-preview table{width:100%;border-collapse:collapse;margin:6px 0 14px;font-size:10pt}
.doc-preview th{background:var(--header-bg);color:var(--navy);font-weight:700;padding:7px 10px;text-align:left;font-size:9pt;border:1px solid var(--border)}
[data-theme="dark"] .doc-preview th{color:var(--amber-light)}
.doc-preview td{border:1px solid var(--border);padding:6px 10px;vertical-align:top}
.doc-preview hr{border:none;border-top:1px solid var(--border);margin:14px 0}
.doc-preview blockquote{border-left:3px solid var(--amber);padding:8px 14px;background:#fffcf0;margin:10px 0;font-size:10pt}
[data-theme="dark"] .doc-preview blockquote{background:#2a2200}
.doc-preview p{margin:4px 0}
.doc-preview code{background:var(--border-light);padding:1px 5px;border-radius:3px;font-size:.85em;font-family:monospace}
.doc-preview pre{background:var(--border-light);padding:12px;border-radius:6px;overflow-x:auto;margin:10px 0}

/* ── Search results ── */
.search-results-header{margin-bottom:16px}
.no-results{text-align:center;padding:48px 20px;color:var(--text-muted)}
.no-results svg{margin-bottom:12px;opacity:.4}

/* ── Badge colors ── */
.badge-hr{background:#dbeafe;color:#1e40af}
.badge-finance{background:#dcfce7;color:#166534}
.badge-operations{background:#fef9c3;color:#854d0e}
.badge-administration{background:#f3e8ff;color:#6b21a8}
.badge-general{background:#e0f2fe;color:#0369a1}
.badge-framework{background:#f1f5f9;color:#475569}
[data-theme="dark"] .badge-hr{background:#1e3a6e;color:#93c5fd}
[data-theme="dark"] .badge-finance{background:#14532d;color:#86efac}
[data-theme="dark"] .badge-operations{background:#431407;color:#fde68a}
[data-theme="dark"] .badge-administration{background:#2e1065;color:#d8b4fe}
[data-theme="dark"] .badge-general{background:#082f49;color:#7dd3fc}
[data-theme="dark"] .badge-framework{background:#1e293b;color:#94a3b8}

/* ── Mobile menu toggle ── */
.menu-toggle{display:none;background:none;border:none;cursor:pointer;color:#fff;padding:6px}
@media(max-width:768px){.menu-toggle{display:flex;align-items:center}}
.overlay{display:none;position:fixed;inset:0;top:56px;background:rgba(0,0,0,.4);z-index:80}
.overlay.open{display:block}

/* ── Print ── */
@media print{
  .site-header,.sidebar,.viewer-actions,.overlay{display:none!important}
  .main{padding:0;max-width:none}
  .doc-preview{border:none;box-shadow:none;padding:0}
  body{background:#fff;color:#000}
}

/* ── Letterhead page ── */
.lh-empty{display:flex;flex-direction:column;align-items:center;gap:16px;text-align:center;padding:60px 24px;border:2px dashed var(--border);border-radius:var(--radius);background:var(--bg2);margin-top:4px}
.lh-empty svg{color:var(--text-muted)}
.lh-empty-title{font-weight:600;color:var(--text);margin-bottom:2px}
.lh-empty-sub{color:var(--text-soft);font-size:.875rem}
.lh-preview{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-md);margin-top:4px;background:#fff}
.lh-preview img{display:block;width:100%;max-height:800px;object-fit:contain}
.lh-meta{color:var(--text-muted);font-size:.82rem;margin-top:8px}
.lh-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;align-items:center}
.lh-upload{cursor:pointer}
.lh-upload input[type="file"]{display:none}

/* ── Fill mode ── */
.fill-layout{display:grid;grid-template-columns:320px 1fr;gap:24px;align-items:start}
@media(max-width:900px){.fill-layout{grid-template-columns:1fr}}
.fill-form{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:sticky;top:76px;max-height:calc(100vh - 96px);overflow-y:auto;box-shadow:var(--shadow)}
.fill-form-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin-bottom:16px}
.fill-field{margin-bottom:12px}
.fill-label{display:block;font-size:.8rem;font-weight:600;color:var(--text-soft);margin-bottom:4px}
.fill-input{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text);font-size:.85rem;outline:none;transition:border-color var(--transition);font-family:inherit}
.fill-input:focus{border-color:var(--amber);box-shadow:0 0 0 2px rgba(212,160,0,.12)}
.fill-textarea{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text);font-size:.85rem;outline:none;resize:vertical;min-height:68px;font-family:inherit;transition:border-color var(--transition)}
.fill-textarea:focus{border-color:var(--amber);box-shadow:0 0 0 2px rgba(212,160,0,.12)}
.fill-section-heading{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);margin:18px 0 8px;padding-top:14px;border-top:1px solid var(--border)}
.fill-logo-note{font-size:.8rem;color:var(--text-muted);line-height:1.4}
.fill-logo-note a{color:var(--amber);text-decoration:none}
.fill-count-badge{display:inline-block;font-size:.72rem;background:var(--amber);color:#fff;border-radius:10px;padding:1px 8px;font-weight:700;margin-left:6px}
.doc-preview .ph{background:rgba(212,160,0,.15);border-bottom:1.5px dashed var(--amber);color:var(--amber);font-style:normal;border-radius:2px;padding:0 2px}
.fill-select{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text);font-size:.85rem;outline:none;transition:border-color var(--transition);cursor:pointer;appearance:none}
.fill-select:focus{border-color:var(--amber);box-shadow:0 0 0 2px rgba(212,160,0,.12)}
.fill-required-star{color:var(--amber);font-weight:700;margin-left:1px;font-size:.9em}
.fill-helper{font-size:.75rem;color:var(--text-muted);margin-top:3px;line-height:1.4}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<header class="site-header">
  <button class="menu-toggle" onclick="toggleSidebar()" aria-label="Menu">
    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <a href="#/" class="logo">Alba <span>Docs</span></a>
  <div class="search-wrap">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="search" id="search" placeholder="Search templates…" autocomplete="off" oninput="handleSearch(this.value)">
  </div>
  <div class="header-actions">
    <button class="btn-icon" onclick="toggleTheme()" title="Toggle dark mode">
      <svg id="theme-icon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
  </div>
</header>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="app-body">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-heading">Navigation</div>
      <a class="sidebar-link" href="#/" onclick="closeSidebar()">
        <span class="cat-icon">🏠</span> Home

      <a class="sidebar-link" href="#/all" onclick="closeSidebar()">
        <span class="cat-icon">📋</span> All Templates
        <span class="cat-count">48</span>
      </a>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-heading">Categories</div>
      <a class="sidebar-link" href="#/category/hr" onclick="closeSidebar()">
        <span class="cat-icon">👤</span> Human Resources
        <span class="cat-count" id="cnt-hr"></span>
      </a>
      <a class="sidebar-link" href="#/category/finance" onclick="closeSidebar()">
        <span class="cat-icon">💼</span> Finance
        <span class="cat-count" id="cnt-finance"></span>
      </a>
      <a class="sidebar-link" href="#/category/operations" onclick="closeSidebar()">
        <span class="cat-icon">⚙️</span> Operations
        <span class="cat-count" id="cnt-operations"></span>
      </a>
      <a class="sidebar-link" href="#/category/administration" onclick="closeSidebar()">
        <span class="cat-icon">🏛️</span> Administration
        <span class="cat-count" id="cnt-administration"></span>
      </a>
      <a class="sidebar-link" href="#/category/general" onclick="closeSidebar()">
        <span class="cat-icon">📄</span> General
        <span class="cat-count" id="cnt-general"></span>
      </a>
      <a class="sidebar-link" href="#/category/framework" onclick="closeSidebar()">
        <span class="cat-icon">🔧</span> Framework
        <span class="cat-count" id="cnt-framework"></span>
      </a>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-heading">Settings</div>
      <a class="sidebar-link" href="#/settings/letterhead" onclick="closeSidebar()">
        <span class="cat-icon">🖼️</span> Official Letterhead
      </a>
    </div>
  </nav>

  <main class="main" id="main"></main>
</div>

WLEDGEMENT","slug":"acknowledgement","name":"Acknowledgement","category":"general","version":"2.1","body":"<style>\n@page { size: A4; margin: 25mm 20mm 20mm 20mm; }\nbody { font-family: Arial, Helvetica, sans-serif; font-size: 11pt; color: #1a1a1a; max-width: 170mm; margin: 0 auto; line-height: 1.55; }\nh1 { font-size: 14pt; font-weight: 700; text-align: center; border-bottom: 2.5px solid #1a1a2e; padding-bottom: 8px; margin: 24px 0 16px; }\nh2 { font-size: 9pt; font-weight: 700; color: #1a1a2e; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px solid #c0c6d6; padding-bottom: 3px; margin: 22px 0 10px; }\nh3 { font-size: 10pt; font-weight: 700; color: #2a2a3e; margin: 14px 0 6px; }\ntable { width: 100%; border-collapse: collapse; margin: 6px 0 14px; font-size: 10pt; page-break-inside: avoid; }\nth { background: #e8eaf2; color: #1a1a2e; font-weight: 700; padding: 7px 10px; text-align: left; font-size: 9pt; border: 1px solid #c0c6d6; }\ntd { border: 1px solid #d0d4dc; padding: 6px 10px; vertical-align: top; }\nhr { border: none; border-top: 1px solid #d0d4dc; margin: 16px 0; }\nblockquote { border-left: 3px solid #d4a000; padding: 8px 14px; background: #fffcf0; margin: 10px 0; font-size: 10pt; }\np { margin: 5px 0; }\nem { color: #555; font-size: 9pt; }\n@media print { body { max-width: none; } }\n</style>\n\n\n{{Logo}}\n\n**{{CompanyName}}**\n\n---\n\n**Ref / المرجع:** {{ReferenceNumber}} &nbsp;|&nbsp; **Date / التاريخ:** {{Date}}\n\n---\n\n# إقرار استلام &nbsp;/&nbsp; Acknowledgement of Receipt\n\n---\n\n## معلومات المُستَلِم / Recipient Details\n\n| البيان / Field | القيمة / Value |\n|---|---|\n| **الاسم / Name** | {{RecipientNameAr}} / {{RecipientName}} |\n| **المسمى الوظيفي / Job Title** | {{JobTitleAr}} / {{JobTitle}} |\n| **القسم / Department** | {{Department}} |\n\n---\n\n## ما تم استلامه / Item(s) Received\n\n| # | البيان / Item Description | التاريخ / Date | الملاحظات / Notes |\n|---|---|---|---|\n| 1 | {{ItemDescription1Ar}} / {{ItemDescription1}} | {{ItemDate1}} | {{Notes1}} |\n| 2 | {{ItemDescription2Ar}} / {{ItemDescription2}} | {{ItemDate2}} | {{Notes2}} |\n\n---\n\n## Arabic (إقرار):\n\nأُقرّ أنا الموقّع أدناه بأنني استلمت ما هو مُدرج أعلاه بحالة سليمة وكاملة.\n\n## English (Declaration):\n\nI, the undersigned, hereby acknowledge receipt of the above-mentioned item(s) in good and complete condition.\n\n---\n\n## Signatures / التواقيع\n\n| توقيع المُستَلِم / Recipient | توقيع الجهة المُسلِّمة / Issuing Party |\n|---|---|\n| {{RecipientName}} | {{IssuedBy}} |\n| {{JobTitle}} | {{IssuedByTitle}} / {{IssuedByTitleAr}} |\n| | *(Official Stamp / الختم الرسمي)* |\n| Signature: ___________________________ | Signature: ___________________________ |\n| Date: ___________________________ | Date: ___________________________ |\n\n---\n\n*يُحتفظ بهذا الإقرار في السجلات الرسمية للمنشأة. / This acknowledgement is retained in the company's official records.*"},{"id":"general/ANNOUNCEMENT","slug":"announcement","name":"Announcement","category":"general","version":"2.1","body":"<style>\n@page { size: A4; margin: 25mm 20mm 20mm 20mm; }\nbody { font-family: Arial, Helvetica, sans-serif; font-size: 11pt; color: #1a1a1a; max-width: 170mm; margin: 0 auto; line-height: 1.55; }\nh1 { font-size: 14pt; font-weight: 700; text-align: center; border-bottom: 2.5px solid #1a1a2e; padding-bottom: 8px; margin: 24px 0 16px; }\nh2 { font-size: 9pt; font-weight: 700; color: #1a1a2e; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px solid #c0c6d6; padding-bottom: 3px; margin: 22px 0 10px; }\nh3 { font-size: 10pt; font-weight: 700; color: #2a2a3e; margin: 14px 0 6px; }\ntable { width: 100%; border-collapse: collapse; margin: 6px 0 14px; font-size: 10pt; page-break-inside: avoid; }\nth { background: #e8eaf2; color: #1a1a2e; font-weight: 700; padding: 7px 10px; text-align: left; font-size: 9pt; border: 1px solid #c0c6d6; }\ntd { border: 1px solid #d0d4dc; padding: 6px 10px; vertical-align: top; }\nhr { border: none; border-top: 1px solid #d0d4dc; margin: 16px 0; }\nblockquote { border-left: 3px solid #d4a000; padding: 8px 14px; background: #fffcf0; margin: 10px 0; font-size: 10pt; }\np { margin: 5px 0; }\nem { color: #555; font-size: 9pt; }\n@media print { body { max-width: none; } }\n</style>\n\n\n{{Logo}}\n\n**{{CompanyName}}**\n\n---\n\n**Ref / المرجع:** {{ReferenceNumber}} &nbsp;|&nbsp; **Date / التاريخ:** {{Date}}\n\n---\n\n# إعلان &nbsp;/&nbsp; Announcement\n\n---\n\n| البيان / Field | القيمة / Value |\n|---|---|\n| **إلى / To** | {{Audience}} |\n| **الموضوع / Subject** | {{Subject}} |\n| **تاريخ النفاذ / Effective Date** | {{EffectiveDate}} |\n\n---\n\n## Arabic (عربي):\n\n{{BodyAr}}\n\n{{AdditionalDetailsAr}}\n\n---\n\n## English:\n\n{{Body}}\n\n{{AdditionalDetails}}\n\n---\n\n## الاستفسارات / Enquiries\n\nللاستفسار: **{{ContactPerson}}** &nbsp;|&nbsp; **{{ContactDetails}}**\n\nFor enquiries: **{{ContactPerson}}** &nbsp;|&nbsp; **{{ContactDetails}}**\n\n---\n\n## Signatures / التواقيع\n\n| صادر عن / Issued By | |\n|---|---|\n| {{PreparedBy}} | *(Official Stamp / الختم الرسمي)* |\n| {{PreparedByTitle}} / {{PreparedByTitleAr}} | |\n| {{Department}} — {{CompanyName}} | |\n| Signature: ___________________________ | |\n| Date: ___________________________ | |\n\n---\n\n*يُحتفظ بنسخة من هذا الإعلان في السجلات الرسمية للمنشأة. / A copy of this announcement is retained in the company's official records.*"},{"id":"general/AUTHORIZATION_LETTER","slug":"authorization-letter","name":"Authorization Letter","category":"general","version":"2.1","body":"<style>\n@page { size: A4; margin: 25mm 20mm 20mm 20mm; }\nbody { font-family: Arial, Helvetica, sans-serif; font-size: 11pt; color: #1a1a1a; max-width: 170mm; margin: 0 auto; line-height: 1.55; }\nh1 { font-size: 14pt; font-weight: 700; text-align: center; border-bottom: 2.5px solid #1a1a2e; padding-bottom: 8px; margin: 24px 0 16px; }\nh2 { font-size: 9pt; font-weight: 700; color: #1a1a2e; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px solid #c0c6d6; padding-bottom: 3px; margin: 22px 0 10px; }\nh3 { font-size: 10pt; font-weight: 700; color: #2a2a3e; margin: 14px 0 6px; }\ntable { width: 100%; border-collapse: collapse; margin: 6px 0 14px; font-size: 10pt; page-break-inside: avoid; }\nth { background: #e8eaf2; color: #1a1a2e; font-weight: 700; padding: 7px 10px; text-align: left; font-size: 9pt; border: 1px solid #c0c6d6; }\ntd { border: 1px solid #d0d4dc; padding: 6px 10px; vertical-align: top; }\nhr { border: none; border-top: 1px solid #d0d4dc; margin: 16px 0; }\nblockquote { border-left: 3px solid #d4a000; padding: 8px 14px; background: #fffcf0; margin: 10px 0; font-size: 10pt; }\np { margin: 5px 0; }\nem { color: #555; font-size: 9pt; }\n@media print { body { max-width: none; } }\n</style>\n\n\n{{Logo}}\n\n**{{CompanyName}}**\n{{CompanyAddress}}\n\n---\n\n**Ref / المرجع:** {{ReferenceNumber}} &nbsp;|&nbsp; **Date / التاريخ:** {{Date}}\n\n**إلى من يهمه الأمر / To Whom It May Concern**\n\n---\n\n# خطاب تفويض &nbsp;/&nbsp; Letter of Authorization\n\n---\n\n## Arabic (تفويض):\n\nأنا الموقّع أدناه، **{{AuthorizerNameAr}}**، **{{AuthorizerTitleAr}}** في **{{CompanyNameAr}}**، أُفوِّض بموجب هذا الخطاب:\n\n| البيان | القيمة |\n|---|---|\n| **الاسم** | {{AuthorizedPersonNameAr}} |\n| **رقم الهوية / الجواز** | {{AuthorizedPersonID}} |\n| **المسمى / الصفة** | {{AuthorizedPersonTitleAr}} |\n\nللتصرف نيابةً عن **{{CompanyNameAr}}** في:\n\n**الغرض:** {{AuthorizationPurposeAr}}\n\n**النطاق:** {{AuthorizationScopeAr}}\n\n**الفترة:** من {{ValidFrom}} إلى {{ValidUntil}}\n\n{{AdditionalConditionsAr}}\n\n---\n\n## English (Authorization):\n\nI, the undersigned, **{{AuthorizerName}}**, **{{AuthorizerTitle}}** of **{{CompanyName}}**, hereby authorize:\n\n| Field | Value |\n|---|---|\n| **Name** | {{AuthorizedPersonName}} |\n| **ID / Passport No.** | {{AuthorizedPersonID}} |\n| **Title / Role** | {{AuthorizedPersonTitle}} |\n\nto act on behalf of **{{CompanyName}}** for:\n\n**Purpose:** {{AuthorizationPurpose}}\n\n**Scope:** {{AuthorizationScope}}\n\n**Valid From:** {{ValidFrom}} &nbsp;|&nbsp; **Valid Until:** {{ValidUntil}}\n\n{{AdditionalConditions}}\n\n---\n\n## Signatures / التواقيع\n\n| المفوِّض / Authorizer | |\n|---|---|\n| {{AuthorizerNameAr}} / {{AuthorizerName}} | *(Official Stamp / الختم الرسمي)* |\n| {{AuthorizerTitleAr}} / {{AuthorizerTitle}} | |\n| {{Department}} — {{CompanyName}} | |\n| Signature: ___________________________ | |\n| Date: ___________________________ | |\n\n---\n\n*هذا التفويض ساري المفعول للفترة المحددة أعلاه فقط. / This authorization is valid only for the period specified above.*"},{"id":"general/CERTIFICATE","slug":"certificate","name":"Certificate","category":"general","version":"2.1","body":"<style>\n@page { size: A4; margin: 25mm 20mm 20mm 20mm; }\nbody { font-family: Arial, Helvetica, sans-serif; font-size: 11pt; color: #1a1a1a; max-width: 170mm; margin: 0 auto; line-height: 1.55; }\nh1 { font-size: 14pt; font-weight: 700; text-align: center; border-bottom: 2.5px solid #1a1a2e; padding-bottom: 8px; margin: 24px 0 16px; }\nh2 { font-size: 9pt; font-weight: 700; color: #1a1a2e; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px solid #c0c6d6; padding-bottom: 3px; margin: 22px 0 10px; }\nh3 { font-size: 10pt; font-weight: 700; color: #2a2a3e; margin: 14px 0 6px; }\ntable { width: 100%; border-collapse: collapse; margin: 6px 0 14px; font-size: 10pt; page-break-inside: avoid; }\nth { background: #e8eaf2; color: #1a1a2e; font-weight: 700; padding: 7px 10px; text-align: left; font-size: 9pt; border: 1px solid #c0c6d6; }\ntd { border: 1px solid #d0d4dc; padding: 6px 10px; vertical-align: top; }\nhr { border: none; border-top: 1px solid #d0d4dc; margin: 16px 0; }\nblockquote { border-left: 3px solid #d4a000; padding: 8px 14px; background: #fffcf0; margin: 10px 0; font-size: 10pt; }\np { margin: 5px 0; }\nem { color: #555; font-size: 9pt; }\n@media print { body { max-width: none; } }\n</style>\n\n\n{{Logo}}\n\n**{{CompanyName}}**\n\n---\n\n**Ref / المرجع:** {{ReferenceNumber}} &nbsp;|&nbsp; **Date / التاريخ:** {{Date}}\n\n---\n\n# شهادة &nbsp;/&nbsp; Certificate\n\n---\n\n## Arabic (يُمنح هذا الإشهاد لـ):\n\nيُشهد بأن **{{RecipientNameAr}}** قد استوفى/استوفت جميع المتطلبات المحددة، ويُمنح/تُمنح بموجب هذه الشهادة اعترافًا بـ **{{CertificateSubjectAr}}**.\n\nصُدِرت هذه الشهادة بناءً على **{{IssuanceReasonAr}}**.\n\n---\n\n## English (This is to certify that):\n\nThis is to certify that **{{RecipientName}}** has fulfilled all specified requirements and is hereby awarded this certificate in recognition of **{{CertificateSubject}}**.\n\nThis certificate is issued on the basis of **{{IssuanceReason}}**.\n\n---\n\n## Signatures / التواقيع\n\n| المفوّض بالتوقيع والختم / Authorised Signatory & Stamp | |\n|---|---|\n| {{AuthorisedBy}} | *(Official Stamp / الختم الرسمي)* |\n| {{AuthorisedTitle}} / {{AuthorisedTitleAr}} | |\n| {{CompanyName}} | |\n| Signature: ___________________________ | |\n| Date: ___________________________ | |\n\n---\n\n*صدرت هذه الشهادة بتاريخ {{Date}} وتُحفظ في السجلات الرسمية للمنشأة. / This certificate was issued on {{Date}} and is retained in the company's official records.*"},{"id":"general/CIRCULAR","slug":"circular","name":"Circular","category":"general","version":"2.1","body":"<style>\n@page { size: A4; margin: 25mm 20mm 20mm 20mm; }\nbody { font-family: Arial, Helvetica, sans-serif; font-size: 11pt; color: #1a1a1a; max-width: 170mm; margin: 0 auto; line-height: 1.55; }\nh1 { font-size: 14pt; font-weight: 700; text-align: center; border-bottom: 2.5px solid #1a1a2e; padding-bottom: 8px; margin: 24px 0 16px; }\nh2 { font-size: 9pt; font-weight: 700; color: #1a1a2e; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px solid #c0c6d6; padding-bottom: 3px; margin: 22px 0 10px; }\nh3 { font-size: 10pt; font-weight: 700; color: #2a2a3e; margin: 14px 0 6px; }\ntable { width: 100%; border-collapse: collapse; margin: 6px 0 14px; font-size: 10pt; page- k forward to your continued contributions.\n\n---\n\n## Signatures / التواقيع\n\n| المفوّض بالتوقيع والختم / Authorised Signatory & Stamp | |\n|---|---|\n| {{AuthorisedBy}} | *(Official Stamp / الختم الرسمي)* |\n| {{AuthorisedTitle}} / {{AuthorisedTitleAr}} | |\n| {{Department}} — {{CompanyName}} | |\n| Signature: ___________________________ | |\n| Date: ___________________________ | |\n\n---\n\n*يُحتفظ بنسخة من هذا الخطاب في ملف الموظف. / A copy of this letter is retained in the employee's file.*"},{"id":"hr/EMPLOYEE_INFORMATION_FORM","slug":"employee-information-form","name":"Employee Information Form","category":"hr","version":"2.1","body":"<style>\n@page { size: A4; margin: 25mm 20mm 20mm 20mm; }\nbody { font-family: Arial, Helvetica, sans-serif; font-size: 11pt; color: #1a1a1a; max-width: 170mm; margin: 0 auto; line-height: 1.55; }\nh1 { font-size: 14pt; font-weight: 700; text-align: center; border-bottom: 2.5px solid #1a1a2e; padding-bottom: 8px; margin: 24px 0 16px; }\nh2 { font-size: 9pt; font-weight: 700; color: #1a1a2e; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px solid #c0c6d6; padding-bottom: 3px; margin: 22px 0 10px; }\nh3 { font-size: 10pt; font-weight: 700; color: #2a2a3e; margin: 14px 0 6px; }\ntable { width: 100%; border-collapse: collapse; margin: 6px 0 14px; font-size: 10pt; page-break-inside: avoid; }\nth { background: #e8eaf2; color: #1a1a2e; font-weight: 700; padding: 7px 10px; text-align: left; font-size: 9pt; border: 1px solid #c0c6d6; }\ntd { border: 1px solid #d0d4dc; padding: 6px 10px; vertical-align: top; }\nhr { border: none; border-top: 1px solid #d0d4dc; margin: 16px 0; }\nblockquote { border-left: 3px solid #d4a000; padding: 8px 14px; background: #fffcf0; margin: 10px 0; font-size: 10pt; }\np { margin: 5px 0; }\nem { color: #555; font-size: 9pt; }\n@media print { body { max-width: none; } }\n</style>\n\n\n{{Logo}}\n\n**{{CompanyName}}**\n\n---\n\n**Ref / المرجع:** {{ReferenceNumber}} &nbsp;|&nbsp; **Date / التاريخ:** {{Date}}\n\n---\n\n# نموذج بيانات الموظف &nbsp;/&nbsp; Employee Information Form\n\n---\n\n## المعلومات الشخصية / Personal Information\n\n| البيان / Field | القيمة / Value |\n|---|---|\n| **الاسم الكامل (عربي) / Full Name (AR)** | {{FullNameAr}} |\n| **الاسم الكامل (إنجليزي) / Full Name (EN)** | {{FullNameEn}} |\n| **الجنسية / Nationality** | {{NationalityAr}} / {{Nationality}} |\n| **رقم الهوية / الإقامة / National ID or Iqama** | {{NationalID}} |\n| **رقم جواز السفر / Passport Number** | {{PassportNumber}} |\n| **تاريخ الميلاد / Date of Birth** | {{DateOfBirth}} |\n| **الجنس / Gender** | {{Gender}} |\n| **الحالة الاجتماعية / Marital Status** | {{MaritalStatus}} |\n| **عدد المعالين / Number of Dependants** | {{NumberOfDependants}} |\n\n---\n\n## معلومات التواصل / Contact Information\n\n| البيان / Field | القيمة / Value |\n|---|---|\n| **العنوان / Address** | {{Address}} |\n| **المدينة / City** | {{City}} |\n| **رقم الجوال / Mobile** | {{Mobile}} |\n| **البريد الإلكتروني / Email** | {{Email}} |\n| **جهة الاتصال في حالة الطوارئ / Emergency Contact** | {{EmergencyContactName}} |\n| **رقم الطوارئ / Emergency Phone** | {{EmergencyContactPhone}} |\n| **صلة القرابة / Relationship** | {{EmergencyContactRelationship}} |\n\n---\n\n## معلومات التوظيف / Employment Information\n\n| البيان / Field | القيمة / Value |\n|---|---|\n| **المسمى الوظيفي / Job Title** | {{JobTitleAr}} / {{JobTitle}} |\n| **القسم / Department** | {{Department}} |\n| **الفرع / Branch** | {{Branch}} |\n| **تاريخ الالتحاق / Start Date** | {{StartDate}} |\n| **نوع التوظيف / Employment Type** | {{EmploymentType}} |\n| **المرجع المباشر / Reporting To** | {{ReportingManager}} |\n\n---\n\n## المعلومات البنكية / Bank Details\n\n| البيان / Field | القيمة / Value |\n|---|---|\n| **اسم البنك / Bank Name** | {{BankNameAr}} / {{BankName}} |\n| **رقم الآيبان / IBAN** | {{IBAN}} |\n| **اسم صاحب الحساب / Account Name** | {{AccountName}} |\n\n---\n\n## إقرار / Declaration\n\nأُقرّ بأن جميع المعلومات الواردة أعلاه صحيحة ودقيقة، وأتعهد بإبلاغ قسم الموارد البشرية بأي تغييرات.\n\nI confirm that all information provided above is accurate and complete. I undertake to inform the HR Department of any changes.\n\n---\n\n## Signatures / التواقيع\n\n| توقيع الموظف / Employee Signature | استُلم بواسطة / Received By (HR) |\n|---|---|\n| {{FullNameEn}} | {{ReceivedBy}} |\n| | {{ReceivedByTitle}} / {{ReceivedByTitleAr}} |\n| Signature: ___________________________ | Signature: ___________________________ |\n| Date: ___________________________ | Date: ___________________________ |\n\n---\n\n*يُحتفظ بهذا النموذج في ملف الموظف ضمن السجلات الرسمية للموارد البشرية. / This form is retained in the employee's file within the official HR records.*"},{"id":"hr/EMPLOYMENT_VERIFICATION_LETTER","slug":"employment-verification-letter","name":"Employment Verification Letter","category":"hr","version":"2.1","body":"<style>\n@page { size: A4; margin: 25mm 20mm 20mm 20mm; }\nbody { font-family: Arial, Helvetica, sans-serif; font-size: 11pt; color: #1a1a1a; max-width: 170mm; margin: 0 auto; line-height: 1.55; }\nh1 { font-size: 14pt; font-weight: 700; text-align: center; border-bottom: 2.5px solid #1a1a2e; padding-bottom: 8px; margin: 24px 0 16px; }\nh2 { font-size: 9pt; font-weight: 700; color: #1a1a2e; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px solid #c0c6d6; padding-bottom: 3px; margin: 22px 0 10px; }\nh3 { font-size: 10pt; font-weight: 700; color: #2a2a3e; margin: 14px 0 6px; }\ntable { width: 100%; border-collapse: collapse; margin: 6px 0 14px; font-size: 10pt; page-break-inside: avoid; }\nth { background: #e8eaf2; color: #1a1a2e; font-weight: 700; padding: 7px 10px; text-align: left; font-size: 9pt; border: 1px solid #c0c6d6; }\ntd { border: 1px solid #d0d4dc; padding: 6px 10px; vertical-align: top; }\nhr { border: none; border-top: 1px solid #d0d4dc; margin: 16px 0; }\nblockquote { border-left: 3px solid #d4a000; padding: 8px 14px; background: #fffcf0; margin: 10px 0; font-size: 10pt; }\np { margin: 5px 0; }\nem { color: #555; font-size: 9pt; }\n@media print { body { max-width: none; } }\n</style>\n\n\n{{Logo}}\n\n**{{CompanyName}}**\n{{CompanyAddress}}\n\n---\n\n**Ref / المرجع:** {{ReferenceNumber}} &nbsp;|&nbsp; **Date / التاريخ:** {{Date}}\n\n---\n\n# خطاب تحقق من التوظيف &nbsp;/&nbsp; Employment Verification Letter\n\n**إلى / To:** {{PurposeAr}} / {{Purpose}}\n\n---\n\n## Arabic (يُشهد بأن):\n\nتُفيد إدارة الموارد البشرية في **{{CompanyNameAr}}** بأن:\n\n| البيان | القيمة |\n|---|---|\n| **اسم الموظف** | {{EmployeeNameAr}} |\n| **رقم الهوية / الإقامة** | {{NationalID}} |\n| **الجنسية** | {{NationalityAr}} |\n| **المسمى الوظيفي** | {{JobTitleAr}} |\n| **القسم** | {{DepartmentAr}} |\n| **تاريخ الالتحاق** | {{DateOfJoining}} |\n| **حالة التوظيف** | {{EmploymentStatusAr}} |\n\n{{AdditionalDetailsAr}}\n\nصدر هذا الخطاب بناءً على طلب الموظف/ة لتقديمه إلى **{{PurposeAr}}** ولا يُستخدم لأي غرض آخر.\n\n---\n\n## English (This is to certify that):\n\nThe Human Resources Department of **{{CompanyName}}** hereby confirms that:\n\n| Field | Value |\n|---|---|\n| **Full Name** | {{EmployeeNameEn}} |\n| **National ID / Iqama** | {{NationalID}} |\n| **Nationality** | {{Nationality}} |\n| **Job Title** | {{JobTitle}} |\n| **Department** | {{Department}} |\n| **Date of Joining** | {{DateOfJoining}} |\n| **Employment Status** | {{EmploymentStatus}} |\n\n{{AdditionalDetails}}\n\nThis letter is issued upon the request of the employee for **{{Purpose}}** and should not be used for any other purpose.\n\n---\n\n## Signatures / التواقيع\n\n| الختم الرسمي / Official Stamp | المفوّض بالتوقيع / Authorised Signatory |\n|---|---|\n| *(Stamp here / ختم هنا)* | {{AuthorisedBy}} |\n| | {{AuthorisedTitle}} / {{AuthorisedTitleAr}} |\n| | Signature: ___________________________ |\n| | Date: ___________________________ |\n\n---\n\n*صدر هذا الخطاب بتاريخ {{Date}} ويُحتفظ به في السجلات الرسمية للشركة. / This letter was issued on {{Date}} and is retained in the company's official records.*"},{"id":"hr/EXPERIENCE_CERTIFICATE","slug":"experience-certificate","name":"Experience Certificate","category":"hr","version":"2.1","body":"<style>\n@page { size: A4; margin: 25mm 20mm 20mm 20mm; }\nbody { font-family: Arial, Helvetica, sans-serif; font-size: 11pt; color: #1a1a1a; max-width: 170mm; margin: 0 auto; line-height: 1.55; }\nh1 { font-size: 14pt; font-weight: 700; text-align: center; border-bottom: 2.5px solid #1a1a2e; padding-bottom: 8px; margin: 24px 0 16px; }\nh2 { font-size: 9pt; font-weight: 700; color: #1a1a2e; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px solid #c0c6d6; padding-bottom: 3px; margin: 22px 0 10px; }\nh3 { font-size: 10pt; font-weight: 700; color: #2a2a3e; margin: 14px 0 6px; }\ntable { width: 100%; border-collapse: collapse; margin: 6px 0 14px; font-size: 10pt; page-break-inside: avoid; }\nth { background: #e8eaf2; color: #1a1a2e; font-weight: 700; padding: 7px 10px; text-align: left; font-size: 9pt; border: 1px solid #c0c6d6; }\ntd { border: 1px solid #d0d4dc; padding: 6px 10px; vertical-align: top; }\nhr { border: none; border-top: 1px solid #d0d4dc; margin: 16px 0; }\nblockquote { border-left: 3px solid #d4a000; padding: 8px 14px; background: #fffcf0; margin: 10px 0; font-size: 10pt; }\np { margin: 5px 0; }\nem { color: #555; font-size: 9pt; }\n@media print { body { max-width: none; } }\n</style>\n\n\n{{Logo}}\n\n**{{CompanyName}}**\n{{CompanyAddress}}\n\n---\n\n**Ref / المرجع:** {{ReferenceNumber}} &nbsp;|&nbsp; **Date / التاريخ:** {{Date}}\n\n**إلى من يهمه الأمر / To Whom It May Concern**\n\n---\n\n# شهادة خبرة &nbsp;/&nbsp; Experience Certificate\n\n---\n\n## Arabic (يُشهد بأن):\n\nتُفيد إدارة الموارد البشرية في **{{CompanyNameAr}}** بأن الموظف/ة **{{EmployeeNameAr}}** كان/كانت يعمل/تعمل لدى المنشأة بالتفاصيل التالية:\n\n| البيان | القيمة |\n|---|---|\n| **المسمى الوظيفي** | {{JobTitleAr}} |\n| **القسم** | {{DepartmentAr}} |\n| **من تاريخ** | {{StartDate}} |\n| **إلى تاريخ** | {{EndDate}} |\n| **مدة الخدمة** | {{Duration}} |\n\n{{PerformanceSummaryAr}}\n\nنتمنى له/لها التوفيق والنجاح في مسيرته/مسيرتها المهنية.\n\n---\n\n## English (This is to certify that):\n\nThe Human Resources Department of **{{CompanyName}}** hereby certifies that **{{EmployeeNameEn}}** was employed with the company with the following details:\n\n| Field | Value |\n|---|---|\n| **Job Title** | {{JobTitle}} |\n| **Department** | {{Department}} |\n| **From** | {{StartDate}} |\n| **To** | {{EndDate}} |\n| **Duration of Service** | {{Duration}} |\n\n{{PerformanceSummary}}\n\nWe wish {{EmployeeNameEn}} every success in future endeavours.\n\n---\n\n## Signatures / التواقيع\n\n| الختم الرسمي / Official Stamp | المفوّض بالتوقيع / Authorised Signatory |\n|---|---|\n| *(Stamp here / ختم هنا)* | {{AuthorisedBy}} |\n| | {{AuthorisedTitle}} / {{AuthorisedTitleAr}} |\n| | Signature: ___________________________ |\n| | Date: ___________________________ |\n\n---\n\n*صدرت هذه الشهادة بتاريخ {{Date}} وتُحفظ في السجلات الرسمية للشركة. / This certificate was issued on {{Date}} and is retained in the company's official records.*"},{"id":"hr/FINAL_SETTLEMENT","slug":"final-settlement","name":"Final Settlement Form","category":"hr","version":"1.0","body":"<style>\n@page { size: A4; margin: 25mm 20mm 20mm 20mm; }\nbody { font-family: Arial, Helvetica, sans-serif; font-size: 11pt; color: #1a1a1a; max-width: 170mm; margin: 0 auto; line-height: 1.55; }\nh1 { font-size: 14pt; font-weight: 700; text-align: center; border-bottom: 2.5px solid #1a1a2e; padding-bottom: 8px; margin: 24px 0 16px; }\nh2 { font-size: 9pt; font-weight: 700; color: #1a1a2e; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px solid #c0c6d6; padding-bottom: 3px; margin: 22px 0 10px; }\nh3 { font-size: 10pt; font-weight: 700; color: #2a2a3e; margin: 14px 0 6px; }\ntable { width: 100%; border-collapse: collapse; margin: 6px 0 14px; font-size: 10pt; page-break-inside: avoid; }\nth { background: #e8eaf2; color: #1a1a2e; font- حقات / Total Entitlements** | | **{{TotalEntitlements}}** |\n\n---\n\n## الخصومات / Deductions\n\n| البند / Item | التفاصيل / Details | المبلغ / Amount (SAR) |\n|---|---|---|\n| سلف الراتب / Salary Advances | {{SalaryAdvancesDetails}} | ({{SalaryAdvancesDeduction}}) |\n| القروض / Loans | {{LoansDetails}} | ({{LoansDeduction}}) |\n| {{OtherDeductionsLabel}} | | ({{OtherDeductionsAmount}}) |\n| **إجمالي الخصومات / Total Deductions** | | **({{TotalDeductions}})** |\n\n---\n\n## صافي المسوية النهائية / Net Final Settlement\n\n| | |\n|---|---|\n| **إجمالي المستحقات / Total Entitlements** | {{TotalEntitlements}} SAR |\n| **إجمالي الخصومات / Total Deductions** | ({{TotalDeductions}}) SAR |\n| **صافي المسوية / Net Settlement** | **{{NetSettlement}} SAR** |\n\n---\n\n## ملاحظات / Notes\n\n{{Notes}}\n\n---\n\n## Signatures / التواقيع\n\n| المفوّض بالتوقيع والختم / Authorised Signatory & Stamp | إقرار الموظف / Employee Acknowledgement |\n|---|---|\n| {{AuthorisedBy}} | {{EmployeeNameEn}} |\n| {{AuthorisedTitle}} / {{AuthorisedTitleAr}} | {{JobTitle}} |\n| Signature: ___________________________ | Signature: ___________________________ |\n| التوقيع والختم / Signature & Stamp | التاريخ / Date: ___________________________ |\n| التاريخ / Date: ___________________________ | |"},{"id":"hr/JOB_OFFER","slug":"job-offer","name":"Job Offer","category":"hr","version":"2.0","body":"<style>\n@page { size: A4; margin: 25mm 20mm 20mm 20mm; }\nbody { font-family: Arial, Helvetica, sans-serif; font-size: 11pt; color: #1a1a1a; max-width: 170mm; margin: 0 auto; line-height: 1.55; }\nh1 { font-size: 14pt; font-weight: 700; text-align: center; border-bottom: 2.5px solid #1a1a2e; padding-bottom: 8px; margin: 24px 0 16px; }\nh2 { font-size: 9pt; font-weight: 700; color: #1a1a2e; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px solid #c0c6d6; padding-bottom: 3px; margin: 22px 0 10px; }\nh3 { font-size: 10pt; font-weight: 700; color: #2a2a3e; margin: 14px 0 6px; }\ntable { width: 100%; border-collapse: collapse; margin: 6px 0 14px; font-size: 10pt; page-break-inside: avoid; }\nth { background: #e8eaf2; color: #1a1a2e; font-weight: 700; padding: 7px 10px; text-align: left; font-size: 9pt; border: 1px solid #c0c6d6; }\ntd { border: 1px solid #d0d4dc; padding: 6px 10px; vertical-align: top; }\nhr { border: none; border-top: 1px solid #d0d4dc; margin: 16px 0; }\nblockquote { border-left: 3px solid #d4a000; padding: 8px 14px; background: #fffcf0; margin: 10px 0; font-size: 10pt; }\np { margin: 5px 0; }\nem { color: #555; font-size: 9pt; }\n@media print { body { max-width: none; } }\n</style>\n\n\n{{Logo}}\n\n**{{CompanyName}}**\n\n---\n\n**Ref:** {{ReferenceNumber}} &nbsp;|&nbsp; **Date:** {{IssueDate}}\n\n---\n\n# الـعرض الوظيفي &nbsp;/&nbsp; Job Offer Letter\n\n---\n\n| الوصف / Field | القيمة / Value |\n|---|---|\n| **التاريخ / Date** | {{IssueDate}} |\n| **الاسم / Name** | {{CandidateNameAr}} / {{CandidateNameEn}} |\n| **الجنسية / Nationality** | {{NationalityAr}} / {{Nationality}} |\n| **رقم الجواز / الإقامة / Passport or ID No.** | {{IDNumber}} |\n| **المسمى الوظيفي / Job Title** | {{JobTitleAr}} / {{JobTitle}} |\n| | **تفاصيل العرض الوظيفي / Details of the Job Offer** |\n| **مدة العقد / Contract Duration** | {{ContractType}} *(Fixed Term / Non-Fixed Term)* |\n| **تاريخ انتهاء العقد / Contract End Date** | {{ContractEndDate}} *(for Fixed Term only)* |\n| **الراتب الأساسي / Basic Salary** | {{BasicSalary}} |\n| **بدل السكن / Housing Allowance** | {{HousingAllowance}} |\n| **بدل النقل / Transportation Allowance** | {{TransportationAllowance}} |\n| **بدلات أخرى / Other Allowances** | {{OtherAllowanceDescription}}: {{OtherAllowanceAmount}} |\n| **الراتب الإجمالي / Total Salary** | {{TotalSalary}} |\n| **فترة التجربة / Probation Period** | {{ProbationDays}} Days / أيام |\n| **أيام الإجازة السنوية / Annual Leave Days** | {{AnnualLeaveDays}} Days / أيام |\n| **عدد أيام العمل / Working Days** | {{WorkingDaysPerWeek}} Days / Week |\n| **عدد ساعات العمل / Working Hours** | {{WorkingHoursPerDay}} Hours / Day |\n| **التأمين الطبي / Medical Insurance** | {{MedicalInsurance}} |\n| **صلاحية العرض / Offer Validity** | {{OfferValidityDays}} Days from Sending |\n| **تاريخ مباشرة العمل / Joining Date** | {{StartDate}} |\n| **الفرع / Branch / Location** | {{Branch}} |\n\n---\n\n| التوقيع عند قبول العرض الوظيفي / Signature upon Accepting the Job Offer |\n|---|\n| ___________________________ |\n\n---\n\n| يعتمد مدير إدارة الموارد البشرية / Approved by the Chief Human Resources Officer |\n|---|\n| {{ApprovedBy}} &nbsp;&nbsp; Signature: ___________________________ |"},{"id":"hr/LOAN_ACKNOWLEDGEMENT","slug":"loan-acknowledgement","name":"Loan Acknowledgement (Employee Loan / Salary Advance Receipt)","category":"hr","version":"1.0","body":"<style>\n@page { size: A4; margin: 25mm 20mm 20mm 20mm; }\nbody { font-family: Arial, Helvetica, sans-serif; font-size: 11pt; color: #1a1a1a; max-width: 170mm; margin: 0 auto; line-height: 1.55; }\nh1 { font-size: 14pt; font-weight: 700; text-align: center; border-bottom: 2.5px solid #1a1a2e; padding-bottom: 8px; margin: 24px 0 16px; }\nh2 { font-size: 9pt; font-weight: 700; color: #1a1a2e; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px solid #c0c6d6; padding-bottom: 3px; margin: 22px 0 10px; }\nh3 { font-size: 10pt; font-weight: 700; color: #2a2a3e; margin: 14px 0 6px; }\ntable { width: 100%; border-collapse: collapse; margin: 6px 0 14px; font-size: 10pt; page-break-inside: avoid; }\nth { background: #e8eaf2; color: #1a1a2e; font-weight: 700; padding: 7px 10px; text-align: left; font-size: 9pt; border: 1px solid #c0c6d6; }\ntd { border: 1px solid #d0d4dc; padding: 6px 10px; vertical-align: top; }\nhr { border: none; border-top: 1px solid #d0d4dc; margin: 16px 0; }\nblockquote { border-left: 3px solid #d4a000; padding: 8px 14px; background: #fffcf0; margin: 10px 0; font-size: 10pt; }\np { margin: 5px 0; }\nem { color: #555; font-size: 9pt; }\n@media print { body { max-width: none; } }\n</style>\n\n\n{{Logo}}\n\n**{{CompanyName}}**\n\n---\n\n# إقرار استلام سلفة &nbsp;/&nbsp; Employee Loan Acknowledgement\n\n**التاريخ / Date:** {{IssueDate}}\n\n---\n\n## معلومات الموظف / Employee Information\n\n| البيان / Field | القيمة / Value |\n|---|---|\n| **اسم الموظف / Employee Name** | {{EmployeeNameAr}} / {{EmployeeNameEn}} |\n| **رقم الهوية / الإقامة / National ID or Iqama** | {{NationalID}} |\n| **المسمى الوظيفي / Job Title** | {{JobTitleAr}} / {{JobTitleEn}} |\n\n---\n\n## تفاصيل السلفة / Loan Details\n\n| البيان / Field | القيمة / Value |\n|---|---|\n| **مبلغ السلفة / Loan Amount** | {{LoanAmount}} SAR |\n| **تاريخ الصرف / Disbursement Date** | {{DisbursementDate}} |\n\n---\n\n## إقرار / Acknowledgement\n\nأقر أنا الموظف المذكور أعلاه بأنني استلمت من الشركة سلفة مالية بمبلغ (**{{LoanAmount}}**) ريال سعودي.\n\nكما أوافق على سداد هذه السلفة عن طريق الاستقطاع من رواتبي الشهرية وفقاً للبنود المتفق عليها، حتى يتم استرداد كامل المبلغ.\n\nوأقر بأن هذه المعاملة تمت بموافقتي الكاملة وإرادتي الحرة دون أي إكراه أو اعتراض.\n\n---\n\nI, the above-named employee, hereby acknowledge that I have received from **{{CompanyName}}** an employee loan of **{{LoanAmount}} SAR**.\n\nI agree to repay this amount through monthly deductions from my salary in accordance with the agreed repayment terms until the full amount is recovered.\n\nI confirm that this transaction was completed with my full and voluntary consent, without any coercion or objection.\n\n---\n\n## Signatures / التواقيع\n\n| توقيع الموظف / Employee Signature | مدير الموارد البشرية / HR Manager |\n|---|---|\n| {{EmployeeNameEn}} | {{PreparedBy}} |\n| | {{PreparedTitle}} / {{PreparedTitleAr}} |\n| Signature: ___________________________ | Signature: ___________________________ |\n| التاريخ / Date: ___________________________ | التاريخ / Date: {{IssueDate}} |"},{"id":"hr/PAYSLIP","slug":"payslip","name":"Payslip","category":"hr","version":"1.0","body":"<style>\n@page { size: A4; margin: 25mm 20mm 20mm 20mm; }\nbody { font-family: Arial, Helvetica, sans-serif; font-size: 11pt; color: #1a1a1a; max-width: 170mm; margin: 0 auto; line-height: 1.55; }\nh1 { font-size: 14pt; font-weight: 700; text-align: center; border-bottom: 2.5px solid #1a1a2e; padding-bottom: 8px; margin: 24px 0 16px; }\nh2 { font-size: 9pt; font-weight: 700; color: #1a1a2e; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px solid #c0c6d6; padding-bottom: 3px; margin: 22px 0 10px; }\nh3 { font-size: 10pt; font-weight: 700; color: #2a2a3e; margin: 14px 0 6px; }\ntable { width: 100%; border-collapse: collapse; margin: 6px 0 14px; font-size: 10pt; page-break-inside: avoid; }\nth { background: #e8eaf2; color: #1a1a2e; font-weight: 700; padding: 7px 10px; text-align: left; font-size: 9pt; border: 1px solid #c0c6d6; }\ntd { border: 1px solid #d0d4dc; padding: 6px 10px; vertical-align: top; }\nhr { border: none; border-top: 1px solid #d0d4dc; margin: 16px 0; }\nblockquote { border-left: 3px solid #d4a000; padding: 8px 14px; background: #fffcf0; margin: 10px 0; font-size: 10pt; }\np { margin: 5px 0; }\nem { color: #555; font-size: 9pt; }\n@media print { body { max-width: none; } }\n</style>\n\n\n{{Logo}}\n\n**{{CompanyName}}**\n\n---\n\n# قسيمة الراتب &nbsp;/&nbsp; Payslip\n\n| البيان / Field | القيمة / Value |\n|---|---|\n| **اسم الموظف / Employee Name** | {{EmployeeNameAr}} / {{EmployeeNameEn}} |\n| **المسمى الوظيفي / Job Title** | {{JobTitle}} |\n| **الفرع / Branch** | {{Branch}} |\n| **فترة الراتب / Pay Period** | {{PayPeriod}} |\n\n---\n\n## المستحقات / Earnings\n\n| البند / Description | البند (عربي) | المبلغ / Amount (SAR) |\n|---|---|---|\n| Basic Salary | الراتب الأساسي | {{BasicSalary}} |\n| Housing Allowance | بدل السكن | {{HousingAllowance}} |\n| Transportation Allowance | بدل النقل | {{TransportationAllowance}} |\n| {{OtherAllowance1Description}} | {{OtherAllowance1DescriptionAr}} | {{OtherAllowance1Amount}} |\n| {{OtherAllowance2Description}} | {{OtherAllowance2DescriptionAr}} | {{OtherAllowance2Amount}} |\n| **Total Earnings** | **إجمالي المستحقات** | **{{TotalEarnings}}** |\n\n---\n\n## الخصومات / Deductions\n\n| البند / Description | البند (عربي) | المبلغ / Amount (SAR) |\n|---|---|---|\n| {{Deduction1Description}} | {{Deduction1DescriptionAr}} | ({{Deduction1Amount}}) |\n| {{Deduction2Description}} | {{Deduction2DescriptionAr}} | ({{Deduction2Amount}}) |\n| **Total Deductions** | **إجمالي الخصومات** | **({{TotalDeductions}})** |\n\n---\n\n## صافي الراتب / Net Salary\n\n| **Net Salary / صافي الراتب** | **{{NetSalary}} SAR** |\n|---|---|\n\n---\n\n## Signatures / التواقيع\n\n| توقيع الموظف / Employee Signature | مدير الموارد البشرية / HR Manager |\n|---|---|\n| {{EmployeeNameEn}} | {{PreparedBy}} |\n| | {{PreparedTitle}} / {{PreparedTitleAr}} |\n| Signature: ___________________________ | Signature: ___________________________ |\n| التاريخ / Date: ___________________________ | التاريخ / Date: {{IssueDate}} |\n\n---\n\n*هذه القسيمة مُنشأة للأغراض التوثيقية فقط. / This payslip is issued for documentation purposes only.*"},{"id":"hr/PROMOTION_LETTER","slug":"promotion-letter","name":"Promotion Letter","category":"hr","version":"2.1","body":"<style>\n@page { size: A4; margin: 25mm 20mm 20mm 20mm; }\nbody { font-family: Arial, Helvetica, sans-serif; font-size: 11pt; color: #1a1a1a; max-width: 170mm; margin: 0 auto; line-height: 1.55; }\nh1 { font-size: 14pt; font-weight: 700; text-align: center; border-bottom: 2.5px solid #1a1a2e; padding-bottom: 8px; margin: 24px 0 16px; }\nh2 { font-size: 9pt; font-weight: 700; color: #1a1a2e; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px solid #c0c6d6; padding-bottom: 3px; margin: 22px 0 10px; }\nh3 { font-size: 10pt; font-weight: 700; color: #2a2a3e; margin: 14px 0 6px; }\ntable { width: 100%; border-collapse: collapse; margin: 6px 0 14px; font-size: 10pt; page-break-inside: avoid; }\nth { background: #e8eaf2; color: #1a1a2e; font-weight: 700; padding: 7px 10px; text-align: left; font-size: 9pt; border: 1px solid #c0c6d6; }\ntd { border: 1px solid #d0d4dc; padding: 6px 10px; vertical-align: top; }\nhr { border: none; border-top: 1px solid #d0d4dc; margin: 16px 0; }\nblockquote { border-left: 3px solid #d4a000; padding: 8px 14px; background: #fffcf0; margin: 10px 0; font-size: 10pt; }\np { margin: 5px 0; }\nem { color: #555; font-size: 9pt; }\n@media print { body { max-width: none; } }\n</style>\n\n\n{{Logo}}\n\n**{{CompanyName}}**\n\n---\n\n**Ref / المرجع:** {{ReferenceNumber}} &nbsp;|&nbsp; **Date / التاريخ:** {{Date}}\n\n---\n\n# خطاب ترقية &nbsp;/&nbsp; Promotion Letter\n\n---\n\n## معلومات الموظف / Employee Details\n\n| البيان / Field | القيمة / Value |\n|---|---|\n| **اسم الموظف / Employee Name** | {{EmployeeNameAr}} / {{EmployeeNameEn}} |\n| **رقم الموظف / Employee Code** | {{EmployeeCode}} |\n| **الجنسية / Nationality** | {{Nationality}} |\n| **رقم الهوية / الإقامة / National ID or Iqama** | {{NationalID}} |\n\n---\n\n## تفاصيل الترقية / Promotion Details\n\n| البيان / Field | قبل الترقية / Before | بعد الترقية / After |\n|---|---|---|\n| **المسمى الوظيفي / Job Title** | {{CurrentJobTitleAr}} / {{CurrentJobTitle}} | {{NewJobTitleAr}} / {{NewJobTitle}} |\n| **القسم / Department** | {{CurrentDepartment}} | {{NewDepartment}} |\n| **المرجع المباشر / Reporting To** | {{CurrentManager}} | {{NewManager}} |\n| **الموقع / Location** | {{CurrentLocation}} | {{NewLocation}} |\n\n**تاريخ النفاذ / Effective Date:** {{EffectiveDate}}\n\n---\n\n## الراتب المعدَّل / Revised Compensation\n\n| البند / Component | المبلغ / Amount (SAR) |\n|---|---|\n| الراتب الأساسي / Basic Salary | {{NewBasicSalary}} |\n| بدل السكن / Housing Allowance | {{NewHousingAllowance}} |\n| بدل النقل / Transportation Allowance | {{NewTransportationAllowance}} |\n| بدلات أخرى / Other Allowances | {{NewOtherAllowances}} |\n| **الإجمالي / Total** | **{{NewTotalSalary}}** |\n\n---\n\n## Arabic (عربي):\n\nيسعدنا إبلاغكم بترقيتكم إلى منصب **{{NewJobTitleAr}}** اعتبارًا من **{{EffectiveDate}}**، وذلك تقديرًا لجهودكم ومساهماتكم المتميزة.\n\n{{AdditionalNotesAr}}\n\n---\n\n## English:\n\nWe are pleased to inform you of your promotion to **{{NewJobTitle}}**, effective **{{EffectiveDate}}**, in recognition of your outstanding contributions.\n\n{{AdditionalNotes}}\n\n---\n\n## Signatures / التواقيع\n\n| المفوّض بالتوقيع والختم / Authorised Signatory & Stamp | إقرار الموظف / Employee Acknowledgement |\n|---|---|\n| {{AuthorisedBy}} | {{EmployeeNameEn}} |\n| {{AuthorisedTitle}} / {{AuthorisedTitleAr}} | {{NewJobTitle}} |\n| *(Official Stamp / الختم الرسمي)* | |\n| Signature: ___________________________ | Signature: ___________________________ |\n| Date: ___________________________ | Date: ___________________________ |\n\n---\n\n*يُحتفظ بنسخة من هذا الخطاب في ملف الموظف. / A copy of this letter is retained in the employee's file.*"},{"id":"hr/RESIGNATION_ACCEPTANCE","slug":"resignation-acceptance","name":"Resignation Acceptance","category":"hr","version":"2.1","body":"<style>\n@page { size: A4; margin: 25mm 20mm 20mm 20mm; }\nbody { font-family: Arial, Helvetica, sans-serif; font-size: 11pt; color: #1a1a1a; max-width: 170mm; margin: 0 auto; line-height: 1.55; }\nh1 { font-size: 14pt; font-weight: 700; text-align: center; border-bottom: 2.5px solid #1a1a2e; padding-bottom: 8px; margin: 24px 0 16px; }\nh2 { font-size: 9pt; font-weight: 700; color: #1a1a2e; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px solid #c0c6d6; padding-bottom: 3px; margin: 22px 0 10px; }\nh3 { font-size: 10pt; font-weight: 700; color: #2a2a3e; margin: 14px 0 6px; }\ntable { width: 100%; border-collapse: collapse; margin: 6px 0 14px; font-size: 10pt; page-break-inside: avoid; }\nth { background: #e8eaf2; color: #1a1a2e; font-weight: 700; padding: 7px 10px; text-align: left; font-size: 9pt; border: 1px solid #c0c6d6; }\ntd { border: 1px solid #d0d4dc; padding: 6px 10px; vertical-align: top; }\nhr { border: none; border-top: 1px solid #d0d4dc; margin: 16px 0; }\nblockquote { border-left: 3px solid #d4a000; padding: 8px 14px; background: #fffcf0; margin: 10px 0; font-size: 10pt; }\np { margin: 5px 0; }\nem { color: #555; font-size: 9pt; }\n@media print { body { max-width: none; } }\n</style>\n\n\n{{Logo}}\n\n**{{CompanyName}}**\n\n---\n\n**Ref / المرجع:** {{ReferenceNumber}} &nbsp;|&nbsp; **Date / التاريخ:** {{Date}}\n\n---\n\n# قبول الاستقالة &nbsp;/&nbsp; Resignation Acceptance\n\n---\n\n## معلومات الموظف / Employee Details\n\n| البيان / Field | القيمة / Value |\n|---|---|\n| **اسم الموظف / Employee Name** | {{EmployeeNameAr}} / {{EmployeeNameEn}} |\n| **رقم الموظف / Employee Code** | {{EmployeeCode}} |\n| **المسمى الوظيفي / Job Title** | {{JobTitleAr}} / {{JobTitle}} |\n| **القسم / Department** | {{Department}} |\n| **تاريخ تقديم الاستقالة / Resignation Date** | {{ResignationDate}} |\n| **آخر يوم عمل / Last Working Day** | {{LastWorkingDay}} |\n| **فترة الإشعار / Notice Period** | {{NoticePeriod}} |\n\n---\n\n## Arabic (عربي):\n\nنُحيطكم علمًا بأننا استلمنا خطاب استقالتكم المؤرخ في **{{ResignationDate}}**، ونُعلمكم رسميًا بقبولها اعتبارًا من **{{LastWorkingDay}}**.\n\n{{HandoverInstructionsAr}}\n\n{{ClearanceProcessAr}}\n\nنشكركم على جهودكم ومساهماتكم خلال فترة عملكم مع **{{CompanyNameAr}}**، ونتمنى لكم التوفيق في مسيرتكم المهنية.\n\n---\n\n## English:\n\nWe acknowledge receipt of your resignation letter dated **{{ResignationDate}}** and formally confirm its acceptance, effective **{{LastWorkingDay}}**.\n\n{{HandoverInstructions}}\n\n{{ClearanceProcess}}\n\nWe thank you for your contributions during your tenure with **{{CompanyName}}** and wish you every success in your future endeavours.\n\n---\n\n## Signatures / التواقيع\n\n| المفوّض بالتوقيع والختم / Authorised Signatory & Stamp | إقرار الموظف / Employee Acknowledgement |\n|---|---|\n| {{AuthorisedBy}} | {{EmployeeNameEn}} |\n| {{AuthorisedTitle}} / {{AuthorisedTitleAr}} | {{JobTitle}} |\n| *(Official Stamp / الختم الرسمي)* | |\n| Signature: ___________________________ | Signature: ___________________________ |\n| Date: ___________________________ | Date: ___________________________ |\n\n---\n\n*يُحتفظ بنسخة من هذا الخطاب في ملف الموظف. / A copy of this letter is retained in the employee's file.*"},{"id":"hr/SALARY_CERTIFICATE","slug":"salary-certificate","name":"Salary Certificate","category":"hr","version":"1.1","body":"---\ndocument:\n  name: Salary Certificate\n  category: hr\n  version: 1.1\n  reference: Alba A1\n\nform:\n  direction: ltr\n  layout: grouped\n\nfields:\n  SerialNumber:\n    label: Reference / Serial Number\n    type: text\n    required: true\n    group: Document\n    order: 1\n\n  IssueDate:\n    label: Issue Date\n    type: date\n    required: true\n    group: Document\n    order: 2\n\n  CompanyName:\n    label: Company Name (English)\n    type: text\n    required: true\n    group: Document\n    order: 3\n\n  CompanyNameAr:\n    label: Company Name (Arabic)\n    type: text\n    required: true\n    group: Document\n    order: 4\n\n  Purpose:\n    label: Purpose (English)\n    type: select\n    required: true\n    group: Purpose\n    order: 10\n    options:\n      - General\n      - To the Bank\n      - To the Embassy\n      - Rental Purposes\n      - Other\n\n  PurposeAr:\n    label: Purpose (Arabic)\n    type: text\n    required: true\n    group: Purpose\n    order: 11\n    placeholder: e.g. عام / إلى البنك / للسفارة\n\n  CustomPurpose:\n    label: Custom Purpose\n    type: text\n    group: Purpose\n    order: 12\n    placeholder: Fill only when Purpose is \"Other\"\n\n  EmployeeNameEn:\n    label: Employee Name (English)\n    type: text\n    required: true\n    group: Employee Information\n    order: 20\n\n  EmployeeNameAr:\n    label: Employee Name (Arabic)\n    type: text\n    required: true\n    group: Employee Information\n    order: 21\n\n  JobTitleEn:\n    label: Job Title (English)\n    type: text\n    required: true\n    group: Employee Information\n    order: 22\n\n  JobTitleAr:\n    label: Job Title (Arabic)\n    type: text\n    group: Employee Information\n    order: 23\n\n  Nationality:\n    label: Nationality\n    type: select\n    required: true\n    group: Employee Information\n    order: 24\n    options:\n      - Saudi\n      - Non-Saudi\n\n  NationalID:\n    label: National ID / Iqama Number\n    type: text\n    required: true\n    group: Employee Information\n    order: 25\n\n  DateOfJoining:\n    label: Date of Joining\n    type: date\n    required: true\n    group: Employee Information\n    order: 26\n\n  BasicSalary:\n    label: Basic Salary (SAR)\n    type: currency\n    required: true\n    group: Monthly Salary\n    order: 30\n    placeholder: e.g. 10000.00\n\n  HousingAllowance:\n    label: Housing Allowance (SAR)\n    type: currency\n    group: Monthly Salary\n    order: 31\n    placeholder: e.g. 2000.00\n\n  TransportationAllowance:\n    label: Transportation Allowance (SAR)\n    type: currency\n    group: Monthly Salary\n    order: 32\n    placeholder: e.g. 500.00\n\n  OtherAllowances:\n    label: Other Allowances (SAR)\n    type: currency\n    group: Monthly Salary\n    order: 33\n    placeholder: e.g. 0.00\n\n  TotalSalary:\n    label: Total Monthly Salary (SAR)\n    type: currency\n    required: true\n    group: Monthly Salary\n    order: 34\n    placeholder: Sum of all components above\n\n  IBAN:\n    label: IBAN\n    type: text\n    group: Banking\n    order: 40\n    placeholder: e.g. SA00 0000 0000 0000 0000 0000\n\n  BankName:\n    label: Bank Name\n    type: text\n    group: Banking\n    order: 41\n\n  AuthorisedBy:\n    label: Authorised Signatory Name\n    type: text\n    required: true\n    group: Signatory\n    order: 50\n\n  AuthorisedTitle:\n    label: Title (English)\n    type: text\n    group: Signatory\n    order: 51\n\n  AuthorisedTitleAr:\n    label: Title (Arabic)\n    type: text\n    group: Signatory\n    order: 52\n\n  AdditionalNote:\n    label: Additional Note\n    type: textarea\n    group: Notes\n    order: 60\n    placeholder: Optional note printed in italics at the bottom\n\ncomputed:\n  TotalSalary:\n    label: Total Salary (computed)\n    expression: BasicSalary + HousingAllowance + TransportationAllowance + OtherAllowances\n\n---\n<style>\n@page { size: A4; margin: 25mm 20mm 20mm 20mm; }\nbody { font-family: Arial, Helvetica, sans-serif; font-size: 11pt; color: #1a1a1a; max-width: 170mm; margin: 0 auto; line-height: 1.55; }\nh1 { font-size: 14pt; font-weight: 700; text-align: center; border-bottom: 2.5px solid #1a1a2e; padding-bottom: 8px; margin: 24px 0 16px; }\nh2 { font-size: 9pt; font-weight: 700; color: #1a1a2e; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px solid #c0c6d6; padding-bottom: 3px; margin: 22px 0 10px; }\nh3 { font-size: 10pt; font-weight: 700; color: #2a2a3e; margin: 14px 0 6px; }\ntable { width: 100%; border-collapse: collapse; margin: 6px 0 14px; font-size: 10pt; page-break-inside: avoid; }\nth { background: #e8eaf2; color: #1a1a2e; font-weight: 700; padding: 7px 10px; text-align: left; font-size: 9pt; border: 1px solid #c0c6d6; }\ntd { border: 1px solid #d0d4dc; padding: 6px 10px; vertical-align: top; }\nhr { border: none; border-top: 1px solid #d0d4dc; margin: 16px 0; }\nblockquote { border-left: 3px solid #d4a000; padding: 8px 14px; background: #fffcf0; margin: 10px 0; font-size: 10pt; }\np { margin: 5px 0; }\nem { color: #555; font-size: 9pt; }\n@media print { body { max-width: none; } }\n</style>\n\n\n{{Logo}}\n\n**{{CompanyName}}**\n\n---\n\n**Ref / المرجع:** {{SerialNumber}} &nbsp;|&nbsp; **Date / التاريخ:** {{IssueDate}}\n\n---\n\n**إلى / To:** {{PurposeAr}} / {{Purpose}}\n*(عام / General — إلى البنك / To the Bank — للسفارة / To the Embassy — لأغراض الإيجار / Rental Purposes — أخرى / Other: {{CustomPurpose}})*\n\n---\n\n# شهادة راتب &nbsp;/&nbsp; Salary Certificate\n\n---\n\n## معلومات الموظف / Employee Information\n\n| البيان / Field | القيمة / Value |\n|---|---|\n| **الاسم (عربي) / Name (AR)** | {{EmployeeNameAr}} |\n| **الاسم (إنجليزي) / Name (EN)** | {{EmployeeNameEn}} |\n| **المسمى الوظيفي (عربي) / Job Title (AR)** | {{JobTitleAr}} |\n| **المسمى الوظيفي (إنجليزي) / Job Title (EN)** | {{JobTitleEn}} |\n| **الجنسية / Nationality** | {{Nationality}} |\n| **رقم الهوية / الإقامة / National ID or Iqama** | {{NationalID}} |\n| **تاريخ الالتحاق / Date of Joining** | {{DateOfJoining}} |\n\n---\n\n## Arabic (يُشهد بأن):\n\nإلى {{PurposeAr}}،\n\nيُشهد بأن الموظف/ة **{{EmployeeNameAr}}** يعمل/تعمل لدى **{{CompanyNameAr}}** بالمسمى الوظيفي **{{JobTitleAr}}** منذ تاريخ **{{DateOfJoining}}**.\n\n**المرتب الشهري:**\n\n| البند / Component | المبلغ / Amount |\n|---|---|\n| الراتب الأساسي / Basic Salary | {{BasicSalary}} |\n| بدل السكن / Housing Allowance | {{HousingAllowance}} |\n| بدل النقل / Transportation Allowance | {{TransportationAllowance}} |\n| بدلات أخرى / Other Allowances | {{OtherAllowances}} |\n| **الإجمالي / Total** | **{{TotalSalary}}** |\n\n*(IBAN: {{IBAN}} — {{BankName}})*\n\nصدرت هذه الشهادة بناءً على طلب الموظف/ة لتقديمها إلى **{{PurposeAr}}** ولا تُستخدم لأي غرض آخر.\n\n---\n\n## English (This is to certify that):\n\nTo {{Purpose}},\n\nThis is to certify that **{{EmployeeNameEn}}** is employed with **{{CompanyName}}** as **{{JobTitleEn}}** since **{{DateOfJoining}}**.\n\n**Monthly Compensation:**\n\n| Component | Amount |\n|---|---|\n| Basic Salary | {{BasicSalary}} |\n| Housing Allowance | {{HousingAllowance}} |\n| Transportation Allowance | {{TransportationAllowance}} |\n| Other Allowances | {{OtherAllowances}} |\n| **Total** | **{{TotalSalary}}** |\n\n*(IBAN: {{IBAN}} — {{BankName}})*\n\nThis certificate is issued upon the request of the employee for **{{Purpose}}** and should not be used for any other purpose.\n\n---\n\n## Signatures / التواقيع\n\n| الختم الرسمي / Official Stamp | المفوّض بالتوقيع / Authorised Signatory |\n|---|---|\n| *(Stamp here / ختم هنا)* | {{AuthorisedBy}} |\n| | {{AuthorisedTitle}} / {{AuthorisedTitleAr}} |\n| | Signature: ___________________________ |\n| | Date: ___________________________ |\n\n---\n\n*{{AdditionalNote}}*\n\n*صدرت هذه الشهادة بناءً على طلب الموظف/ة وتُحفظ في السجلات الرسمية للشركة. / This certificate is issued upon employee request and retained in the company's official records.*\n"},{"id":"hr/TERMINATION_LETTER","slug":"termination-letter","name":"Contract Termination Form","category":"hr","version":"2.0","body":"<style>\n@page { size: A4; margin: 25mm 20mm 20mm 20mm; }\nbody { font-family: Arial, Helvetica, sans-serif; font-size: 11pt; color: #1a1a1a; max-width: 170mm; margin: 0 auto; line-height: 1.55; }\nh1 { font-size: 14pt; font-weight: 700; text-align: center; border-bottom: 2.5px solid #1a1a2e; padding-bottom: 8px; margin: 24px 0 16px; }\nh2 { font-size: 9pt; font-weight: 700; color: #1a1a2e; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px solid #c0c6d6; padding-bottom: 3px; margin: 22px 0 10px; }\nh3 { font-size: 10pt; font-weight: 700; color: #2a2a3e; margin: 14px 0 6px; }\ntable { width: 100%; border-collapse: collapse; margin: 6px 0 14px; font-size: 10pt; page-break-inside: avoid; }\nth { background: #e8eaf2; color: #1a1a2e; font-weight: 700; padding: 7px 10px; text-align: left; font-size: 9pt; border: 1px solid #c0c6d6; }\ntd { border: 1px solid #d0d4dc; padding: 6px 10px; vertical-align: top; }\nhr { border: none; border-top: 1px solid #d0d4dc; margin: 16px 0; }\nblockquote { border-left: 3px solid #d4a000; padding: 8px 14px; background: #fffcf0; margin: 10px 0; font-size: 10pt; }\np { margin: 5px 0; }\nem { color: #555; font-size: 9pt; }\n@media print { body { max-width: none; } }\n</style>\n\n\n{{Logo}}\n\n---\n\n# نموذج إنهاء العقد &nbsp;/&nbsp; CONTRACT TERMINATION FORM\n\n**Issue Date / تاريخ الإصدار:** {{IssueDate}}\n\n---\n\n## بيانات الجهة المُصدِرة / Issuing Company Details\n\n| البيان / Field | القيمة / Value |\n|---|---|\n| **اسم المنشأة / Company Name** | {{CompanyNameAr}} / {{CompanyNameEn}} |\n| **رقم السجل التجاري / CR Number** | {{CRNumber}} |\n| **العنوان / Address** | {{CompanyAddress}} |\n| **الهاتف / Phone** | {{CompanyPhone}} |\n| **البريد الإلكتروني / Email** | {{CompanyEmail}} |\n\n---\n\n## معلومات الموظف / Employee Information\n\n| البيان / Field | القيمة / Value |\n|---|---|\n| **اسم الموظف / Employee Name** | {{EmployeeNameAr}} / {{EmployeeNameEn}} |\n| **رقم الموظف / Employee Code** | {{EmployeeCode}} |\n| **رقم الهوية / الإقامة / National ID or Iqama** | {{NationalID}} |\n| **الجنسية / Nationality** | {{Nationality}} |\n| **رقم الجوال / Mobile Number** | {{MobileNumber}} |\n| **البريد الإلكتروني / Email Address** | {{EmployeeEmail}} |\n\n---\n\n## تفاصيل التوظيف / Employment Details\n\n| البيان / Field | القيمة / Value |\n|---|---|\n| **المسمى الوظيفي / Job Title** | {{JobTitle}} |\n| **تاريخ الالتحاق / Date of Joining** | {{DateOfJoining}} |\n| **نوع العقد / Contract Type** | {{ContractType}} *(Fixed Term / Non-Fixed Term / Open-Ended)* |\n| **الفرع / Branch** | {{Branch}} |\n| **مدة الخدمة / Length of Service** | {{LengthOfService}} |\n\n---\n\n## تفاصيل إنهاء العقد / Termination Details\n\n| البيان / Field | القيمة / Value |\n|---|---|\n| **تاريخ إنهاء العقد / Termination Date** | {{TerminationDate}} |\n| **آخر يوم عمل / Last Working Day** | {{LastWorkingDay}} |\n| **سبب إنهاء العقد / Termination Reason** | {{TerminationReason}} |\n\n---\n\nتُقرّ **{{CompanyNameAr}}** بأن عقد عمل الموظف/ة المذكور/ة أعلاه قد تمّ إنهاؤه اعتباراً من التاريخ المحدد، وذلك وفقاً لأحكام نظام العمل والاتفاقية المبرمة بين الطرفين.\n\n**{{CompanyNameEn}}** hereby confirms that the employment contract of the above-named employee has been terminated effective the date stated herein, in accordance with the applicable Labour Law and the terms agreed between both parties.\n\n*يُحتفظ بهذا النموذج في ملف الموظف للأغراض الإدارية. / This form is retained in the employee's file for administrative purposes.*\n\n---\n\n## Signatures / التواقيع\n\n| المفوّض بالتوقيع والختم / Authorised Signatory & Stamp | إقرار الموظف / Employee Acknowledgement |\n|---|---|\n| {{RepresentativeName}} | {{EmployeeNameEn}} |\n| {{RepresentativeTitle}} / {{RepresentativeTitleAr}} | {{JobTitle}} |\n| التوقيع والختم / Signature & Stamp | التوقيع / Signature |\n| ___________________________ | ___________________________ |\n| التاريخ / Date: ___________________________ | التاريخ / Date: ___________________________ |"},{"id":"hr/TRANSFER_LETTER","slug":"transfer-letter","name":"Transfer Letter","category":"hr","version":"2.1","body":"<style>\n@page { size: A4; margin: 25mm 20mm 20mm 20mm; }\nbody { font-family: Arial, Helvetica, sans-serif; font-size: 11pt; color: #1a1a1a; max-width: 170mm; margin: 0 auto; line-height: 1.55; }\nh1 { font-size: 14pt; font-weight: 700; text-align: center; border-bottom: 2.5px solid #1a1a2e; padding-bottom: 8px; margin: 24px 0 16px; }\nh2 { font-size: 9pt; font-weight: 700; color: #1a1a2e; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px solid #c0c6d6; padding-bottom: 3px; margin: 22px 0 10px; }\nh3 { font-size: 10pt; font-weight: 700; color: #2a2a3e; margin: 14px 0 6px; }\ntable { width: 100%; border-collapse: collapse; margin: 6px 0 14px; font-size: 10pt; page-break-inside: avoid; }\nth { background: #e8eaf2; color: #1a1a2e; font-weight: 700; padding: 7px 10px; text-align: left; font-size: 9pt; border: 1px solid #c0c6d6; }\ntd { border: 1px solid #d0d4dc; padding: 6px 10px; vertical-align: top; }\nhr { border: none; border-top: 1px solid #d0d4dc; margin: 16px 0; }\nblockquote { border-left: 3px solid #d4a000; padding: 8px 14px; background: #fffcf0; margin: 10px 0; font-size: 10pt; }\np { margin: 5px 0; }\nem { color: #555; font-size: 9pt; }\n@media print { body { max-width: none; } }\n</style>\n\n\n{{Logo}}\n\n**{{CompanyName}}**\n\n---\n\n**Ref / المرجع:** {{ReferenceNumber}} &nbsp;|&nbsp; **Date / التاريخ:** {{Date}}\n\n---\n\n# خطاب نقل &nbsp;/&nbsp; Transfer Letter\n\n---\n\n## معلومات الموظف / Employee Details\n\n| البيان / Field | القيمة / Value |\n|---|---|\n| **اسم الموظف / Employee Name** | {{EmployeeNameAr}} / {{EmployeeNameEn}} |\n| **رقم الموظف / Employee Code** | {{EmployeeCode}} |\n| **رقم الهوية / الإقامة / National ID or Iqama** | {{NationalID}} |\n| **الجنسية / Nationality** | {{Nationality}} |\n| **المسمى الوظيفي / Job Title** | {{JobTitleAr}} / {{JobTitle}} |\n\n---\n\n## تفاصيل النقل / Transfer Details\n\n| البيان / Field | الحالي / Current | الجديد / New |\n|---|---|---|\n| **القسم / Department** | {{CurrentDepartment}} | {{NewDepartment}} |\n| **الموقع / Location** | {{CurrentLocation}} | {{NewLocation}} |\n| **الفرع / Branch** | {{CurrentBranch}} | {{NewBranch}} |\n| **المرجع المباشر / Reporting To** | {{CurrentManager}} | {{NewManager}} |\n\n**تاريخ النفاذ / Effective Date:** {{EffectiveDate}}\n\n---\n\n## Arabic (عربي):\n\nيُرجى التفضل بالعلم بأنه تقرر نقلكم من **{{CurrentDepartment}}** إلى **{{NewDepartment}}** اعتبارًا من **{{EffectiveDate}}**.\n\n{{AdditionalNotesAr}}\n\n---\n\n## English:\n\nPlease be advised that your transfer from **{{CurrentDepartment}}** to **{{NewDepartment}}** has been approved, effective **{{EffectiveDate}}**.\n\n{{AdditionalNotes}}\n\n---\n\n## Signatures / التواقيع\n\n| المفوّض بالتوقيع والختم / Authorised Signatory & Stamp | إقرار الموظف / Employee Acknowledgement |\n|---|---|\n| {{AuthorisedBy}} | {{EmployeeNameEn}} |\n| {{AuthorisedTitle}} / {{AuthorisedTitleAr}} | {{JobTitle}} |\n| *(Official Stamp / الختم الرسمي)* | |\n| Signature: ___________________________ | Signature: ___________________________ |\n| Date: ___________________________ | Date: ___________________________ |\n\n---\n\n*يُحتفظ بنسخة من هذا الخطاب في ملف الموظف. / A copy of this letter is retained in the employee's file.*"},{"id":"hr/WARNING_LETTER","slug":"warning-letter","name":"Warning Letter","category":"hr","version":"2.0","body":"<style>\n@page { size: A4; margin: 25mm 20mm 20mm 20mm; }\nbody { font-family: Arial, Helvetica, sans-serif; font-size: 11pt; color: #1a1a1a; max-width: 170mm; margin: 0 auto; line-height: 1.55; }\nh1 { font-size: 14pt; font-weight: 700; text-align: center; border-bottom: 2.5px solid #1a1a2e; padding-bottom: 8px; margin: 24px 0 16px; }\nh2 { font-size: 9pt; font-weight: 700; color: #1a1a2e; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px solid #c0c6d6; padding-bottom: 3px; margin: 22px 0 10px; }\nh3 { font-size: 10pt; font-weight: 700; color: #2a2a3e; margin: 14px 0 6px; }\ntable { width: 100%; border-collapse: collapse; margin: 6px 0 14px; font-size: 10pt; page-break-inside: avoid; }\nth { background: #e8eaf2; color: #1a1a2e; font-weight: 700; padding: 7px 10px; text-align: left; font-size: 9pt; border: 1px solid #c0c6d6; }\ntd { border: 1px solid #d0d4dc; padding: 6px 10px; vertical-align: top; }\nhr { border: none; border-top: 1px solid #d0d4dc; margin: 16px 0; }\nblockquote { border-left: 3px solid #d4a000; padding: 8px 14px; background: #fffcf0; margin: 10px 0; font-size: 10pt; }\np { margin: 5px 0; }\nem { color: #555; font-size: 9pt; }\n@media print { body { max-width: none; } }\n</style>\n\n\n{{Logo}}\n\n**{{CompanyName}}**\n\n---\n\n**Ref / المرجع:** {{SerialNumber}} &nbsp;&nbsp; **Date / التاريخ:** {{IssueDate}}\n\n---\n\n# رسالة إنذار &nbsp;|&nbsp; Warning Letter\n\n**نوع الإنذار / Warning Type:** {{WarningType}}\n*(إنذار شفهي / Verbal Warning — إنذار خطي / Written Warning — إنذار نهائي / Final Warning)*\n\n---\n\n## معلومات الموظف / Employee Details\n\n| البيان / Field | القيمة / Value | البيان / Field | القيمة / Value |\n|---|---|---|---|\n| **اسم الموظف / Employee Name** | {{EmployeeNameAr}} / {{EmployeeNameEn}} | | |\n| **رمز الموظف / Employee Code** | {{EmployeeCode}} | **الجنسية / Nationality** | {{Nationality}} |\n| **رقم الهوية / الإقامة / ID or Iqama** | {{NationalID}} | **المسمى الوظيفي / Job Title** | {{JobTitle}} |\n| **تاريخ الإنذار / Warning Date** | {{WarningDate}} | **نوع الإنذار / Warning Type** | {{WarningType}} |\n\n---\n\n## المخالفة / Violation — Reason\n\n**عربي:**\n\n{{ViolationReasonAr}}\n\n**English:**\n\n{{ViolationReasonEn}}\n\n---\n\n> ⚠️ **إنذار نهائي / Final Warning** *(include only if Warning Type = Final)*\n>\n> **تحذير أخير:** يُعدّ هذا الإنذار النهائي في مسار التأديب. قد يترتب على تكرار المخالفة إجراءات أشد، بما فيها إنهاء الخدمة.\n>\n> **Final Warning:** This constitutes a final warning. Any further violations may result in more serious disciplinary action, including termination of employment.\n\n---\n\n## ملاحظات إضافية / Additional Notes\n\n{{AdditionalNotes}}\n\n---\n\n## إقرار الموظف / Employee Acknowledgement\n\nأُقرّ بأنني استلمت نسخة من هذا الإنذار وفهمت مضمونه، وأتعهّد بعدم تكرار المخالفة مستقبلاً.\n\nI acknowledge receipt of this warning letter and confirm that I have read and understood its contents. I commit to not repeating the violation.\n\n---\n\n## Signatures / التواقيع\n\n| توقيع الموظف / Employee Signature | الختم / Stamp | المفوض بالتوقيع / Authorised Signatory |\n|---|---|---|\n| {{EmployeeNameEn}} | *(Official Stamp)* | {{AuthorisedBy}} |\n| Signature: ___________________________ | | {{AuthorisedTitle}} / {{AuthorisedTitleAr}} |\n| التاريخ / Date: ___________________________ | | Signature: ___________________________ |\n\n---\n\n| مدير الموارد البشرية / HR Manager |\n|---|\n| {{PreparedBy}} — {{PreparedTitle}} / {{PreparedTitleAr}} |\n| Signature: ___________________________ &nbsp;&nbsp; التاريخ / Date: {{IssueDate}} |"},{"id":"operations/ASSET_HANDOVER","slug":"asset-handover","name":"Asset Handover","category":"operations","version":"2.1","body":"<style>\n@page { size: A4; margin: 25mm 20mm 20mm 20mm; }\nbody { font-family: Arial, Helvetica, sans-serif; font-size: 11pt; color: #1a1a1a; max-width: 170mm; margin: 0 auto; line-height: 1.55; }\nh1 { font-size: 14pt; font-weight: 700; text-align: center; border-bottom: 2.5px solid #1a1a2e; padding-bottom: 8px; margin: 24px 0 16px; }\nh2 { font-size: 9pt; font-weight: 700; color: #1a1a2e; text-transform: uppercase; letter-spacing: 0.1em; border-bottom: 1px sol
